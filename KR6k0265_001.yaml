body:
  text: 宗體篇宗體中分為四門一戒法二戒體三戒行四戒相事鈔云今略指宗體行相令後進者興建有託資持釋云興謂發心建即立行識體進行成因感果故云有託事鈔又云但戒相多途非唯一軼心有分限取之不同若任境彰名乃有無量且據樞要略標四種一者戒法二者戒體三者戒行四者戒相資持釋云初敘廣上二句據法明廣五八十具四位不同次二句約心明廣即上四位各有三品若下二句就境明廣情及非情不可數故且下示要樞即門樞亦取要義三品者見後歸戒儀軌五戒中依境發心文資持云欲達四科先須略示聖人制教名法納法成業名體依體起護名行為行有儀名相有云未受名法受已名體今謂不然法之為義貫徹始終安有受已不得名法須知下三從初得號是故一一皆得稱戒或可並以法字貫之方顯體及行相非餘泛善為行有儀名相者戒相有二義一約行為相如今所云二以法為相如後持犯篇所示資持云問所以唯四不多少者答攝修始終無闕賸故隨成一行四義整足言有次第行不前後資持云問法之與體同異云何答業疏云體者戒法所依之本是則法為能依體是所依不可云同又云戒體者所謂納聖法於心胸即法是所納之戒體據此不可云異應知言法未必是體言體其必是法不即不離非同非異濟緣云問即法是體法體何分答若望未受但名為法體是無情若加期誓要緣領納依心成業此法有功乃名為體如藥丸喻藥味各別如戒法也和合成丸如戒體也丸非他物即藥成丸雖異而同雖同而別如是知之見業疏記卷十六資持云問行相何異答三業分之已上皆見事鈔記卷三三業分之者戒行屬意戒相屬身口行屬意者約能察言見後戒體門圓教宗能憶能持能防等疏記之文及戒行門首段鈔記之文相屬身口者見後持犯篇持犯總義門成就章就業明四行文若爾何故資持又云三業造修名行耶答彼兼所察言也第一門戒法戒法中分為二章一通敘戒法二歸戒儀軌第一章通敘戒法通敘戒法中分為三節一示相彰名二略辨教體三顯知由徑第一節示相彰名示相彰名中分為二項一正示二雜簡第一項正示事鈔云言戒法者語法而談不局凡聖直明此法必能軌成出離之道要令受者信知有此資持釋云示相中初標示直下正明法雖兩通不能委辨但從聖論故云直也軌成者示法義也出離道者聖所證也要下出從聖所以然此但示法之功力文不明指何者是法意令學者思而得之事鈔續云雖復凡聖通有此法今所受者就已成而言名為聖法資持釋云彰名中初二句躡前今下正示已成者初果已上所修三學名聖道故今雖在凡亦名聖法因中果號也已上皆見事鈔記卷三業疏云問人皆知受所受是何答相傳解云受名聖法由此法故奉敬守護淨如明珠能為聖道作基址故濟緣釋云受者雖多而不自知所受之體欲警學者故發是問答中云相傳者承古所解舉果目因以其能通聖道故復令受者不自輕故見業疏記卷十五第二項雜簡雜簡中分為三支一化制二戒善三遮性第一支化制化制者化教制教制教亦云行教戒疏攝教分齊中雖以行教與制教別列但此外鈔疏及記中皆行制二名互用義蓋可通又戒疏雖局取三輪但此外鈔疏及記中皆以化行或化制而分二教資持云如戒疏中或約三輪或約化行或約化制或約制聽彼取三輪今用化行隨時用與未須和會業疏云自古詳教咸分兩途化教則通被道俗專開信解之門行教則局據出家唯明修奉之務濟緣釋云就文二教對明兩別道俗出家被機異也信解修奉立法異也戒疏云何名化教開演化導令識邪正教本化人令開慧解本非對過而立斯教言行教者起必因過隨過制約言唯持犯事通止作戒律一宗局斯教矣濟緣云十善五停四弘六度一切觀行並化教業毗尼所詮開遮輕重一切律藏並制教業化據理性理有順違制就教法教有持犯已上皆見業疏記卷一資持云一代時教總歸化行開其信解用捨任緣故名化教制其修奉違反有過名為行教鈔疏及記簡別化制二教之文屢見其義大同未能具録今就上文列表於後以示兩別化教通道俗開其信解令開慧解非對過立十善五停等用捨任緣制教行教局道制其修奉持犯楷定隨過制約開遮輕重等違反有過資持云問五八二戒既是戒制應是行攝答化教所攝已上皆見事鈔記卷二南山律中以十戒具戒屬制教五戒八戒屬化教今案五戒八戒與常途之化教異正屬化教義當制教義雖通制而教終局化猶如四分律宗正屬小乘義當大乘義雖通大而教終局小也此意於宗體篇中屢明所以謂五戒等義當制教者如業疏云如來設教類同空界隨立一相攝修皆盡五戒被俗之法五體通道之規持犯相扶難遮齊則於後歸戒儀軌章首具録此疏文及濟緣釋義宜檢尋之文據甚明蓋無可疑第二支戒善業疏云問一切善作盡是戒否答律儀所攝善作名戒自餘十業但單稱善不名為戒濟緣釋云戒有二義一有本期誓二遍該生境餘善反之故不名戒見業疏記卷十五事鈔云宜作四句一者善而非戒謂十中後三是也律不制單心犯也二戒而不善即惡律儀三亦善亦戒十善之中前七支也以不要期直爾修行故名善也反此策勵故名戒也四俱非者身口無記資持釋云初句後三者即貪瞋邪見化教所禁故名善律所不制故非戒四分重緣相同十業可入戒收若約菩薩十善俱戒如是知之第三句中初示相以下雙釋不要期者顯示世善無願體也反此者謂有要期受體然後如體而修見事鈔記卷十六第三支遮性戒疏云明遮性者由惡緣境不可隨説以義收之大分為二戒疏續云言性惡者如十不善體是違理無論大聖制與不制若作違行感得苦果故言性惡是故如來制戒防約若不制者業結三塗不在人道何能修善故因過制從本惡以標名禁性惡故名為性戒行宗釋云初釋性義性即是體違理之惡從心而起不由制有故云無論等是下合戒義初敘須制故下明立制於本業上復增制罪故云因制應知性戒之言即業制雙舉也戒疏續云言遮惡者聖未制前造作無罪由非正業無妨福善自制已後塵染更深妨亂修道招世譏謗故名遮也行宗釋云初示反前性惡自下明因制成犯塵染更深者多違犯故妨道招譏亦即自他兩失戒疏又云性罪三過一違理惡行二違佛廣制三能妨道業遮罪具二體非違理故名為遮已上皆見戒疏記卷五上明遮性二意若約五八戒言前四屬性酒等為遮性惡可知遮惡如業疏引俱舍文略明今録於下業疏云俱舍論云由飲酒故即便忘失是事非事念也離莊嚴者謂非舊莊嚴也若常所用莊嚴不生極醉亂心也若用高勝臥處及歌舞音樂隨行一事破戒不遠也若依時食離先所習非時食也憶持八戒即起厭離隨助之心若無第八此二不生也濟緣釋云酒能亂性不辨是非容犯諸戒故非舊莊嚴謂華瓔等俗中常習是舊莊嚴今並離之但存常所服用故云非也高牀長慢樂音動情皆近破戒依時食者即不過中憶八戒者無他念故即滅惡也起厭離者不樂世緣即生善也若不節食飽腹嗜味故二心不生也見業疏記卷十第二節略辨教體資持云夫教者以詮表為功隨機為用雖廣開戶牖而軌度無差雖剋定楷模而攝生斯盡圓音隨應情慮難求且依業疏三宗以示一家處判然教由體立體即教源故須約體用分教相一者實法宗即薩婆多部彼宗明體則同歸色聚隨行則但防七支形身口色成遠方便此即當分小乘教也二者假名宗即今所承曇無德部此宗論體則強號二非隨戒則相同十業重緣思覺即入犯科此名過分小乘教也三者圓教宗即用涅槃開會之意決了權乘同歸實道故考受體乃是識藏熏種隨行即同三聚圓修微縱妄心即成業行此名終窮大乘教也然今四分正當假宗深有兼淺之能故旁收有部教蘊分通之義故終會圓乘是則大小通塞假實淺深一代雄詮歷然可見見事鈔記卷一假實兩宗實法宗薩婆多部十誦律俱舍雜心多論等多宗假名宗曇無德部四分律成實論等成宗業疏三宗實法宗受體同歸色聚隨行但防七支形身口色成遠方便假名宗受體強號二非隨行相同十業重緣思覺即入犯科圓教宗受體識藏熏種隨行三聚圓修微縱妄心即成業行業疏三宗為南山律中之樞要資持所舉三宗之受體與隨行文簡義廣初學難解今撮録諸文略釋如下受體者受戒時所發之業體同歸色聚者通指實法宗之作戒及無作戒二體俱色強號二非者別指假名宗之無作戒以非色非心為體識藏熏種者別指圓教宗之無作戒以善種子為體已上三宗受體之義於後戒體門廣明隨行者既受戒已憶持防護但防七支者即十業中之前七殺盜淫妄言兩舌惡口綺語也多宗唯具戒防七支五戒八戒等但防前四支若成宗五戒八戒等亦防七支形身口色成遠方便者多宗結犯不約心論遠方便罪亦須動色成犯相同十業重緣思覺即入犯科者成宗雖同大乘通於十業但大乘約瞥爾此約重緣故有深淺不同瞥爾者即獨頭心念下云微縱妄心即成業行是也重緣者謂後念還追前事故大乘初念即犯成宗次念乃犯已上多宗成宗隨行之義於後持犯篇持犯總義門成就章廣明三聚之義於後五戒依境發心支釋圓修之義於後戒體門圓教宗中委明芝苑云一代聖教不過大小人理教行一一不同然須略識淺深之相且就一家約本受體則分三位一者十誦多宗名當分小乘教也二者四分成實正小兼大名過分小乘教三者圓教全是大乘今正依成實旁用多宗終歸圓教蓋取涅槃顯性談常重扶之意學者臨文無宜混濫良由以小望大則大小懸殊以大攝小則小無不大故事鈔引勝鬘經智度論並以聲聞毗尼即大乘學又戒疏所引大集經中五部雖異不妨諸佛法界涅槃又引無量義經云法水一也江河井池分其異耳今宗準此諸意並以圓意用通律乘如昔光師直以四分判屬大乘太為浮漫近世相承以為至説此全不曉大小分齊或有不許分通專判為小此又不了假實兩宗教之優劣過猶不及此之謂也見芝苑遺編卷一如昔光師者即北齊慧光律師第三節顯知由徑顯知由徑中分為五項一聖道本基二戒有大用三略解名義四優劣有異五重受通塞第一項聖道本基戒疏云斯乃大聖降臨創開化本將欲拯拔諸有同登彼岸為道制戒本非世福行宗釋云為道者通而為語即指三乘推佛本意下至翻邪終為一實而作前引況經開會殊途同歸涅槃重扶無非顯性今明為道專指佛乘止息化城終非本意故知化本尚非二乘豈為世福而立斯戒戒疏續云然煩惑難清要由方便致設三學用為治元故成論云戒如捉賊定縛慧殺三行相因斯須攝濟故初行者務先學戒檢策非違三業清淨正定正慧自然而立行宗釋云欲明三學開設之致此略敘之則文無所壅夫一切衆生本來皆具真精妙性性之為體唯寂唯照一迷此性乃昏乃散翻號無明積成煩惑計有人我隨境發毒鼓身口意造生死業流轉諸趣億劫無窮大覺慈哀將令離苦察病設藥對分三種內心昏動對立定慧身口非違對立淨戒聖教雖多不越三學三學所立唯依色心論其起也則從本以發枝用其治也則先粗而後細首先制戒意在於斯譬夫濁水風激波騰風波未息欲得清澄無有是處三學次第理數必然乖越常模去道全遠煩即昏濁惑謂亂動三毒結使劫掠善財喻之如賊三行相因謂次第而生斯須攝濟謂不可相離已上皆見戒疏記卷一資持云五分功德以戒為初無上菩提以戒為本安有棄戒別求聖道智論所謂無翅欲飛無船欲渡聖言深勉可不信乎見事鈔記卷十五第二項戒有大用事鈔云夫三寶所以隆安九道所以師訓諸行之歸憑賢聖之依止者必宗於戒資持釋云初句住持義次句軌物義三發趣義四本基義此之四句攝盡戒功文敘功能而首標大用者良由有用方見功能功由用彰所以先舉見事鈔記卷十五第三項略解名義事鈔云依彼梵本具立三名初言毗尼此翻為律二言尸羅此翻為戒三言波羅提木叉此云處處解脫顯三次第即是一化始終律則據教教不孤起必詮行相戒則因之而立戒不虛因必有果克故解脫絶縛最在其終資持釋云一化始終者教行果三不唯戒律一切教門次第皆爾事鈔續云次明其義初云律者法也謂犯不犯輕重等法並律所明即教詮也二者戒義戒者性也性通善惡故惡律儀類亦通周若此立名戒當禁也三解脫義者近而彰名隨分果也謂身口七非犯緣非一各各防護隨相解脫遠取戒德因戒克聖望彼絶纍由遵戒本資持釋云初釋律義中二上句訓字法以楷定為義謂下釋義一切戒本大分為二前明犯相後明不犯犯中復二即輕與重四義攝盡毗尼大藏就輕重中復有因果闕緣開制之異故云等也顯示律名從教而立故云並律等次釋戒義中戒以性名性通三性且論善惡互不相容各得禁義惡律儀亦名惡戒屠兒獵師旃陀羅輩常行殺害名受惡戒持惡律儀三釋解脫中約近遠兩義釋之近中言隨分者顯非頓脫即處處義也次遠義者此以凡地所受望後聖果故云遠取即前聖道本基義故云因戒等聖總三乘纍該五住問近遠兩釋何以分之答此有多異一近約止業遠望除惑二近是凡地遠即聖道三近是就因遠即從果四近是漸防遠即頓破已上皆見事鈔記卷十五翻名毗尼翻為律尸羅翻為戒波羅提木叉翻為處處解脫戒疏翻為別解脫釋義律法戒禁處處解脫近隨分果處處解脫遠聖果解脫第四項優劣有異資持云優劣中優即勝也前後並單論別脫此兼道定還欲對顯別脫功勝別脫別解脫戒處處解脫木叉戒依受戒之作法而受得定定共戒禪戒與禪定共生皆隨心而發道道共戒無漏戒與無漏智共生事鈔云婆論云木叉戒佛在世有希現故勝禪無漏戒一切時有二木叉通情非情寬故言勝餘二局情狹故不如三木叉從慈心發故勝能為佛道作因四木叉戒者被及七衆紹續三乘三寶三道住持功強餘二無能故劣五木叉戒者唯佛弟子有餘禪戒者外道亦有資持釋云多論五種初時二境三心四功五人初時希常者以木叉須佛出世制方有故餘二縱非佛出亦有得定證道之者故常有也二境中木叉遮性通禁餘二但止性惡三約心者慈即大心故是佛因論云禪無漏戒不以慈心得謂從智得此專自利即二乘心劣可知也四明功有二一攝生廣被七衆故二住持勝紹續等故住持中三種並以紹續字貫之初所乘法二即所住境三謂所成果五約人中外道無無漏戒故但舉禪戒耳以彼亦得無色定故已上皆見事鈔記卷十五第五項重受通塞資持云重受中意令行者審己所受更求增勝故也事鈔云依薩婆多宗戒不重發亦不重受依本常定資持釋云言不重發者彼云木叉戒者無有重得若微品心受得五戒後以中上品心受十戒先得五戒更無增勝於後五戒乃得增耳不重受者彼計一受即定既不重發更受不增故不立也事鈔又云成論云有人言波羅提木叉有重發否答云一日之中受七善律儀隨得道處更得律儀而本得不失勝者受名其七善者謂五戒八戒十戒具戒禪戒定戒道共戒也資持釋云成宗開重受本得不失者從前體增為後體故勝者受名從後彰名前名沒故成論離禪定為二戒色無色別故多宗合為一俱不動業故問重發重受如何分別答重發據多戒重受約一戒若爾論明重發那見重受答由體重發即得重受以彼重受一體發故已上皆見事鈔記卷十五芝苑云夫戒者截苦海之舟航發萬善之端緒三乘聖賢之所尊敬歷代祖師之所傳通但受之者心有明昧學有精粗而不能一揆故有初受者焉重增者焉律明發心則有三品一者唯期脫苦專求自利名為下品此二乘心也二者為物解疑自他兼濟名為中品此小菩薩心也三者忘己利生福智雙運了達本性求佛菩提名為上品此大菩薩心也審知初受但發中下佛開重增轉為上品此所謂增戒也見芝苑遺編補遺上來戒法中第一章通敘戒法竟第二章歸戒儀軌業疏云古來集法多削在家便製疏云律制內衆不被外部今據律文通收清信禁束三業為道階梯理須明練是非通塞成敗何以知耶如來設教類同空界隨立一相攝修皆盡五戒被俗之法五體通道之規持犯相扶難遮齊則濟緣釋云同空界者虛空有二義一無邊義喻周遍也二包含義喻攝機也且舉五戒顯上一相廣攝之義被俗法者約相局也通道規者據體通也但淫分邪正罪無篇聚至於大重小輕方便趣果義則不別故云持犯相扶扶字或作符羯磨注引善生經具問遮難與道不異故云齊則業疏云薩婆多云三歸五戒乃至別脫由佛出故開立此法但輪王梵王説世間法惠利衆生故十善四弘劫初便有未能清升超越世境法王出世不為世善要斷煩惱遠出界繫故明戒善令依具修定慧等行集生有本此其意也濟緣釋云初舉歸戒所出別脫即具戒也但下比校優劣初明世教之劣輪王是人主十善化人梵王是天主以四弘化人即慈悲喜捨四無量心不待佛出故劫初即有報在人天故未超世教法王下次明歸戒之勝莫非斷集脫苦修道證滅也已上皆見業疏記卷十歸戒儀軌中分為三節一翻邪三歸二五戒三八戒第一節翻邪三歸業疏云母論云有五種三歸一翻邪二五戒三八戒四十戒五具戒唯具戒者不行於今餘四通有濟緣釋云母論三歸該通五法足彰功勝見業疏記卷十翻邪三歸中分為六項一歸意二顯相三功益四懺悔五作法六料簡第一項歸意業疏云多論云以三寶為所歸所歸以救護為義如人獲罪於王投向他國以求救護彼王勑言汝求無畏以投我者莫出我境莫違我教必當救護衆生亦爾繫屬於魔有生死過歸向三寶魔無如之何濟緣釋云初句示境所歸下顯義如人下舉喻衆生下合法上三句合上獲罪於王下二句合上投向他國魔有四種天魔五陰魔煩惱魔死魔未歸三寶皆繫屬焉見業疏記卷十第二項顯相戒疏云有四種三寶一理體者如五分法身為佛寶滅理無為是法寶聲聞學無學功德是僧寶二化相者如釋迦道王三千為佛寶演布諦教為法寶拘鄰等五為僧寶三住持者形像塔廟為佛寶紙素所傳為法寶戒法儀相為僧寶四一體者如常所論唯約心體義分三相如涅槃説三寶同性等行宗釋云他宗皆闕理寶四位分別獨出今疏初明理寶五分者戒定慧從因受名解脫解脫知見從果彰號滅理四諦滅諦涅槃學無學者初果已去同見真諦名理和僧然此理寶亦即同體但望佛僧證理邊為別化相中三千者所化之境諦教即四諦法門雖多而以首者言之又四諦統攝凡聖因果大小教門廣略異宜無出此四住持中戒法是僧體儀相即削染也一體中如常論者即指經論之宗芝苑云衆生妄念天真本具一體三寶也諸佛果德清淨無染理體三寶也乘時利見啓迪羣庶化相三寶也垂裕後世流及無窮住持三寶也見芝苑遺編補遺戒疏又云此三益世近拔三有遠清二死希世獨達可重名寶故寶性論喻分六義一希有義世寶貧窮所無三寶薄福不遇二離垢義世寶體無瑕穢三寶絶離諸漏三勢力義世寶除貧去毒三寶六通難思四莊嚴義世寶嚴身令好三寶能嚴法身五最勝義世寶諸物中勝三寶諸有無上六不改義世寶鍊磨不變三寶八法不動行宗釋云初約義略釋上三句顯益近遠二字必對因果二死者一曰分段三乘共亡二曰變易唯佛永盡希下一句結名希世者世間無故獨達者超諸有故故下次引文廣釋今用四種三寶對此六義初義通四住持無信不遇化相無緣不遇舍衛三億可以明之理體局聖凡愚不遇一體二乘不遇第二義中唯約理寶歸敬儀云住持三寶體是有為具足漏染又云化相體是無常四相所遷滅過千載但可追遠用增翹敬據後一體在迷隨染故此三種皆無此義第三喻中六通在人唯對化相毒謂苦惱第四通四住持化相能發信仰理體一體可以修證皆是嚴身第五亦通四餘三易解住持佛法雖是世物莫不表示法身功用無極歸敬儀云金木石土體是非情以造像故敬毀之人自獲罪福故知此寶得名無上法亦準同剃染之僧為世福田人天中勝破戒惡行猶過外俗況餘持奉其勝可知第六唯局理寶歸敬儀云此之三寶常住於世不為世法之所陵慢一體雖常然就迷邊隨緣流變餘二無常非所論矣八法者智論云衰利毀譽稱譏苦樂四違四順能動物情名為八風理寶人法皆是出世無漏聖道不為八法之所動故戒疏又云四寶為言理寶為勝由常住故為世所歸餘三隨設體是有法行宗釋云理寶勝者理通大小生空真如是小乘理清淨心本即大乘理今須約大以論勝劣若爾與一體何異答一體在迷專據凡説理寶約證唯從聖論故分二矣是故理寶獨勝餘三已上皆見戒疏記卷二歸敬儀云緣理三寶者理謂至理天真常住還是心體且從染説無始有終但為惑網不能出障今以三學剋翦纏結惑業既傾心性光顯始終性淨無始無終由法成立隨境分相即號此相為五分法身謂戒定慧解脫解脫知見也前之三學從因受名由戒護助果成法身故云戒身定慧準此可以類知後二從果次第受名解脫身者由慧剋惑惑無之處名解脫身解脫知見乃以出纏破障反照觀心故云知見身也唯佛法中三乘聖者具此五分能為六道作大歸依故論云歸依於佛者謂一切智五分法身也歸依於法者謂滅諦涅槃也歸依於僧者謂諸賢聖學無學功德自身他身盡處也即自他惑滅所無之處故云盡處也如世珍寶為生所重今此三寶為諸羣生三乘七衆之所歸仰故名正歸歸敬儀又云此明理寶是歸依所宗故覆詳之令心有寄已上皆見釋門歸敬儀第二第三項功益歸敬儀云經云若人得聞常住二字是人生生不墮惡趣斯何故耶以知法佛本性常故一時聞解熏本識心業種既成淨信無失況能立願歸依奉為師範固當纍劫清勝義無陷沒如經有人受三歸依彌勒初會解脫生死此乃出苦海之良津入佛法之階位但以罪多惡重輕而慢者雖曾受歸隨緣還失是故智人初受歸時專心緣此得名歸依故感善神隨逐護助見釋門歸敬儀第二歸敬儀又云以諸道俗有識之徒皆須歸依三寶請求加護所得功德無有限量七衆約戒前已受歸不妨重受重感無作善惡既爾戒亦通之若未受戒止得但受翻邪三歸日別六時隨時便受顯歸三寶自誓不回歸敬儀又云如善生經云若人受三自歸所得果報不可窮盡如四大寶藏舉國人民七年之中運出不盡受三歸者其福過彼不可稱計又校量功德經云四大洲中滿二乘果有人盡形供養乃至起塔不如男子女人作如是言我某甲歸依佛法僧所得功德不可思議以諸福中唯三寶勝故又雜含經云與須達交者令受三歸終生天上有懷妊者為其胎子受三自歸生已復受後有知見復教三歸設有奴婢客人懷妊生子亦如是教若買奴婢受三歸及以五戒然後買之不能不買乃至乞貸舉息要受三歸然後與之若有施三寶物者從世尊聞稱名咒願乃得生天佛言善哉如來有無上知見審知方便皆得生天已上皆見釋門歸敬儀第九事鈔云大集云妊娠女人恐胎不安先受三歸已兒無加害乃至生已身心具足善神擁護見事鈔記卷三十九第四項懺悔事鈔云以信邪來久妄造非法今創歸投必翻邪業阿含等經並令先悔涅槃云發露諸惡從生死際所作諸惡悉皆發露至無至處必論設懺隨時誦習亦得通用資持釋云初敘意但使未歸三寶皆名信邪隨順生死皆名邪業阿含下引示涅槃生死際即無始時無至處即未來際謂成佛果證大涅槃即名涅槃為無至處言其臻極更無所至故必下指法隨時謂逐人別述通用謂如諸經但懺三世十惡等見事鈔記卷三十九第五項作法羯磨注云善見論云並須師授言音相順若言不出或不具足不稱名不解故不成見隨機羯磨第二已下所引羯磨文皆然不再注出受五戒八戒時亦應準此文略不出事鈔云智論云互跪合掌在比丘前五衆得作當教言我某甲盡形壽歸依佛歸依法歸依僧三説即發善法次結云我某甲盡形壽歸依佛竟歸依法竟歸依僧竟三結資持釋云一具儀二對境三作法言某甲者稱己名也盡形壽者述所期也歸三寶者是所投也言發善者明非戒也後三結者重更囑纍不令忘失也見事鈔記卷三十九業疏云多論曰言三歸者以何為性有論者言教無教性此就所發教之業從體明性故若淳重心有無教也無教者此明業體一發續現不假緣辦無由教示方有成用即體任運能酬來世故云無教今時經論多云無作義例同也濟緣釋云引問中性即是體解中三初正定體教無教性彼論續云受三歸時胡跪合掌身也口説三歸口也是身口教若淳重心有身口無教此就等者疏家斷也教為能發由教發得無教故云所發教之業即以無教為性也無教者下二釋名一發謂初念續現即第二念教猶使也謂非教使之然任運自然酬因感報故也今下三會異即善生成論雜心等也業疏又云作法之時知三説已無作便生故能所不昧於作業也濟緣釋云三説已者此據初念已前通名為作無作便生即約次念徹至盡報也能授所受知業成處故不昧也已上皆見業疏記卷十已上疏文二段及釋文示三歸所發之業體初學難解宜參觀戒體門第六項料簡羯磨注云此但受歸法無有戒法故母論云三歸下有所加得歸及戒若無加者有歸無戒業疏云多論問稱於佛法不稱僧者乃至互少得成歸否答不成受也濟緣釋云乃至互少謂但稱佛而不稱法或稱法僧而不稱佛業疏又云又問得從三師各受一歸否答不得濟緣釋云三師各受答不得者人法俱異故業疏又云又問得一年半年受否答得隨日多少受三歸也濟緣釋云彼宗五八局時三歸通故業疏云五趣為言皆得受也除報重者自餘山間空遠輕繫地獄皆成三歸除不解者濟緣釋云修羅遍在五道故但云五趣除報重者別簡下趣以人天二趣自可受故文舉輕獄鬼畜類知除不解者通簡五趣以人天不解亦不成故已上皆見業疏記卷十第二節五戒五戒中分為七項一戒德高勝二簡人是非三預習發戒四歎功問相五懺悔清淨六作法差別七料簡雜相第一項戒德高勝羯磨注云經云有善男女布施滿四天下衆生四事供養盡於百年不如一日一夜持戒功德以戒法類通情非情境故也業疏釋云初受戒時已行三施盡衆生界故財有量不及此也盡形不盜者已施法界有情之財言不殺者已施法界有情無畏即用戒法行己化他即名法施遍衆生界財為局狹集散之法能開煩惑惱害之門戒法清澄故絶斯事濟緣釋疏云初總示以初受時立誓斷惡遍生境故財法無畏施為三施盡下二別列不盜不妄取即是施財不殺無侵惱即施無畏此二自行令他倣之即法施也財施濟彼困窮無畏令他安樂此二即慈悲也法施使彼開悟即智慧也三者既備其勝可知財下三通結初句示財施局狹一不具三施二不遍生境集下明財施生過集則不免貪求散則寧無取捨得者則喜不得則瞋能開煩惱故不及戒羯磨注續云論云由戒故施得清淨也業疏釋云智論云若不持戒得財施者多貪不淨以利求利惡求多求故使來世受不淨果如牛羊豬狗衣食粗惡若持戒者既絶惡求清淨行絶乃至佛果濟緣釋疏云前明破戒行施之損若下次明持戒行施之益已上皆見業疏記卷十第二項簡人是非羯磨注云當於受戒前具問遮難故善生經云汝不盜現前僧物否於六親所比丘比丘尼所行不淨行否父母師長有病棄去否殺發菩提心衆生否濟緣釋云注中四種乃性重中極重之者白衣有犯障戒不發不列大妄非彼犯故見病棄去可攝殺中若有遮難者懺淨可受五戒唯污尼或污比丘者已後不許出家業疏云如成論中五逆罪賊住污尼毗尼不許者是人為惡所污能障聖道故不許出家若為白衣得善律儀不遮修行施慈等善有世間戒準此有過如文不合必懺蕩已二教無違但業重障深不發具戒也濟緣釋云初引文中二初明制出家意若下明通在家意且令誘接住善道故施慈等者布施修慈皆世福故準下次義決雖通五戒必約懺淨為言有過不懺如注所簡故云不合二教即世教與佛制也恐疑懺淨容可出家故約深重釋通教意已上皆見業疏記卷十五逆賊住污尼或比丘皆十三難攝已後不許出家賊住者未受具足戒人竊入僧中共受利養或盜聽正作羯磨等即成出家之障難若白衣偷閲僧戒律或但聞僧中説戒雖非障難亦佛制所不許如戒疏云下衆無知多生慢習制令耳目不屬則重法尊人生其欽仰是蓋恐起輕易之心故制不許與賊住異也第三項預習發戒業疏云將欲受戒初須説緣境寬狹令受者志遠見相明白濟緣釋云前四戒並遍有情上發唯酒一戒亦遍無情發並同具戒先須開導志遠謂立誓要期見相謂識知境量見業疏記卷十前四戒中盜妄二戒亦兼無情如下發戒境量中明事鈔云薩婆多云凡受戒法先與説法引導開解令一切境上起慈愍心便得增上戒資持釋云引論明須師教説法語略總下境心言開解者解即是智戒法深廣非智不剋一切境者即情非情識境發心納體正要不可粗略學者至此必須深究多見誦語二俱墜陷寧無畏乎見事鈔記卷八預習發戒中分為四支一所受法體二發戒境量三依境發心四用心承仰第一支所受法體芝苑云標心期受須識何法謂佛出世制立戒法禁防身口調伏心行十方諸佛三乘賢聖並同修故名為聖法今者發心誓稟此法作法而受因緣和集心境相冥發生無作領納在心名為戒體故知受時彌須用意一生大事不可自輕見芝苑遺編卷三第二支發戒境量芝苑云所緣境即法界衆生依正等法戒依境制體從境發境既無量體亦無邊見芝苑遺編卷二芝苑又云緣境雖多不出有二一者情境即十方三世恆沙諸佛及諸菩薩緣覺聲聞諸天世人修羅地獄餓鬼畜生下至蚊虻蚤蝨微細蠢動六趣之外中陰衆生如是等類皆遍十方並通三世無量無邊不可稱數皆發得戒二者非情境謂一切世間微塵國土山河大地草木花果乃至一花一葉一物一塵隨其數量亦皆發戒至於空有二諦滅理涅槃聖教經卷形像塔廟地水火風虛空識等見芝苑遺編卷三此文宗事鈔資持有釋義今引如下資持釋云空有下四句別舉二寶據情非情攝境斯盡為遮疑濫故須別示上句明化相法也佛説四諦即攝世及出世凡聖因果苦集道三名有諦滅即空諦亦名真俗二諦次句理即理體法也異上空諦是教攝故下二句即住持二寶問此並非情何須重舉答恐謂聖境非戒緣故問化理二法云何發戒答疏云俱有損壞毀謗義故如提婆破法之類問化相不明佛住持不言僧者答並情收故理中佛僧俱無別體所以可知地水下別舉六大上五非情後一是情風空及識境相難見故復示之如盜戒説又復須知隨戒多別如淫殺等單情境也如酒等唯非情也如盜妄等則兼二種謂盜分四主物兼六大妄對所誑復規利養見事鈔記卷八盜分四主物兼六大妄對所誑復規利養者若據盜戒所損之物主妄戒所誑之人唯局有情若論盜戒所盜之物體妄戒所規求之利養則兼無情盜戒中物主及物體最為廣泛殆攝盡一切情非情境如下持犯篇委明芝苑又云且現前色心無量劫來今生之中造生死業不可窮數惡心遍布充塞法界經云若有體相盡虛空界不能容受若得戒者則翻無量惡業悉為清淨戒體為善種子作成佛本基南山祖師云未受已前惡遍法界今欲進受翻前惡境並起善心故戒發所因還遍法界見芝苑遺編卷三資持云言法界者若就教限則局三千大千今從圓意須論十方法界無作之體稱境而發等法界量見事鈔記卷八資持云森然萬境何事非持若不先發行自何生故知受前預須委學今時昧教誰復知之資持云攬無邊戒法歸無盡識藏成善種子作聖道基翻無始惡緣俱為戒善變有漏苦報即成法身我等云何不自珍敬佛恩深重粉骨難酬苦海導師朽宅慈父願從今日盡於未來竭力亡身常贊三寶廣度羣品少答聖慈事鈔云如是隨機廣略令其悟解若不知者心則浮昧受戒不得徒苦自他薩婆多云若淳重心則發無教輕則不發豈可虛濫理當殷重資持釋云隨機者須觀利鈍所宜廣略大論示導取解為期浮謂不重昧即不明薩下引示得否由心重輕誡令策進必使開解已上皆見事鈔記卷八資持云重輕二心難顯其相非謂徒然懇惻而已要在見境明白上品要誓方名增上重心見事鈔記卷十五資持云問所以須示境者答衆生造惡由迷前境惡業既因境起善戒還從境生是制法之所依為發戒之正本若不明境將何用心特此廣張深有遠致見事鈔記卷八第三支依境發心事鈔云次令發戒應語言當發上品心得上品戒資持釋云如諸律論多言上品前引多論但云增上彼論又於五十具中各分上中下心則為九品然是通論心之濃薄亦不明示三品之相此中欲令受者知心限量故約文義次第明之獨此精詳餘皆不述勸發唯言上品故知中下非是正意為顯上品令知優劣事鈔云毗跋律曰發心我今求道當救一切衆生衆生皆惜壽命以此事受是下品軟心雖得佛戒猶非上勝資持釋云下品中言求道者所期果也救衆生者所修行也然雖救生行有深淺一不害彼命二以法開導三令得究竟度前不得後後必兼前約義推之初但護命不令得脫即二乘心前云求道正據小果中品所修以法開解自他兩利度非究竟即小菩薩雖期佛果行處中間望前雖勝比後猶劣上品引導令至涅槃同歸佛道即大菩薩行準沙彌篇三位配之恰然符合學者至此宜須明辨三心所期行果分齊準沙彌篇三位者即今編中別行篇三觀之文事鈔續云餘二就義明之云何中品若言我今正心向道解衆生疑我為一切作津梁亦能自利復利他人受持正戒資持釋云中品中初明期果須約佛乘解下期行明兼兩利津梁是喻衆生墮疑故受生死能為開解令彼得度生死如津我身如梁法喻可見事鈔續云云何上品若言我今發心受戒為成三聚戒故趣三解脫門正求泥洹果又以此法引導衆生令至涅槃令法久住資持釋云上品中三初明自利行又下明利他行令法下明護法行初中為成下明遠期也上二句大乘三學即因行也下句求大涅槃即圓果也三聚戒者出瓔珞經聚即總攝為義菩薩三聚攝行斯盡一攝律儀戒律儀禁惡結業煩惱究竟斷故即止行也二攝善法戒世出世間大小修證究竟修故即作行也三攝衆生戒一切含識究竟度故即四攝行亦名饒益有情戒三解脫者雖是觀慧非定不發即定慧二學絶縛證真由此得入故號三解脫門然名通小教今對三聚須局大乘一空解脫門即性空也二無相解脫門即相空也三無作解脫門即唯識也亦名無願懺篇三觀別配三位此明大行須約圓修泥洹果者名亦通小取大可知問今此所受為即三聚為非三聚若云即者後須更受菩薩戒否又復大小混亂如何分別若云非者戒從心發既發此心那非此戒大見錯解故特提示使自求之次明利他此法即上因行涅槃即上果德三護法中自利利人傳傳相續佛種不斷故得久住深慮詞繁略示梗概所謂書不盡言言不盡意自非經遠優柔積習淺識粗心何由可解餘廣如疏事鈔云如此自知心之分齊得佛淨戒亦有分齊資持釋云良以無作假作而生既非色心無由表示必約能領顯戒優劣前明上品所期遠大所納之體定知增上故云有分齊也事鈔云問此教宗是何乘而發大乘志耶答此四分宗義當大乘光師亦判入大乘律限資持釋云前明上品越教乖宗故須問釋答中初二句標示言義當者則顯教宗本非是大有義相當疏云分通意亦同此光師下攀古例然彼所判太成通漫文雖引據意不全取四分是大將何為小即應梵網體行全同菩薩聲聞二戒無別定知不爾是以祖師所立語意從容義當分通深符教旨問上品心者為全是大為分通耶答扶成本宗分通義耳問分通之義出自何人答如來立教被此機緣部主深知還符佛意別立成宗是以前後律序法正所安多伸此意豈不明乎已上皆見事鈔記卷八疏云分通者見後戒體門假名宗支芝苑云問此與菩薩戒體為同為異答體同緣異言緣異者大則三歸四弘請師問遮三番羯磨諸餘法式與今小宗兩途迥別言體同者以緣為旁助心是正因緣疏因親體從因發前既心發上品故知今體即大乘問體若同者持犯立懺諸餘行相如何分別答體雖約圓行必依受既受從當教故行相無差若爾持犯既依教限出體何必約圓答體既多途故須圓會律儀不異故得就宗又依教奉持則受隨相應約圓開解使域心於處既開顯大解依小律儀即成大行豈須棄捨方曰大乎故疏云常思此行即攝律儀等見芝苑遺編卷一事鈔云如是發戒緣境及心有增上此之二途必受前時智者提授使心心相續見境明淨不得臨時方言發心若約臨時師授法相尚自虛浮豈能令受者得上品耶或全不發豈非大事資持釋云牒上二科誡令早示使下二句即上心境心須念念無間境必法法無昧毫差即失可不慎乎今時昧教但知學語豈非宿業所追致使此生虛喪深須責己期遂將來虛浮者以臨事倉卒多容舛謬故見事鈔記卷八第四支用心承仰芝苑云心境相應納體正要正作法時冥心運想遍緣如上情非情境由境廣故心亦隨遍念念現前不得浮散當想己身總虛空界容受法界塵沙戒法當此之際深須用意莫緣他事差之毫微則徒染法流一生虛喪可不慎哉見芝苑遺編卷三第四項歎功問相羯磨注云善生經云具問遮難已若無者應語言此戒甚難能為聲聞菩薩戒而作根本善男子戒有五種始從不殺乃至不飲酒若受一戒是名一分優婆塞具持五戒名為滿分優婆塞汝今欲受何分之戒當隨意受爾時智者應隨語為受業疏釋云善生經中問戒相者以法行務意存始終不取受具致有隨闕觀其志力察其智愚量功進法不徒虛受濟緣釋疏云此明分受所以受具謂具受五條也隨闕謂受已毀犯也業疏云問前翻邪三歸直爾即授此五戒歸如何簡略者答翻邪背邪初心難拔欻然回向宜即引歸若更覆疏容還舊迹五戒不爾先以歸正心性調柔堪思我倒故須簡略方入道門以五體有虧三乘無託仍隨分受皆是任時能接機布教可準知也濟緣釋云前受歸法不制簡能與此不同故須問決簡謂簡取略即略去答中二初答三歸不簡覆疏謂反覆疏理舊迹即邪道五下次答五戒須簡中初彰異一曾受歸法不慮退還二為入道門須簡淨器五戒是聖道之基有虧則三乘無託恐有輕犯故須簡略仍下準例以體淨者猶須量能聽隨分受明知慮犯故制簡之故云可準知也已上皆見業疏記卷十第五項懺悔清淨羯磨注云阿含等經云於受前懺罪已然後受法業疏釋云阿含等下明行淨納法也但無始無明是生死本若理若事順違俱罪故須前懺使心清淨方堪聖法濟緣釋疏云先懺後受經論並然故注云阿含等妄起不覺謂之無始無明業苦所依故為生死之本動念違理作惡違事澄心順理修善順事違罪可知順有罪者以凡心學道本惑尚存造理則取捨未忘行事則我人難拔所以順違二俱有罪義須懺淨以應淨法故云故須等見業疏記卷十第六項作法差別作法差別中分為三支一臨時開導二正納戒體三示相教誡第一支臨時開導事鈔云若至此時正須廣張示導發戒正宗不得但言起上品心則受者知何是上品徒自枉問今薄示相貌臨事未必誦文資持釋云言正須者顯前發戒且令預習未是正用今將納法縱令已解更須委曲選擇要語激動蒙心戒師當此不可率易策導開解納法之本故云正宗事鈔續云應語言善男子深戒上善廣周法界當發上心可得上法今受此戒為趣泥洹果向三解脫門成就三聚戒令正法久住等此名上品心資持釋云初指法體當下正示發心事鈔續云次為開廣汝懷者由塵沙戒法注汝身中終不以報得身心而得容受應發心作虛空器量身方得受法界善法故論云若此戒法有形色者當入汝身作天崩地裂之聲由是非色法故令汝不覺汝當發驚悚意發上品殷重心資持釋云五蘊色心宿因所感故云報得法既周廣劣報不容必須運動方堪領納故云應發心等虛空無邊身量亦等心法相稱攬法歸心還依報得事鈔續云今為汝作法此是如來所制發得塵沙法界善法注汝身心汝須知之資持云初則鼓令動轉次則舉集在空後則注入身心領納究竟三法次第各有所主由心業力不思議故隨所施為無非成遂已上皆見事鈔記卷九初次後三法者若約受五八戒言即三説三歸誓而納戒體如下文所載第一遍説歸誓時法界善法由心業力翻惡為善悉皆動轉第二遍説歸誓時法界善法聚集空中如雲如蓋第三遍説歸誓時法界善法從空中下注入身心充滿正報濟緣云攬無邊聖法蘊有待凡軀五分基成三身體具超凡鄙穢流入衆聖寶位者其斯之謂乎見業疏記卷十五第二支正納戒體事鈔云作法者我某甲歸依佛歸依法歸依僧盡形壽為五戒優婆塞如來至真等正覺是我世尊三説我某甲歸依佛竟歸依法竟歸依僧竟盡形壽為五戒優婆塞如來至真等正覺是我世尊三結資持釋云詞句分五一陳己名二歸三寶回向境界三盡形等顯所期文舉盡壽或一日夜或月或年隨時自改四為五戒者正立誓也且舉滿分或一分二分亦在臨機五如來等結歸正本也以三寶名通九十六種後須顯正非同前濫由此勝號外道無故如來者乘如實道來成佛也至真者體悟無邪也等正覺者道同三世也此實我歸餘非敬者故云是我世尊前三歸誓正發戒緣三法才竟即納戒體後三歸結是囑非體見事鈔記卷三十九羯磨注云三授已告云向授三歸正是戒體今又三結示戒所歸業疏釋云告令戒體者令知得時節不比由來説後戒相方云受戒也濟緣釋疏云多論云有言三歸竟説一不殺戒爾時得戒以勢分相著本意受五故有言説五戒竟得戒恐有執此故特揀之彼論自云諸説中受三歸已得者此是定義即今所取也見業疏記卷十第三支示相教誡事鈔云智論戒師應語言汝優婆塞聽是多陀阿伽度阿羅訶三藐三佛陀為優婆塞説五戒法相汝當聽受盡形壽不殺生是優婆塞戒能持否答能盡形壽不盜是優婆塞戒能持否答能盡形壽不邪淫不妄語不飲酒並準上説資持釋云多陀此云如阿伽度此云來阿羅訶此云應應即應供三藐三佛陀此云正等正覺亦舉三號令生信奉五戒相釋義如後持犯篇持犯別相中具明後八戒相亦爾事鈔續云是為在家人五戒汝盡形受持當供養三寶勸化作諸功德年三月六常須持齋用此功德回施衆生果成佛道資持釋云是下囑纍有四初囑謹護二勸作福三令受齋四教回向年三者正五九月冥界業鏡輪照南洲若有善惡鏡中悉現或云天王巡狩四天下此三月對南洲又云此三月惡鬼得勢之時故令修善月六白黑兩半各有三日按智論初八天王使者下十四天王太子下十五天王自下觀察衆生善惡二十三二十九三十日亦爾小盡準布薩應用初一持齋者或受八戒或但持齋中前一食中後不得妄噉今多蔬菜不節晚食此雖非齋猶勝葷血又有飲水周時為清齋者此乃邪術一切衆生仰食而住但勿過中是佛正教已上皆見事鈔記卷三十九業疏云多論問曰不受三歸得五戒否答不得也要先授歸方得戒矣所以説戒名者欲使知名令護行故濟緣釋云初定發體必在三歸所以下次明説相別有所為見業疏記卷十第七項料簡雜相料簡中且舉多宗成宗對明差別有六種一對趣二漸頓三延促四具支五自誓六重受并附列表於文後業疏云多論云龍畜生攝以業障故無所曉知無受戒法雖經中説受八齋法但得善心功德不得齋也成實云餘道衆生得戒律儀經説諸龍亦受一日戒故善見中諸龍及神得三歸五戒也義準多論據無知者人猶不得何况鬼畜如餘得者謂有知解濟緣釋云雖經等者即善生中龍受八戒論家防難以意釋之齋即八戒然是成論所據即如下引善見神者即是鬼趣業疏云若準多論五戒不具分受則不得戒縱引經證謂持二三不言受體成論云有人言五戒木叉唯頓無漸此事如何論答隨受一二三皆得律儀善生所列一分二分少分多分滿分是也準斯明漸五師受一得戒不疑如薄俱羅唯受不殺例也濟緣釋云不具分受謂不受五而受一二則不發戒體縱引經者論家防難即下善生明分五受彼謂受時具發五戒但由隨中持有多少故有一分少分等次成論中頓謂具受漸即分受以前三歸不許互闕異師別受並判不成恐謂同彼故準決之薄俱羅此翻善容以彼好容儀故婆羅門種天竺國人昔毗婆尸佛時曾作貧人持一訶梨勒果施病比丘服訖病愈以此因緣九十一劫天上人中受福快樂今生婆羅門家其母早亡後母惡之屢害不死後求佛出家得阿羅漢年一百六十歲未曾有病蓋從昔嘗持一不殺戒故受斯報準知分受理無所疑業疏云如多雜二論解云五戒一受佛制定故必須盡形八戒必一日夜不可乖也如成實中亦隨日受乃至盡形濟緣釋云五戒盡形不可促八戒日夜不可延故云佛制定也次引成論二戒延促任意皆得故云隨日也已上皆見業疏記卷十事鈔云智論問口中四過何為但有妄語答但舉妄語餘三並攝又佛法貴實語故在先攝也資持釋云若據有部但發四支成宗具七與論頗同故引示之答中上二句正答舉一又下轉釋舉妄恐云何不於餘三中趣舉一耶故此釋之見事鈔記卷三十九芝苑云彼五八十唯發四支比丘方具此宗七衆七支齊禁見芝苑遺編卷一業疏云如律文中皆自誓受者多論文云聽五衆受兩俱得也濟緣釋云本律智論皆聽自誓多論俱舍並制從他雖云兩得準下八戒無師故開有則不許業疏又云約此問答從他受也律中云世尊我今歸依佛法僧盡形不殺乃至不飲酒此令自誓八戒既開此應得也觀時進否義非抑塞接俗之化隨機而舉可也濟緣釋云初指上從他律下次明自誓成論八戒亦通自誓文如後引業疏云若準多論不得重受依成實四分俱開重受故末利夫人第二第三重受五戒即其證也濟緣釋云多宗五戒其必盡形故但一受義無重加成宗不爾任時長短隨受隨增二三重受事見本律已上皆見業疏記卷十一對趣多宗餘道衆生不得戒成宗餘道衆生得戒二漸頓多宗不具受不得戒成宗不具受得戒三延促多宗五戒必盡形八戒必一日夜成宗延促任意皆得四具支多宗但發四支成宗皆發七支五自誓多宗定從他受成宗開自誓受六重受多宗不重受成宗開重受第三節八戒八戒中分為六項一釋名二功益三簡人四懺悔五作法六料簡第一項釋名業疏云云戒云齋云關者衆名乃異莫不攝淨歸心也言八戒者八即所防之境戒則能治之業言八齋者齋謂齊也齊一其心或言清也靜攝其慮如世間室亦號齋也言關齋者即禁閉非逸靜定身心也濟緣釋云初總示三名或處單稱或處連呼云八關齋戒並如經律呼召不同息緣離過善法內增故云攝淨歸心也言下別釋三初釋戒義所防是過能治即行次釋齋義有二齊取專注心無差別清取離過絶諸雜想世中齋館亦取間靜之意三釋關義從喻為名如世門關防姦止寇即禁閉義也見業疏記卷十第二項功益業疏云多云經説作閻浮王於人中寶一切自在不如八戒十六分一濟緣釋云閻浮王即轉輪王彼國一錢重十六分故經論中多舉為比業疏云善生云除五逆罪餘罪皆滅業疏云智論云譬如軟將將兵終竟無動健將破敵一日之中功蓋天下五戒八戒其相同此良由五但離邪未能清絶八行全淨相同無漏約期乃少取行則多故功益彼濟緣釋云欲為生死本絶欲則超生故唯約淫以分勝劣時少則不及盡形行多則加彼三戒仍斷正淫業疏云成實云天王福報亦所不及帝釋説偈佛止之曰若漏盡人應説此偈六齋神之日奉持於八戒此人獲福德則為與我等濟緣釋云天王即帝釋是三十三天主故據論帝釋先説偈佛方止之文中引倒偈云六齋神之日謂天神下降日也則為與我等帝釋自謂受持八戒福與己同佛呵止之若漏盡人可説此偈則與三乘聖人無漏福等帝釋天福所不及也已上皆見業疏記卷十義鈔云優婆塞受三歸五戒者聞佛説法得下二果不證三四受八戒者亦證三四見拾毗尼義鈔卷一第三項簡人義鈔云八戒亦問諸難準五戒解見拾毗尼義鈔卷一第四項懺悔事鈔云次為懺悔智論云我某甲若身業口業意業不善貪瞋癡故若今世先世有如是罪今日誠心懺悔三業清淨受行八齋是則布薩資持釋云布薩翻淨住亦云清淨事鈔云增一若受八齋先懺悔罪後便受戒已上皆見事鈔記卷三十九第五項作法作法中分為二支一正納戒體二説相發願第一支正納戒體受前應預習發戒及臨時開導等皆同五戒可以例知羯磨注云俱舍論云前受戒者下坐合掌隨施戒人語勿前勿俱若違不成業疏釋云隨施戒人語者師資道成授受有儀非輕法故見業疏記卷十受三歸五戒時亦應準此事鈔云次受法者智論云受一日戒法長跪合掌應作是言我某甲歸依佛歸依法歸依僧一日一夜為淨行優婆塞三説我某甲歸依佛竟歸依法竟歸依僧竟一日一夜為淨行優婆塞竟三結資持釋云文為四段初稱名二歸境三限期準下成論受通長短隨人加改四立誓見事鈔記卷三十九業疏云言淨行者以所期時奉持九支同諸佛戒故云淨也何以不言如來正覺者五戒初離邪緣故以正隔之今於五上重增勝行復何須也濟緣釋云以同佛戒故名淨行私釋對前五戒未斷正淫故加簡之由五戒後具列三號今文既闕故此通之若爾不受五戒直受八戒非是重增理須加唱私釋作法加簡非正受詞義應通得文中且據一往釋耳見業疏記卷十第二支説相發願事鈔云次為説相如諸佛盡壽不殺生我某甲一日一夜不殺生亦如是如諸佛盡壽不盜我某甲一日一夜不盜亦如是如諸佛盡壽不淫我某甲一日一夜不淫亦如是如諸佛盡壽不妄語我某甲一日一夜不妄語亦如是不飲酒不坐高大牀上不著華鬘瓔珞及香塗身熏衣不自歌舞作樂及故往觀聽亦如是已受八戒如諸佛盡壽不過中食我某甲一日一夜不過中食亦如是我某甲受行八戒隨學諸佛法名為布薩資持釋云正説相中全依智論準文九戒而言八者多論云齋以過中不食為體八事照明故成齋體謂以八戒禁防非逸方顯持齋清淨故云照明共相支持名八支齋故言八齋不言九也所以不過中食在後獨明若依羯磨則合高牀歌舞為一過中為八又增一中過中為第六合嚴身觀聽為一皆所出不同隨依並得事鈔續云願持是布薩福報願生生不墮三惡道八難我亦不求轉輪聖王梵釋天王世界之樂願諸煩惱盡逮得薩云若成就佛道資持釋云教發願中初離惡趣我下揀世報願下示所求薩云若亦云薩婆若此云一切智已上皆見事鈔記卷三十九隨機羯磨中説相發願皆與事鈔不同今録於下隨依並得羯磨云授戒相言如諸佛盡形壽不殺生某甲一日夜不殺生能持否答言能持如諸佛盡形壽不盜某甲一日夜不盜能持否答言能持如諸佛盡形壽不淫某甲一日夜不淫能持否答言能持如諸佛盡形壽不妄語某甲一日夜不妄語能持否答言能持如諸佛盡形壽不飲酒某甲一日夜不飲酒能持否答言能持如諸佛盡形壽離華香瓔珞香油塗身某甲一日夜離華香瓔珞香油塗身能持否答言能持如諸佛盡形壽離高勝牀上坐及作倡伎樂故往觀聽某甲一日夜離高勝牀上坐及作倡伎樂故往觀聽能持否答言能持如諸佛盡形壽離非時食某甲一日夜離非時食能持否答言能持業疏釋云如諸佛至不殺生舉勝境所行也某甲已下引已上同問答之相顯成持誓有本云我某甲一日夜不殺生亦爾者直述己契上同於佛不假問答亦成説相餘並準此第三淫戒者以自他俱遠故有人云邪淫者此五戒相由制他開自故八戒云邪者誤也第五戒相有人加辛肴者正文無此既受淨身焉噉羶臭理不可也第六華瓔油塗者中梵以為美飾此方所重衣服裝校脂粉塗面以為修身如論離舊莊嚴義須準的第七離高勝牀及觀聽倡伎者合二散慢緣為一戒也羯磨續云阿含經云如上次第授已當教發願言我今以此八關齋功德不墮惡趣八難邊地持此功德攝取一切衆生之惡所有功德惠施彼人使成無上正真之道亦使將來彌勒佛世三會得度生老病死業疏釋云二明願中自他兩利也由持齋德對治惡趣者滅戒難也八難者滅障聞思難上明自益也他惡攝取己善惠人者行大道心也使成正道者不從他方便唯一乘法也將來三會者緣遇慈氏近可寄心濟緣釋疏云初總示由下別釋二初釋自利戒法唯人得受故惡趣為戒難聞思修慧須生善道值佛聞法具根正信故八難為聞思障他下次釋他利行大道心即菩薩行方便是二乘權教一乘即佛道實教豈唯八戒一宗立教皆用此意學者宜知已上皆見業疏記卷十第六項料簡料簡中分為四支一對簡多宗二遲受開成三獨受離過四斷惡攝淨第一支對簡多宗對簡中且舉四種一簡衆二漸頓三延促四自誓餘同五戒料簡雜相中業疏云多論云受八戒人在七衆中何衆所攝雖無終身戒而有日夜戒應名優婆塞若得名者又無終身戒若言非者又有日夜戒止得為中間人也即七衆之外更有木叉八戒也濟緣釋云初標問雖下答通彼宗五戒定須盡形名終身戒八戒唯一日夜故名日夜戒若下轉難止下重釋望非終身不當與名望有日夜不可無名在可否之間故云中間人也五十具戒位通七衆並須盡形所以日夜不在其數若爾受八戒者究竟何名答如受法云淨行優婆塞豈非名耶上據多宗五八局時故在七衆之外若取成宗通收俗衆非七外矣見業疏記卷十事鈔云成實云亦得隨受一二三及日月長短並成見事鈔記卷三十九羯磨注云多論云若受八戒應言一日一夜莫使與終身戒相亂成實云五戒八戒隨日月長短或一年一月乃至半日半夜重受減受並得業疏釋云一日夜者以五種三歸文相叢雜故須簡定義無混亂故準多宗必一日夜不通過減成實隨力多少者接俗之教不可約之如上説也濟緣釋疏云初出彼宗之局次準成論二戒並通時日多少羯磨注云論中令五衆授之成實云若無人時但心念口言乃至我持八戒亦得成受業疏釋云多論五衆通授者皆是弘法之人成智二論開自受者非謂常途故彼文云若無人時得心念受明緣開也濟緣釋疏云多論定從他受彼云夫受齋法必從他受於何人邊受五衆邊受成智二論並開自受文約無師義兼緣礙已上皆見業疏記卷十第二支遲受開成羯磨注云俱舍論云若先作意於齋日受者雖食竟亦得業疏釋云由觀他因緣不起犯戒心故業疏云若將欲受難事不得待難解已受者亦成濟緣釋云如王賊繫閉等緣心通事礙中後開成已上皆見業疏記卷十第三支獨受離過事鈔云善生受八戒不得多唯獨受資持釋云善生不得多者恐人參混心不專一泛論歸戒獨受為佳則心不他緣法無通濫今多衆受於理雖通終成非便見事鈔記卷三十九第四支斷惡攝淨業疏云善生云若諸貴人常敕作惡若欲受齋先遮斷已後方成就若不遮者則不成也成實云有人依官舊法或為強力令害衆生謂無罪者亦得殺罪以緣具故濟緣釋云初引善生明成否貴人即王大臣常敕作惡謂行殺戮鞭捶等事次引成論以遮疑依官舊法如宰官秉政依國典刑或為官所使刑戮於人癡人多謂自無有罪業疏云若已受齋鞭打衆生雖即日不行待明當作皆齋不淨以要言之若身口作非威儀事即名不淨若心起貪瞋害覺雖不破齋齋不清淨若不修六念等亦名不淨濟緣釋云初身口犯待明當作即要期業若心下二明意犯違情故瞋惱他為害上二皆作犯若不下三明止犯以受戒者當須逐日念佛法僧及天戒施故已上皆見業疏記卷十上來戒法中第二章歸戒儀軌竟上來宗體篇中第一門戒法竟第二門戒體戒體中分為四章一戒體相狀二受隨同異三緣境寬狹四發戒數量資持云戒體四章初二論體二中兼行三四屬法四中有相一往粗分委如下説標云戒體而併明戒法戒行戒相者以示四門互相攝故事鈔云所以別解脫戒人並受之及論明識止可三五皆由先無通敏不廣咨詢致令正受多昏體相盲夢心中緣成而已及論得否渺同河漢故於隨相之首諸門示現準知己身得戒成否然後持犯方可修離資持釋云盲喻無知夢喻不實河漢喻其茫然不知涯際已上皆見事鈔記卷十六第一章戒體相狀戒體相狀中分為二節一能領心相二所發業體第一節能領心相事鈔云戒體者若以通論明其所發之業體今就正顯直陳能領之心相資持釋云初標指彼此所發即無作相謂心之相狀事鈔續云謂法界塵沙二諦等法以己要期施造方便善淨心器必不為惡測思明慧冥會前法以此要期之心與彼妙法相應於彼法上有緣起之義領納在心名為戒體資持釋云二正示心相三初二句示戒量法界者十界依正也塵沙者喻其多也二諦者佛所立教也此謂約境顯戒故云等法以己下二正明心相初句立誓盡一形壽次句通包禮敬陳詞身口二業善下明屏絶妄念測下明心法相應測思者成業之本得戒之因三品心中隨發何等明慧者反照心境如理稱教而非倒想妄緣前境上明用心下明合法由上起心必須遍緣塵沙等境法從境制量亦普周心隨法生法廣心遍心法相應函蓋相稱故云冥會法猶在境以心對望故云前法下云彼法義亦同然以此下三明納體又三初二句躡上冥會於下明法隨心起法是無情由心緣故還即隨心故三法納體之時初動於境次集於空後入於心法依心故名為法體領下示體所在若據當分體是非心不顯所依體與心異今言在心乃取圓意即指藏識為所依處資持云問何不直示無作而明心相者答能領之心發體正要獨茲曲示餘並無文若乃考得法之元由決所受之成否苟迷此旨餘復何言或無記妄緣或泛爾餘善一生罔象畢世遲疑無戒滿洲聖言有旨故茲提示義不徒然已上皆見事鈔記卷三第二節所發業體所發業體中分為六項一辨體多少二立兩解名三依論出體四顯立正義五先後相生六無作多少第一項辨體多少事鈔云問別脫之戒可有幾種答論體約境實乃無量戒本防惡惡緣多故發戒亦多故善生云衆生無量戒亦無量等今以義推要唯二種作及無作二戒通收無境不盡資持釋云答中初約境示量今下舉要統收今正明體此二為要故偏舉之通收盡者由此二戒懸防總發體中含攝故此收法體而言境者欲明遍境之法皆歸二戒故見事鈔記卷十六第二項立兩解名立兩解名中分為二支一立兩所以二并解名義第一支立兩所以事鈔云問曰何不立一及以三種資持釋云言不一者欲顯相須故約互廢以問及以三者業疏作何不三合謂有作俱無作二法同時宜應更立一合次前為三事鈔續云答若單立作作休謝往不能防非又不可常作故須無作長時防非若單立無作則起無所從不可孤發要賴作生二法相藉不得立一資持釋云初答不立一中先明作須無作作休不防者以作短故不可常作者心或餘用故次若單下明無作須作二下結示事鈔續云何為不三但由體相道理相違一作無作別二心非心別性不可合但得立二若就所防隨境無量資持釋云次答不立三中作無作別者動靜異故心非心別者體相違故若下釋疑以不許立三恐謂戒法唯局此二故特釋之顯上且據能防故唯二也已上皆見事鈔記卷十六第二支并解名義事鈔云問曰既知二戒請解其名資持釋云結前生後總問三名三名者作及無作是別名戒即通名共為三也事鈔續云答云所言作者如陶家輪動轉之時名之為作故雜心云作者身動身方便資持釋云作即方便構造為義陶家謂土作家輪即範土為壞器之車運之則轉故以喻焉四大質體名報色從緣動作名方便報起方便方便依報二法相假不一不異但言報未必是方便言方便其必具報今以輪木喻報質輪動喻方便即名其動以為作耳故下引證身及動身對喻可解事鈔續云言無作者一發續現始末恆有四心三性不藉緣辦故雜心云身動滅已與餘識俱是法隨生故名無作成論無作品云因心生罪福睡眠悶等是時常生故名無作資持釋云一發者一猶始也此句明業體初成即三法竟第一剎那與作俱圓是體發也作戒既謝無作獨存相繼不絶故云續現始即上句一發之時末即是終謂命終捨也雖通四捨且約常途故餘三不舉此句明業體久長也四心者通舉四陰三性者別示行陰三陰唯無記行陰通三性故此句顯非心也下句正示無作義也若翻對作解初句反前即謝也次句反一念也第三句反善行心也第四句反緣構也故下引證有二雜心中初句躡前作謝生起無作餘識即四心後心望前作心故云餘也俱即同時是法即無作隨生謂任運起也成論中通明業理非局戒也因心者示現從作發也生罪福生即是發罪福即善惡無作文舉無記等取餘心一發續現等文初學難解今據後第五項先後相生文義列表如下以資參考今文云無作者即表中所謂形俱無作也始登壇後作戒生未竟無作戒作俱無作隨作生未竟形俱無作因成未現潛發三法竟第一剎那初一念作戒圓滿無作戒作俱無作圓滿形俱無作圓滿示現第二剎那第二念作戒謝無作戒作俱無作隨作謝形俱無作獨存四捨者見後戒行門因示捨戒章四心三性顯非心者參閲下依論出體無作體中又復意無戒律儀之釋文事鈔續云云何名戒戒禁惡法故涅槃云戒者直是遮制一切惡法若不作惡是名持戒資持釋云初二句直示正義由此二戒俱斷惡故故下引證遮制即禁斷義已上皆見事鈔記卷十六第三項依論出體濟緣云此門陳體且依二宗所計至後正義三宗分別始是今師正出體相見業疏記卷十五事鈔云二論不同今依本宗約成論以釋資持釋云二論即指多成然今鈔中依宗明體指略多宗恐後學至文壅滯故須略示業疏廣列六位分別今但撮要引而示之初明二戒並是有為非三無為由假緣構造四相所為故此有為無為分別三無為者虛空擇滅非擇滅也四相即生住異滅二諸有為法總為三聚一色聚二心聚三非色心聚二戒並色非餘二聚此有為中三聚分別三色有十一總括為三一可見有對色即色塵也二不可見有對色五根四塵三不可見無對色即法塵少分法塵有二一心法謂諸心數法二非心法過去色法無作即此色所收今作戒者身作即初色口作即第二色中聲塵身口無作並第三色此色聚中三色分別四色中又有二一本報色謂四大也二方便色謂運動造作作戒非本報是方便無作非二色此身口色中二色分別五作戒是善色聲非惡無記無作戒體是善可知此方便中三性分別六作業始終皆得為戒不同餘善無作當體是戒非此所論此就善中唯約作戒始終分別已上六位顯示彼宗二戒俱色作色即是色聲兩塵無作色者法入中攝名為假色見事鈔記卷十六依論出體中分為二支一作戒體二無作戒體第一支作戒體事鈔云先明作戒體論云用身口業思為體論其身口乃是造善惡之具資持釋云言作者始於壇場終三法竟第一剎那已前三業營為方便構造者是引論又二上句正出體身口業思者謂行來跪禮是身作也陳詞乞戒即口作也立志要期希法緣境心徹始終統於身口故名身口業思即此業思是作之體論其下示兼緣意言造具者顯示身口自無功用推歸心故如世造物百工之器自不能成必由人用比擬可知問業疏初解色心為體此何異耶答身口即色業思即心故無異也鈔從顯要令易解耳事鈔續云所以者何如人無心殺生不得殺罪故知以心為體資持釋云以犯例受者善惡雖殊發業義一故如律心疑想差不至果本又不犯中者擲刀杖瓦木誤著而死扶抱病人往來致死一切無害心皆不犯此雖動色但由無心故不成業事鈔續云文云是三種業皆但是心離心無思無身口業資持釋云引證即是成論初二句推末歸本下二句明捨本無末問今論作體為是心王為意思耶答前云業思何須疑問若觀論文三業皆心離心無思之語似指心王然而王數體用以分由體起用用即是體今論作業就用為言故業疏云言心未必是思言思其必是心宜細詳之事鈔續云若指色為業體是義不然十四種色悉是無記非罪福性資持釋云此對破有宗五根五塵四大為十四色已上皆見事鈔記卷十六第二支無作戒體事鈔云言無作戒者以非色非心為體資持釋云非色非心者此即成論第三聚名亦號不相應聚此聚有十七法無作即其一也良由無作體是非二故入此收即以聚名用目其體見事鈔記卷十六業疏云言非色者既為心起豈塵大成故言非色五義來證一色有形相方所二色有十四二十種異三色可惱壞四色是質礙五色為五識心所得無作俱無此義故不名色濟緣釋云釋非色中二初約能造對簡塵即五塵大即四大二並是色非彼所成明非色法五下次約色義反證即上塵大具此五義無作不爾一非形方二無差異三不可惱壞四非礙五非對十四種如前二十種即顯色十二青黃赤白光影明暗煙雲塵霧此局無記形色有八長短高下方圓斜正此通三性惱壞者論云是色若壞即生憂惱又云有情有惱無情有壞五識心即眼耳等五識所得即五塵也業疏續云言非心者體非緣知五義來證一心是慮知二心有明暗三心通三性四心有廣略五心是報法濟緣釋云釋非心中二初句對簡謂無作業體非覺知不能緣慮與心體異故號非心五下反證心具五義無作反之初非慮知即是上義二謂頑善無有愚智迷悟之異故無明暗三唯是善非惡無記四唯一定故無廣略謂意根為略四心六識乃至心數則為廣也五是三業造起故非報法業疏云故成實云如經中説精進感壽長福多受天樂若但善心何能感多福何以故不能常有善心故濟緣釋云引成論文二初證非心又二初引初段經文論家自引精進是作壽長是現報福多謂無作增長天樂是生報若下論家顯示經意人心不定豈能常善此顯無作一發已後任運增多不假心作即非心義業疏續云又復意無戒律儀所以者何若人在三性心時亦名持戒故知爾時無有作也以無作由作生今行不善心何得兼起作又發無作也由此業體是非色心故雖行惡本所作業無有漏失濟緣釋云二引後段中二初引論謂意思中無有戒體顯是非心三性心者謂餘善心及惡無記爾時無有作者謂意入餘性無有造作卻名持戒即知無作任運常存故名持戒以下疏家委釋又二初釋爾時無有作義由下次釋三性名持戒義業疏續云故彼問曰若無作是色相有何咎答色等五塵非罪福性不以色性為無作也又如佛説色是惱壞相無作非惱壞相不可得故不可名色濟緣釋云二證非色中又二初引前問答答中若立為色有二種過一非罪福性二是可惱壞如五塵四大具有惱害損壞之義業疏續云問無作為身口業身口業性即是色也答言無作者但名身口業實非身口所作以因身口意業生故説為身口業性又無作亦從意生如何説為色性如無色界亦有無作可名色耶濟緣釋云二引後問答問中身口是色業性亦應是色答中二初正名義實非身口作者以三性時無有作故因身口意生者謂從本作得名故又下次彰非色有二初約能造詰其所發如下二約空報質其因業已上皆見業疏記卷十五上引成論四段連續科文未易分辨今別録科表如下以備對閲引成論初證非心初引初段初論家自引經文二論家顯示經意二引後段初引論二疏家委釋二證非色初引前問答初問二答二引後問答初問二答初正名義二彰非色第四項顯立正義是項最為精要學者宜致力窮研資持云上且依論而示克論體相未甚精詳至於業疏方陳正義乃有三宗見事鈔記卷十六顯立正義中分為三支一實法宗二假名宗三圓教宗業疏云夫戒體者何耶所謂納聖法於心胸即法是所納之戒體然後依體起用防遏緣非今論此法三宗分別濟緣釋云初略示體貌納是能受心聖法即所受戒能所相冥心法和合而成於業攬法為業為道基本故名戒體體充正報心為總主故云心胸初受則心為能納法為所納受已則法為能依心是所依依體起用即隨行也今下次標宗別釋見業疏記卷十六第一支實法宗業疏云如薩婆多二戒同色者濟緣釋云薩婆多者以計標宗雜心俱舍毗曇並同此見業疏續云彼宗明法各有繫用戒體所起依身口成隨具辦業通判為色業即戒體能持能損既是善法分成記用感生集業其行在隨論斯戒體願訖形俱相從説為善性記業以能起隨生後行故濟緣釋云初依宗示體中四初至為色敘彼所計各有繫用即三界繫欲界粗段四大色界清淨四大所造之業所感之果皆是色法無色界天非四大造則無有色但無四大造色不妨彼天亦有果色隨具辦業具即身口能造是色所起亦色教與無教二法同聚故云通判為色業即下二句次示色義由無教體持則肥充犯則羸損有增損義故立為色既下三明業性本報無記從善惡緣方便轉現戒是善法教無教體二並善色既不推心造故云分成記用力用既弱不能感果故推隨行能生集業謂招生之業體是集因故云集業論下四結示體相願訖即作謝形俱謂無作至於終身望後隨行得名善記故曰相從是則由教生無教無教起隨行隨行能生集業集行招來報業疏續云如律明業天眼所見善色惡色善趣惡趣隨所造行如實知之以斯文證正明業體是色法也濟緣釋云二引律顯正中二初引文以下次取證若此明色乃佛本懷諸論爭分未窮斯意況弘論者罔測可知業疏續云如上引色或約諸塵此從緣説或約無對此從對説雖多引明用顯業色然此色體與中陰同微細難知唯天眼見見有相貌善惡歷然豈約塵對用通色性諸師橫判分別所由考其業量意言如此濟緣釋云三斥前諸説中三初牒前所立或約諸塵謂無作假色判歸法入即是法塵此對作戒色聲二塵故云此從緣説緣即作戒或約無對謂無作體是不可見無對即翻作戒二種有對故云此從對説雖下次斥其不達仍舉中陰例顯業色無色天報類亦同之如來由此説業為色諸師不曉立義強分故云豈約塵對等諸下三結其妄判即上六位分別已上皆見業疏記卷十六第二支假名宗業疏云二依成實當宗分作與無作位體別者濟緣釋云言當宗者對前非正學宗故位體別者對前二種體同故業疏續云由此宗中分通大乘業由心起故勝前計分心成色色是依報心是正因故明作戒色心為體是則兼緣顯正相從明體由作初起必假色心無作後發異於前緣故強目之非色心耳濟緣釋云初由宗通示中二初敘宗勝分下示體相二初明作體分心成色若論成法則內外色報率由心造若約成業則身口動作皆但是心色是依報等者若內外相望則國土為依四生為正若因果相望則色報為依心識為正兼緣即依報之色顯正即正因之心此明二法不相捨離故曰相從由下次辨無作反作為名不由色心造作故異前緣法體雖有而非色心無由名狀且用二非以目其體故云強也業疏續云考其業體本由心生還熏本心有能有用心道冥昧止可名通故約色心窮出體性各以五義求之不得不知何目強號非二濟緣釋云二約義考體中二初正示體相二初正示業體上二句推發生之始言由心者即第六識意思所造下二句示生已之功六復熏六故云還熏發體之心故云本心若論始起則心為能生體是所生若約熏習則體為能熏心為所熏心與業體互為能所有能有用能謂發起後行用即防遏緣非心道下推本所立心無形貌故曰冥昧但有名字故曰止可名通本唯心造心冥色顯所以兼之欲彰業體是彼所造故云窮出體性即此乃是示體之處恐亂宗旨不欲指破學者思之如前色心各有五義無作並無故號非二此明小教不可直示且附權意別彰異名故云強目問兩云強目是何教意答若據本教翻作為名今取通意識達體貌即知二非附權而立故云強耳業疏續云問如正義論熏本識藏此是種子能為後習何得説為形終戒謝答種由思生要期是願願約盡形形終戒謝行隨願起功用超前功由心生隨心無絶故偏就行能起後習不約虛願來招樂果濟緣釋云二問答釋疑中此問所來由後圓教決此二非以為識種識既常存種則無滅即違今宗命終失義故探取後文為難以彰前後無違初四句牒後圓教文也此是者指上二非也下二句正難且舉命終義通四捨答中三初二句總標思即緣境之心願謂剋期之誓願約下二別釋初釋下句願有始終故有要期謝行下次釋上句思無限齊故種子不亡行即思心行起願後故曰超前故下三雙結上二句結上種存下二句結上願謝問此中後習與前實法集業何異答彼明業為集因此示種能熏習委如下説已上皆見業疏記卷十六第三支圓教宗業疏云後約圓教明戒體者濟緣釋云三圓教中前並小教此是大乘以大決小不待受大即圓頓義也前二偏計空有不均今悟教權名殊體一色與非色莫不皆然即圓融義也前既從權一期赴物今此克實究竟顯示即圓滿義也具此諸意故名為圓問二宗談體自足何須別立圓教答兩宗出體教限各殊若唯依彼則辨體不明若復不依則宗途紊亂故準二經別立一教窮理盡性究竟決了使夫學者修持有託發趣知歸為諸有福田紹衆聖因種興隆佛法超越生死萬劫未聞此生獲遇除茲一道更無餘途若非究我祖乘須信投心無地一生虛度豈不誤哉嗚呼問依何教義立此教耶答下引法華涅槃二經為證法華開聲聞而作佛涅槃扶小律以談常舍此二經餘無此義華嚴隔出方等彈訶是以梵網斥二乘為邪見學則有違善戒指小法為方便不學成犯二部之異於此自明芝苑云問此與天台圓教為同為異答理同説異何名理同以下疏中引法華文用法華意立此圓體但彼教統攝此局一事將此入彼即彼妙行之中戒聖行也何名説異今此為明戒體直取佛意融前二宗自得此談非謂取彼但名相濫是故異也見芝苑遺編卷一業疏續云戒是警意之緣也以凡夫無始隨妄興業動與妄會無思返本是以大聖樹戒警心不得墮妄還淪生死濟緣釋云初敘立教本致中二初句標示警意緣者此明一切諸戒皆我心業世尊如業制法而警悟之無別有戒衆生業無量故戒亦無量業無盡故戒亦無盡當知二百五十三千八萬無量律儀非他法也以下正釋心為境轉故隨妄心境相合故興業習妄既久動便隨塵故與妄會會即合也淪歷長劫愈忘其本本即自心若非佛教何由思返此敘衆生妄業無窮是下次敘如來因業立戒令息妄業妄業已息苦果亦傾不淪生死故能返本還悟自心也業疏續云愚人謂異就之起著或依色心及非色心智知境緣本是心作不妄緣境但唯一識隨緣轉變有彼有此濟緣釋云二根器差殊中二初敘鈍者妄計竊詳此文正決當今所受之體前明細色已破有宗今此唯決四分作無作耳作戒心造彼兼色故無作心種彼謂非色心故此由佛世機悟有殊致使滅後分宗各計故涅槃云我於經中或説為色諸比丘便説為色或説非色諸比丘便云非色皆由不解我意謂不知佛方便説故智下次敘利根易悟二初明因教悟解境即情與非情二諦等境緣即隨境所制塵沙等法二皆心作則一切唯心不下次明思惟觀察既達唯心則隨所動用不緣外境攝心反照但見一識識即心體不守自性隨染淨緣造黑白業成善惡報故有生佛依正十界差別故云有彼此也無始不了遍法界境造虛妄業出沒生死是故如來如法界境制無邊戒戒無別體即虛妄業如淫盜等豈別有戒縱妄成業禁業名戒故事鈔云未受已前惡遍法界今欲進受翻前惡境並起善心故戒發所因還遍法界又善生中衆生無邊大地無邊草木無量海水無邊虛空無際戒亦同等並此意也業疏續云欲了妄情須知妄業故作法受還熏妄心於本藏識成善種子此戒體也濟緣釋云三所受體中三初約圓義以示體相前明利根未受之前已發大解此明修證先須稟戒文中有三初句希求脫離了猶盡也妄情之言通含見思無明等惑次句反觀往業無始慣習積惡時深雖達唯心卒難調制若非戒法靜業無由故云佛所制戒如猿著鎖如馬轡勒如捉盜賊截生死流發定慧力菩提基本涅槃初門所以三乘聖人並由斯迹捨此修道枉費時功卻步求前終無所至矣故下三如緣納法又二初二句示作業作法之言通收始終方便正受熏妄心者假前勝境發動勝心此心反妄即是真心以真熏妄令妄不起即如鈔云以己要期施造方便善淨心器必不為惡測思明慧冥會前法此即能熏妄為所熏此即作熏猶如燒香熏諸穢氣也下三句正明無作由熏成業業圓成種種有力用不假施造任運恆熏妄種冥伏妄念不起此無作熏猶如香盡餘氣常存也初句示所依處亦是所熏也次句顯能依體亦即能熏也善即簡惡種子是喻如世穀果皆有種子略説十義一從衆緣生二體性各異三生性常存四任運滋長五含畜根條華葉等物六雖復含畜相不可得七遇時開綻八子果不差九展轉相續十出生倍多無作具此故以比焉然種子名通義須細簡初約十界四趣為惡餘六是善次就善中人天有漏四聖無漏三就聖中三乘是偏是權唯佛是圓是實今此戒種文唯簡惡若望人天是無漏種若望偏權是圓實種行者當知本所受體即是一體三佛之種故薩遮尼犍云如來功德莊嚴之身以受戒為本持戒為始又法華云佛種從緣起即斯義也下句結示正義所立唯此問既發此體後用受菩薩戒否若不須受即應約大判持犯耶若云須受則無作業為重發否並須細求不可相濫芝苑云天台疏云不起而已起則性無作假色南山云熏本藏識成善種子此為戒體天台性之一字即能起因無作假色即所發體南山藏識即所依處善種子即能依體能起所依是本有之性所發能依即今受之體若此出體文據極明能所歷然體性不濫則受納無疑修持有託見芝苑遺編卷二芝苑又云經論所説菩薩戒自分二體一當體體即是戒體與今善種不殊二所依體心性是也然則心性但是戒體所依實非戒體見芝苑遺編卷一業疏續云由有本種熏心故力有常能牽後習起功用故於諸過境能憶能持能防隨心動用還熏本識如是展轉能靜妄源若不勤察微縱妄心還熏本妄更增深重濟緣釋云二約隨行以明持犯中二初明謹奉二初句躡前受體故下正敘隨行三初句明力言有常者運運不息生生常住故次句明能言後習者有其二別一者習因徹至未來二者習果即後三佛今明起後且據因論起下諸句明用能憶謂時中不忘能持謂執守不失能防謂塵緣不侵由憶故持由持故防一心三用無前無後隨心動用語該始終熏本識者此隨行中熏通作無作展轉有四一對境差別二起心前後三來報相續四入位階差靜妄源者語通因果準下修顯圓證三身則究竟永盡故云靜也若下次明慢犯二上二句反上三用微縱即瞥爾念下二句反上戒熏問熏有幾種答初受作戒熏熏成無作次則無作熏熏起隨行三則隨中作無作熏還資本體若論所熏通熏心識業疏續云是故行人常思此行即攝律儀用為法佛清淨心也以妄覆真不令明淨故須修顯名法身佛濟緣釋云三舉因果以細勸三初攝律儀戒二攝善法戒三攝衆生戒先知來意衆生識體本自清淨離諸塵染由妄想故翻成煩惱又復本來自在具足方便智慧威神德用由妄想故翻成結業又復本來平等無有彼此愛憎差別由妄想故翻成生死今欲反本故立三誓一者斷惡誓受攝律儀戒修離染行趣無作解脫門復本清淨證法身佛名為斷德二者立修善誓受攝善法戒修方便行趣空解脫門復本自在證報身佛名為智德三者立度衆生誓受攝衆生戒修慈悲行趣無相解脫門復本平等證應身佛名為恩德然此三誓三戒三行三脫三佛三德隨舉一誓三誓具足乃至三身三德一一皆爾言有前後理無各別如是心受即發圓體如是心持即成圓行華嚴云戒為無上菩提本淨名云能如此者是名奉律涅槃云欲見佛性證大涅槃當須持戒等皆此意也初釋律儀戒又二初標因果即之一字點小為大乃是圓宗融會之意智論以八十誦即尸羅波羅蜜勝鬘謂毗尼即大乘學須得此意可通彼文律儀禁惡止業破惑徹至究竟清淨心者即法身體以下次明所以二初二句敘昔迷不明淨者貪染所障失本淨故次二句顯今悟須修顯者稟戒破障即能顯之因法身即所顯之果業疏續云以妄覆真絶於智用故勤觀察大智由生即攝善法名報身佛濟緣釋云二攝善法戒二初二句敘迷絶智用者愚癡所障遺本明故故下顯悟勤觀察者修善破障此即是因報佛是果業疏續云以妄覆真妄緣憎愛故有彼我生死輪轉今返妄源知生心起不妄違惱將護前生是則名為攝衆生戒生通無量心護亦爾能熏藏本為化身佛隨彼心起無往不應猶如水月任機大小濟緣釋云三攝衆生戒二初敘迷憎愛即障忘本平等故由有彼我分別故受生死雜報今下顯悟二初修因三初二句開平等解知生心起亦唯識變彼我同體無高下故次二句修平等行將護之言通含四弘誓四等心四攝行是下二句結名生通下次感果三初二句心境相應次二句慈熏成果次四句明隨緣起應如水月者水喻機感月喻垂應月不入水水不溷月隨器大小波澄影現慈善根力感應難思已上業疏文由戒是警意之緣起至此段止共七段連續科判繁雜今別録科表於下以備對閲初敘立教本致初標示二正釋二根器差殊初敘鈍者妄計二敘利根易悟三所受體初約圓義以示體相初希求脫離二反觀往業三如緣納法初示作業二正明無作二約隨行以明持犯初明謹奉初躡前受體二正敘隨行初明力二明能二明慢犯初反上三用三明用二反上戒熏三舉因果以細勸初攝律儀戒初標因果二明所以初敘昔迷二顯今悟二攝善法戒初敘迷二顯悟三攝衆生戒初敘迷二顯悟初修因二感果三舉因果以細勸中濟緣於釋文之前先明來意今依其文列表於下衆生識體本自清淨離諸塵染由妄想故翻成煩惱本來自在具足方便智慧威神德用由妄想故翻成結業本來平等無有彼此愛憎差別由妄想故翻成生死今欲反本故立三誓一者斷惡誓受攝律儀戒修離染行趣無作解脫門復本清淨證法身佛名為斷德二者修善誓受攝善法戒修方便行趣空解脫門復本自在證報身佛名為智德三者度生誓受攝衆生戒修慈悲行趣無相解脫門復本平等證應身佛名為恩德濟緣云問三聚三身為同為別答語異義一隨舉一戒三聚具足隨舉一聚互具亦然故知初受圓發三誓隨中奉持圓修三行成因感果圓證三身三誓即是三聚三身三聚亦即三身三誓三身亦即三誓三聚心佛無差因果不二能如此者始名圓戒是波羅蜜即究竟木叉也是知行人若發此心若獲此體當知即是三佛之種如何自輕不加珍敬然雖三戒彼此互具至於修奉恆用攝生則能任運含攝一切豈止餘聚耶問教有分齊何須此示答為成本宗分通義故何以然耶如善戒經五十具等迭為方便是故受五習十受十習具受具習大故前三戒並名方便假宗知權不住方便符通深之部意為稟大之先容所以鈔敘發心為成三聚此明隨行次對三身願行相扶彼此交映彼則期心後受此乃即行前修方見圓宗深有來致若爾既顯分通何須別立答義雖通大教終局小不可濫通故須別立隨意盡理不亂宗途請觀前明實宗無一心字次述假宗無一種字始見聖師深體權實自餘凡愚未足擬議也業疏云此門略辨三宗戒體少異由來涉言語矣濟緣釋云言略辨者示不盡故言少異者若據教宗名義不濫論其業體畢竟常同當知細色及以二非無非種子但是如來隨宜異説耳涉言語者言其繁也由第四項顯立正義之初業疏云夫戒體者何耶至此段由來涉言語矣乃業疏歷示三宗之文為南山撰述中最精湛者古今中外學者頗盛傳誦但以記文與疏釐會分割間隔致令疏文散碎不能融合貫通惟冀讀者別録此文合為一卷時以誦持庶可窺見此文精妙俾不負律祖示導之聖意耳業疏云今識前緣終歸大乘故須域心於處矣故經云十方佛土唯有一乘除佛方便假名字説既知此意當護如命如浮囊也故文云我為弟子結戒已寧死不犯又如涅槃中羅剎之喻濟緣釋云初示所歸識前緣者塵沙萬境無邊制法無始顛倒迷為外物故受輪轉今知唯識無有外塵故正受時遍緣法界勇發三誓翻昔三障由心業力結成種子自為戒體應知能緣所緣能發所發能熏所熏無非心性心無邊故體亦無邊心無盡故戒亦無盡當知即是發菩提心修大慈行求無上果此名實道此即大乘三世如來十方諸佛示生唱滅頓開漸誘百千方便無量法門種種施為莫不由此故曰雖説種種道其實為佛乘此即行人域心之處然而濁世障深慣習難斷初心怯懦容退菩提故須期生彌陀淨土況復圓宗三聚即是上品三心律儀斷惡即至誠心攝善修智即是深心攝生利物即回向發願心既具三心必登上品得無生忍不待多生成佛菩提了無退屈此又行人究竟域心之處矣故下引證即法華開顯文也經云我此九部法隨順衆生説入大乘為本十二部中九部屬小乘同歸一佛乘故又云聲聞若菩薩聞我所説法乃至於一偈皆成佛無疑十方佛土中唯有一乘法十方皆爾不獨釋迦無二亦無三大小相對為二三乘相對為三除佛方便説但以假名字引導於衆生説佛智慧故餘乘修證因果色非色等皆方便假名耳既下勸修二初句躡上開悟由識前緣若起毀犯即是犯自心故增妄業故淪生死故污佛種故退菩提故失功德利故大小經論廣勸奉持雖不顯彰聖意在此若不知此得失尚微既知此已所獲既深所失亦大理須謹攝不可微縱當下結勸奉持命與浮囊世人所重且舉為喻諸經論説鵝珠草繫海板比丘皆忘生護戒則壽命浮囊亦未足為重也文云即本律文寧死不犯不啻命故涅槃羅剎乞浮囊乃至塵許菩薩不與譬護小罪已上皆見業疏記卷十六芝苑云夫戒體者律部之樞要持犯之基本返流之源始發行之先導但由諸教沈隱道理淵邃是以九代傳教間出英賢雖各逞異途而未聞旨決逮於有唐獨我祖師窮幽盡性反覆前古貶黜浮偽剖判宗旨斟酌義理鼎示三宗誠所謂會一化之教源發羣迷之慧日者也初多宗作無作體二俱是色可知二成宗作戒色心為體亦可知無作以非色非心為體者然非色非心止是攝法之聚名實非體狀遂令歷世妄説非一今依疏文即名考體直是密談善種但以小宗未即徑示故外立名非色非心也故疏云考其業體本由心生還熏本心有能有用乃至云不知何目強號非二細詳此文未即言善種而曰熏心有用密談之意灼然可見應知此即考出非色非心之體耳三圓教者謂融會前宗的指實義前宗兩體即善種子攬本從末此善種子即前二體攝末歸本是則約此圓談任名無在故疏云於此一法三宗分別故知分別有三體實不二問若言體唯是一分別有三者則前二宗中但有虛名竟無實體耶答宗雖各計體豈乖殊由彼謂異強構他名應知多宗計種為色成宗計種為非色心但後圓教指出前二耳故疏云愚人謂異就之起著等更以喻陳如世美玉或人無知謂玉為石或名非石未能顯體後人得實指破前二若無玉體何有不識喻今三宗相似法也問何因緣故名為善種答善則是法體種是譬喻謂塵沙戒法納本藏識續起隨行行能牽來果猶如穀子投入田中芽生苗長結實成穗相對無差故得名也芝苑又云所受法體依羯磨疏三宗分別一者多宗作無作戒二體俱色身口方便相續善色聲作戒體也法入假色無作體也今祖師究體乃謂善惡業性天眼所見歷然可分與中陰同微細難知異彼肉眼所見粗色故云細色二者成宗作與無作二體則異身口業思能造色心作戒體也非色非心五義互求了不可得無作體也祖師考體即心造業熏習有用能起後習心不可狀假色以顯所發業量異前作戒與心與色兩不相應強名二非以為戒體三約圓教宗明體但以兩宗各隨所計義説動靜終非究竟故跨取大乘圓成實義點示彼體乃是梨耶藏識隨緣流變造成業種能造六識即是作戒作成之業梨耶所持即號無作所蘊業因名善種子業雖心造一成已後與餘識俱性非對礙復是四大所造體有損益天眼所見善惡可分是以如來隨機赴物或説非色非心或説為色小機未達計為色者不許空宗執非色非心者斥他有部如涅槃中皆由不解我意故使諍計殊途然今所宗並以涅槃終窮之説統會異端使歸一致可謂體一化始終裂後昆疑網故業疏云終歸大乘故須域心於處如斯明訓廣在彼文今人所受正當成實假宗非色非心是其法體約圓以通即善種也然此所述略知端緒至於業理極為深細自非積學良恐茫然摸象紛紜於今衆矣已上皆見芝苑遺編卷一第五項先後相生資持云若論作戒則無先後獨茲無作有多解釋故須辨定事鈔云初解云如牛二角生則同時故多論云初一念戒俱有二教第二念中唯有無教資持釋云初同時解二上二句舉喻故下引證初念俱有可驗齊生事鈔續云後解云前後而起故善生云世間之法有因則有果如因水鏡則有面像故知作戒前生無作後起論云作時具作無作者此是作俱無作並是戒因至三法竟其業滿足是二戒俱圓故云具作無作不妨形俱無作仍後生也亦是當一念竟時二戒謝後無作生也資持釋云二前後解二初立義中四初句標義故下引證世間法者緣構成故因即作戒果謂無作如下喻顯故下準定論云下二釋妨由立前後違上論文初念俱有故須釋之文中分二初牒妨此下釋通二初明作俱齊起不下示形俱後生上云仍後在言未顯猶恐濫同初念之時故重遣之云亦是等作俱無作與形俱無作之區別參觀前立兩解名項中之表資持云已前二解並是古義若準業疏即取初解但不明三時義未盡耳已上皆見事鈔記卷十六此項科文亦稍繁雜今依古義今解各録科表分列於後以備對閲古義初同時解初舉喻二引證二前後解初立義初標義二引證三喻顯四準定二釋妨初牒妨二釋通業疏云今解一時非先後起豈有作絶無作方生由本登壇願心形限即因成也至後剎那二戒俱滿故云作時具無作是也濟緣釋云示今解中二初約同時以通前三初取前師豈下斥後師由下申所以二初敘始生願心形限即形俱也至下次明成就後剎那即三法竟第一念也二戒滿足即作戒與形俱無作也業疏續云且約一受三時無作初因時無作此與作俱非乖俱體不妨形俱因成未現二果時無作有二一還與作俱同上明也二是形俱方為本體以三法竟示現之時三果後無作以通形終濟緣釋云二約三時以示相初通標三時者即前多論初二兩念但初念中取其爾前為因時耳初下別列因時有二作俱未竟形俱潛發二並為因二果時者即上二種第一念時皆究竟故三果後者即第二念已去作俱隨謝止有形俱耳已上皆見業疏記卷十六今解初約同時以通前初取前師二斥後師三申所以初敘始生二明成就二約三時以示相初通標二別列第六項無作多少業疏云通敘諸業依多論中大綱有八濟緣釋云通敘者總明一切作無作業一通善惡二通化制三通定散四通漏無漏故云諸業多論八種而非次列但括略前後所有名相故云大綱有八至下判釋亦兼餘論業疏續云一者作俱無作隨作善惡起身口頃即有業相隨作同生作休業止能牽於後不由起心任運相感故即號曰作俱無作餘七例爾濟緣釋云初示業相作休業止示分齊故能牽後者彰功力故不下釋名義問既隨作有即不由心答此言正示無作義也起心屬作業力任運不由作故如世樹影可以比焉餘下指例下七事別無作名義莫不皆然業疏續云二者形俱無作如今所受善惡律儀必限一生長時不絶即有業量隨心任運濟緣釋云必下示名由本要誓期一形故即下顯體今明受體正用前二兩門餘皆類引業疏續云三者要期無作如十大受及八分齋要心所期如誓而起亦名願也故彼論云又此無作亦從願生如人發願設會施衣無作常生扶助願者濟緣釋云初釋名相十大受即勝鬘十願八分齋即八戒前引成論通自誓故亦下示異名業疏續云四者異緣無作如身造口業發口無作等濟緣釋云彼宗七支不互故有異緣身造口業如現相妄語口造身業如深河誑殺雖假異緣還發本業成論不爾身造發身口造發口隨具發業則無異緣業疏續云五者助緣無作如無作品云教人殺生隨所殺時教者獲罪即其事也濟緣釋云引文即是成論彼約教人所教行事助成能教文明造罪善亦如之業疏續云六者事在無作論云施物不壞無作常隨多云若作僧坊及以塔像曠路橋井功德常生除三因緣一前事毀壞二造者命終三起大邪見便善業斷翻善例惡可以相明如畜鞭杖弓刀苦具隨前事在惡業恆續濟緣釋云初明善業論云即成實文多云即多論曠猶大也三因緣者初即所造事壞二三即能造緣滅應有四句初人物俱在此句不失二物壞人在三物在人喪四人物俱喪三句並失若爾事壞命終應無福報答下云便善業斷非謂永無前業恆在但不相續耳翻下次例惡業對翻可知業疏續云七從用無作論云著施主衣入無量定更令本主得無量福如是隨其善惡從用皆爾濟緣釋云引文亦即成論入無量定即四無量定隨善惡者示通説也業疏續云八者隨心無作入定慧心無作常起成論云出入常有常不為惡善心轉勝雖在事亂無作不失言隨心者不隨定慧隨生死心恆有無作濟緣釋云八中即明定慧心中所發無作兩宗不同故須並出初依多論釋隨定慧者入定發慧則有出則皆無二引成論釋出入常有者不局入定入道也隨生死者死此生彼恆不失故業疏云問此從用業與前作俱有何等異答業相虛通不相障礙間雜同時隨儀而別且如持鞭常擬加苦既無時限即不律儀為形俱業要誓常行即名願業口教打撲即是異緣前受行之又是助業隨動業起即是作俱鞭具不亡即名事在隨作感業豈非從用惡念未絶又是心俱故舉一緣便通八業餘則例準知有無也濟緣釋云問中欲彰業相故躡相濫以為問端答中三初通示動念成業業體皆心故曰虛通等瞥起不定故曰間雜同時下文且舉一緣以明間雜若知心念隨緣起滅動變不恆則善惡邪正或離或合剎那萬異何止於此哉且下列示前則作俱在初此歸第五餘並同前尋文自見然下隨心本據定慧此云惡念未絶乃是隨義明之問隨動起業與隨作感業畢竟相濫如何以分答作俱通一切從用局事物由局物故或用不用是以用時必兼二業故知作俱未必有從用從用其必兼作俱莫非具此二心致使業隨心發故下指例上明八業且據全具為言須知業理隨念不定故云知有無也且今受體初具作俱形俱同起亦有要期須師秉法即是助緣能牽後習亦即隨心若論隨行作俱定有互造教他異緣助緣衣鉢資具事在從用功成不滅莫非隨心如是類舉多少可見已上皆見業疏記卷十六資持云準此以明或單或具間雜不定精窮業理在斯文矣見事鈔記卷十六上來戒體中第一章戒體相狀竟第二章受隨同異受隨同異中分為二節一釋兩名二辨同異第一節釋兩名業疏云問曰何名受隨業疏續云答曰言受戒者創發要期緣集成具納法在心名之為受即此受體能防非義故名為戒謂壇場起願許欲攝持未有行也濟緣釋云釋受名中三初釋受義要期是心緣集即境納法在心即心境相應即下次示戒義謂下結斷分齊業疏續云既作願已盡形已來隨有戒境皆即警察護持無妄毀失與願心齊因此所行故名隨戒受局淨法兼染不成隨通持犯皆依受故濟緣釋云釋隨名中四初敘戒義警察即能防護持即能持無妄即能憶與下次示隨義因下合名受下雙判通局業疏云問願行相依猶如輪翅持可順受犯豈名隨答隨有兩種持犯乃異俱從受後而生行兼善惡皆由受故相從目之為隨戒也濟緣釋云問中難前隨中通犯車輪鳥翅兩不可虧可喻願行必須相副答中順違雖異同望本受俱名隨戒業疏云問無作名者可是戒收隨作乃是後時緣護但應名善何得名戒答戒是警心始終緣具願行成就方便圓德要從始心及終行副皆符戒禁順成受故不名獨善由境周統也濟緣釋云問中意以受作可名為戒隨作但名為善此難受作不專戒名答中二初通示戒義始終之言通收二作及二無作無非警心該周法界不容少闕故號圓德要下正通來問始心謂受作及終行副即隨作順受故名戒境周故非善已上皆見業疏記卷十六第二節辨同異辨同異中分為二項一解二作二解二無作第一項解二作解二作中分為二支一先釋二名二正辨同異第一支先釋二名業疏云何名二作一者受中作戒如初請師及三法未竟已前運動方便名之為作即此作時心防過境名之為戒二者隨中作戒既受戒已依境起行為護受故名之為隨於境起護順本受願名之為作不作不有要由作生正對境持故名戒也濟緣釋云初總徵一下列釋二初釋受作運動名作防過名戒次釋隨作起護名作對持名戒見業疏記卷十六第二支正辨同異業疏云就初二作有五同四異一者名同俱名作戒故二義同俱防非境三體同俱以色心故四短同對別彰時故五狹同唯約善性故濟緣釋云五同中第四云對別彰時者唯局色心運動之頃不通餘時故業疏續云言四異者一者總別異受作總斷發心過境普願遮防隨作別斷以行約境生境通色心不可緣盡心所及處方有行生即名此行號之隨作以心不兩緣境無頓現故也二根條異受為行本隨後而生目為末也三懸對異受始壇場可即非現但懸遮約故也隨作對境起治嚴防由其觀能不為陵踐故也四一多異受作心因一品定也隨作多品者以境有優劣心有濃淡故隨境對起心輕重濟緣釋云四異初中受作總斷由心起願可遍發故隨作別斷者由行隨境不容並為故境通色心者色通情非情心局有情三中懸是受體對即隨行可即非現謂未有非也觀能謂對治力也陵踐即是毀犯四中受作一定更無改故上中下品義不同時已上皆見業疏記卷十六資持云第四云受一品者問多宗可爾成宗戒得重受那云一品定耶答雖開重受三品不俱故若爾無作何以受分三品答無作非色心故雖有三品增為一體作是色心縱增三品初後各異故無多品見事鈔記卷十六受隨同異章義鈔有文甚簡明今下列表中多據之二作有五同名同二作同名作戒義同二作同防身口七支體同二作同以色心為體短同二作同限於色心運動之頃狹同二作同局善性二作有四異總別異受作總斷隨作別斷根條異受作是根本隨作依受而起是枝條懸對異受作懸防隨作現防一多異受作一品隨作三品第二項解二無作解二無作中分為二支一先釋二名二正辨同異第一支先釋二名業疏云何名受無作耶即是行者願於惑業斷相續意無始妄習隨念難隔故對強緣希求業援自發言誠是其因也三法之期動發戒業業成志意是其緣也即此緣業是行願本名受無作隨無作者剎那已後隨境對防名作戒作息業成即名此業為隨無作濟緣釋云初受無作三初徵即下次釋又二初敘開悟故下次明納法仍分因緣二法和合乃成受體三法期者即法就也即下三結名體次明隨無作中剎那後者示分齊也隨業依作故重舉作以明無作見業疏記卷十六第二支正辨同異業疏云今詳二業初有五同一名同俱稱無作故莫非是業任運而起二義同俱防七非故三體同如上三宗故四敵對同以受體形期隨非防過為護體故即名本體有防非能能實隨行行起護本相依持也隨無作者對非興治與作齊等此無作者非是作俱無作也謂起對防即有善行隨體並生作用既謝此善常在故名此業為隨無作與非敵對故與受同五多品同以受可重發故無作有強羸隨心則濃薄業理亦澆淳也依多論中受一隨多者以彼宗中不通重故止約隨行通優劣也濟緣釋云三中指上三宗者若實法宗二並是色若假名宗二並非色非心若後圓宗二皆心種四中有二初明受體據受無作無防非能而不能自防故假隨行如戈矛雖利要由持用方陷前敵故云相依持也次明隨中三初通示此下簡濫謂下顯相準此對防同時多業一是本受無作二即隨中作俱三即隨行無作與非敵對五中二初準成論明同二初明受體本受許重增一體有三品謂初受是下次增為中復增為上若但一增則有二品若本不增亦止一品隨下明隨行如前隨過約心各分三品故云濃薄業理即無作也依下次引多論顯異彼不立重受仍自難曰若爾何故戒有羸不羸耶答此對隨行不論受體是也資持云四敵對同由有本體方起防護即名本體能防非也五中受體有三品隨體亦三也以業隨心發受隨二戒各具三心故使無作各有三品見事鈔記卷十六業疏續云次明四異初總別異受但虛願欲於萬境不造惡也法界為量可一念緣豈非總發隨約實行非頓唯漸故別如上二長短異受體形期懸擬防故説之為長隨無作者從行善生與方便俱心止則住故名短也三寬狹異受體相續至命終來四心間起本戒不失故名寬也隨無作者唯局善性防非護本彼惡無記不順受故義説非有故名狹也四根條異如前二作可以除疑濟緣釋云二中以隨無作與作同時故心止則住若爾何以前云此善常在答此望不復對防前據已作不失既不能防則非隨戒但名為善不同受體終身能防由本期故三中四心通三性三心無記行分善惡文中受約四心隨簡三性上下互舉耳四中指前受根隨條不殊二作故已上皆見業疏記卷十六資持云初中受但起心故可總發隨是造修止得別發二中言隨無作事止則無者非無無作但由隨戒隨作防非作謝善在無防非能不名隨戒故云無耳前疏云此善常在文證明矣見事鈔記卷十六二無作有五同名同二無作同名無作戒義同二無作同防身口七支體同二無作同以非色非心為體敵對同二無作同能對事防非多品同二無作同有三品二無作有四異總別異受無作總發隨無作別發長短異受無作懸發擬於一形形存戒在隨無作與方便色心俱事止則無寬狹異受無作三性恆有隨無作唯局善性惡無記無根條異受無作根本隨無作枝條上來戒體中第二章受隨同異竟第三章緣境寬狹緣境寬狹中分為二節一列釋二別簡第一節列釋事鈔云就中有四一能緣心現在相續心中緣二所緣境境通三世如怨家境雖過去得起惡心斬截死尸現在怨家子有可壞義未來諸境可以準知故緣三世而發戒也三發戒現在相續心中得四防非者但防過去未來非現在無非可防資持釋云本説所緣而分四科者心隨境起故先明心心境相應即發受體故三明戒戒必有用故後明防四義相綰不可孤立故初能緣心中現在簡過未相續簡一念業疏云念念雖謝不無續起即以此心為戒因本二所緣境中又二初示境如下舉事顯相如與己為怨其怨已死即過去也怨或有子即現在也孫雖未生生必為讎即未來也於此三境俱能起害欲成淨戒必息惡心故所緣境遍該三世三發戒者問與上能緣何異答前是能緣心此即所發戒由彼受體無可表示還約能緣以彰所發又前二作戒後二無作又三局受體四落隨行四防非中現在無非者此約對治心行以論三世防是預擬不令起非對治現前則防未非才失正念即落過非故知現在無有防義見事鈔記卷十六濟緣云三所發戒中若論發業通於未來且據初得故局現在蓋約能緣以彰分齊也見業疏記卷十六第二節別簡事鈔云然則緣境三世得罪現在過未二境唯可起心説言三世發也若據得戒唯在現在一念資持釋云前簡所緣得罪現在者隨中持犯必對實境故過未唯起心者境非對現止可心緣故説言者顯非皆實故若下次簡所發一念者局三法竟一剎那時以前明緣境通三世發戒通相續此須重簡局示分齊事鈔云問戒從三世發唯防二世非者答若論受體獨不能防但是防具要須行者秉持以隨資受方成防非不防現在以無非也若無持心便成罪業若有正念過則不生故也然又以隨資受令未非應起不起故防未非若無其受隨無所生既起惡業名曰過非為護受體不令塵染懺除往業名防過非資持釋云問中緣防相並欲顯防非不通現在之義答中二先約隨行明不防現在二初直定無非若無等釋無非所以上二句顯成過非下二句明即屬未非然下次望受體説防過未二初明防未起非既下次明防過去非事鈔續云若爾戒必防非非何故起答要須行者隨中方便秉持制抗方名防非如城池弓刀擬捍擊賊之譬資持釋云轉難中上明受體能防過未欲推能防功歸隨行故此徵之答中二初正示如下喻顯城池弓刀喻受體擬捍擊賊喻隨行業疏云戒實能防遮斷不起常須隨行策持臨抗方遊塵境不為陵侵如世弓刀深能御敵終須執持乃陷前陳已上皆見事鈔記卷十六上來戒體中第三章緣境寬狹竟第四章發戒數量發戒數量中分為二節一明境遍一切二明發戒多少第一節明境遍一切事鈔云俱舍云戒從一切衆生得定分因不定何以故不得從一種衆生得故資持釋云初總標學者多昧先須略示分即是支謂七支業因即戒因謂能受心此文欲明五八十具四位之戒並遍生境故舉支心兩相比校謂戒支受心有盡不盡容可得戒生境不遍定不發戒謂三戒但發四支具戒全發七支此明七支多少皆是得戒即分不定也又若約三善則三心同時若約三品則隨得一品此明三心全闕皆可發戒即因不定也獨衆生境不可不盡故云定也何下徵釋定義不得從一種者言必須遍也分殺盜淫五八十戒從四分得妄言分不定兩舌具戒從一切分七分得惡口綺語因約三善心無貪心無瞋心從一切因得三心同時以三善心必不相離故無癡心因不定約三品發心上品發心中品發心不從一切因得一品心定以三品發心不俱故下品發心是表依上段記文及下段鈔記文而立對閲可知事鈔續云分不定者有人從一切分得戒謂受比丘戒有人從四分得謂受所餘諸戒即五八十戒也因不定者有二義若立無貪瞋癡為戒生因從一切得以不相離故若立上中下品意為戒生因則不從一切得資持釋云二別釋二初釋不定二初分不定中一切謂七分也俱舍即有部計謂比丘戒方得七支是具戒故餘三四支以非具故若準成宗四戒並發七支即皆從一切得定也今依彼引宗計須知二因不定中二先明三善一切者三心俱時也若起三毒則有單具若起三善必不相離故次明三品不從一切者三心不俱故事鈔續云若不從一切衆生得戒則無也何以故由遍衆生起善方得異此不得云何如此惡意不死故資持釋云二釋定中比前分因不從一切皆發得戒緣境反之故云若不從等何下釋無戒所以云下轉釋不得之意死息也事鈔續云若人不作五種分別得木叉戒一於某衆生我離殺等二於某分我持三於某處能持四某時能持五某緣不持除鬬戰事如此受者得善不得戒資持釋云五種分別者謂初受時發心斷惡於此五事有能不能故生取捨初簡生類有能不能二簡戒支彼宗五八局數定故若受一二但得善行成論不爾分滿皆得三謂國土郡縣四即年月日時五戒盡壽以論八戒日夜中説彼部時定成宗二戒盡形半日隨機長短五中自釋除鬬戰者謂遇此緣不能持故如下通結準知戒善遍不遍異耳已上皆見事鈔記卷十六業疏云夫論戒者普遍生境俱無害心方成大慈行羣行之首豈隨分學望成大善義不可也濟緣釋云大慈即佛行羣行首者即發趣義分學者謂持少分而不遍境大善即上大慈行首見業疏記卷十六資持云準知得戒之心不容毫髮之惡高超萬善軌導五乘衆聖稱揚良由於此見事鈔記卷十六第二節明發戒多少業疏云初就在家士女五戒所獲多少如多論云五戒相者於一切衆生可殺不可殺乃至可欺不可欺一切衆生下至阿鼻上至非想傍及三千大千世界乃至如來有命之類皆得四戒以三因緣得十二戒并以形期三千界內一切酒上咽咽三戒以初受時一切是酒皆不飲故縱使入般酒盡戒常成就而不失也濟緣釋云先別列兩境二初明情境不可殺不可欺者或約境強如佛聖人等或是境弱如蠕動微物不可淫妄等或不可親如諸天餘洲餘趣等乃至者須云可盜不可盜可淫不可淫阿鼻非想約豎論傍及大千據橫説小教境量齊此而已四戒即前四支依情境發三因緣者單歷三毒并下次非情境咽咽三戒兼前共發十五戒縱下總示境滅戒存入般對情酒盡即非情入般謂入般涅槃盜妄亦兼非情如前發戒境量中所明業疏續云今以義推貪等諸毒間雜不定三單三雙一合為七用歷過境約文為五對境為七就業非情為八為十且以七毒就文歷之隨一一境得三十五戒遍生有四非情有一如是類推濟緣釋云初離七毒三單可解三雙者一貪瞋二貪癡三瞋癡一合即三毒並起用下次歷戒二初列位約文五者據列相文對境七者五中開淫三境就業非情七支外加酒為八開淫則為十且下正歷合數可見業疏云二明八戒有情同四非情得五以七毒歷緣一一境上六十三戒濟緣釋云有情同四同上五中前四支也非情五者八戒實九合數如文準前對境為十一就業非情則十二十四已上皆見業疏記卷上明五戒八戒依論與義準二數不同今綜合疏記之文列表如下又事鈔義準之文與業疏異今亦綜合鈔記之文列表附後以資參考八戒依論無明文今準五戒例推並據資持記總數編輯成表五戒依論三毒就五戒以歷情境得十二戒共得十五戒非情境得三戒義準七毒就五戒以歷情境得二十八戒共得三十五戒非情境得七戒八戒依論三毒就九戒以歷情境得十二戒共得二十七戒非情境得十五戒義準七毒就九戒以歷情境得二十八戒共得六十三戒非情境得三十五戒下依事鈔列二表其義準中以三毒配者為事鈔本文以七毒配者為資持記私約準開之文五戒依論同前義準三毒就五戒以歷情境對女六戒殺盜淫處有三得十八戒妄對男五戒殺對女共得二十一戒盜淫處有二得十五戒對男共得十八戒妄非情境各得三戒七毒就五戒以歷情境對女六戒得四十二戒對女共得四十九戒對男五戒得三十五戒對男共得四十二戒非情境各得七戒八戒依論同前義準三毒就九戒以歷情境對女六戒得十八戒對女共得三十三戒對男五戒得十五戒對男共得三十戒非情境各得十五戒七毒就九戒以歷情境對女六戒得四十二戒對女共得七十七戒對男五戒得三十五戒對男共得七十戒非情境各得三十五戒上列諸表且依多宗五八戒唯有四支而計數若依成宗五八戒皆有七支可準此例而增加其數也上來戒體中第四章發戒數量竟上來宗體篇中第二門戒體竟第三門戒行戒行中分為二章一正明隨行二因示捨戒第一章正明隨行事鈔云戒行者既受得此戒秉之在心必須廣修方便檢察身口威儀之行克志專崇高慕前聖持心後起義順於前名為戒行資持釋云初躡前科必下示行相方便有二即教行也教謂律藏必依師學行謂對治唯在己修由本興心稟教期行以為受體今還如體而學而修文明檢察似偏約行然離過對治非學不立廣修之語理必兼含檢察即心心即行體準業疏具三能憶能持能防一心三用無非順受方成隨行此謂能察身口威儀即所察此二句須明成就二持遠離兩犯而云身口且據粗非約準今宗義通三業上云檢察正示修行下云慕聖明其標志克猶定也崇重也前聖通目三乘已成道者持下結示名義持心即行後起順前示隨行義見事鈔記卷三事鈔云然則受是要期思願隨是稱願修行譬如築營宮宅先立院牆周匝即謂壇場受體也後便隨處營構盡於一生謂受後隨行資持釋云初對體辨行中二前約法明要期即盡形斷惡決絶之誓思即緣境周遍慈愍之心合此二心混為一願即受體也稱願者合上要思即隨順義譬下次約喻顯初營宮宅喻求聖道下喻受隨可知營構謂造立屋宇事鈔續云若但有受無隨直是空願之院不免寒露之弊若但有隨無受此行或隨生死又是局狹不周譬如無院屋宇不免怨賊之穿窬也必須受隨相資方有所至資持釋云二互顯相須中二初敘互闕又二先明闕隨寒露者喻無善蓋覆弊謂困死喻沈惡道若下明闕受隨生死者但是世善非道基故又局狹者緣境不遍惡心存故穿窬謂穿壁窬牆也由無外院其間房室容彼穿窬此明無受防約雖修善行還為塵擾喪失善根如賊穿窬盜竊財寶也必下次示相須事鈔云問今受具戒招生樂果為受為隨資持釋云問中上明相須其功一等招生感果必有親疏故須顯示事鈔續云答受是助緣未有行功必須因隨對境防擬以此隨行至得聖果不親受體故知一受已後盡壽已來方便正念護本所受流入行心三善為體則明戒行隨相可修若但有受無隨行者反為戒欺流入苦海不如不受無戒可違是故行者明須善識業性灼然非為濫述資持釋云答中二初對顯親疏二上二句明受疏也必下明隨親也以壇場初受頓起虛願對境防約漸修實行行即成因因能感果故業疏云故偏就行能起後習不約虛願來招樂果然受隨二法義必相須但望牽生功有強弱隨雖感果全自受生受雖虛願終為隨本是則懸防發行則受勝隨微起習招生則隨強受弱教文用與學者宜知故下二別彰行相又三初成隨之相一受等者舉始終也方便者對治智也正念者攝妄緣也護本受者隨順義也入行心者即示二持成業處也三善體者明業性也則明等者示必修也以知感果功在隨中則知徒受不持無益矣若下明無隨之失為戒欺者功業深重犯致大罪故不如不受者激勵之切非抑退也是下結誥行者之言通囑末代也令善識者誡精學也一須識教教有開制二須識行行有順違三須識業業有善惡四須識果果有苦樂必明此四始可攝修業性等者如向所明順持違犯善惡因果皆如業理非妄抑揚令生信故灼明也已上皆見事鈔記卷十六資持云圓修者既知受體當發心時為成三聚故於隨行隨持一戒禁惡不起即攝律儀用智觀察即攝善法無非將護即攝衆生因成三行果獲三佛由受起隨從因至果故業疏云是故行人常思此行即三聚等又云終歸大乘故須域心於處又云既知此意當護如命如浮囊略提大綱餘廣如彼咨爾後學微細研詳且五濁深纏四蛇未脫與鬼畜而同處為苦惱之交煎豈得不念清升坐守塗炭縱有修奉不得其門徒務勤劬終無所詣若乃盡無窮之生死截無邊之業非破無始之昏惑證無上之法身者唯戒一門最為要術諸佛稱歎遍在羣經諸祖弘持盛於前代當須深信勿自遲疑固當以受體為雙眸以隨行為兩足受隨相副雖萬行而可成目足更資雖千里而必至自非同道夫復何言悲夫見事鈔記卷十六芝苑云每以兩端開誘來學一者入道須有始二者期心必有終言有始者即須受戒專志奉持令於一切時中對諸塵境常憶受體著衣喫飯行住坐臥語默動靜不可暫忘也言其終者謂歸心淨土決誓往生也以五濁惡世末法之時惑業深纏慣習難斷自無道力何由修證故釋迦出世五十餘年説無量法應可度者皆悉已度其未度者皆亦已作得度因緣因緣雖多難為造入唯淨土法門是修行徑路故諸經論偏贊淨土佛法滅盡唯無量壽佛經百年在世十方勸贊信不徒然見芝苑遺編卷三第二章因示捨戒戒疏云泛列經論捨相不同如雜心説若捨命終斷善二形生也善生經加受惡戒時捨善戒俱舍論八戒期心盡夜分終故捨且列如此行宗釋云雜心四捨言若捨者即作法斷善即起邪見善生惡戒即惡律儀上五通五八十具俱舍期心唯局八戒義兼五戒言且列者示未盡故斷善即起邪見者邪見語通未能的指考行宗別文云斷善失戒四捨之一即生邪見遠捨三寶見戒疏記卷五戒疏云問今捨戒者為捨已生隨行為因之業為捨初願本受無作體耶答已生為因不可捨也得聖無漏方傾善習今所捨者止是本體更不相續故雜心云言捨戒者戒身種類滅也行宗釋云未捨之前所有隨中持行名已生善後未修者名未生善今明捨戒為捨何者問中乃約行願兩審答文方見已未存亡答中二初答因業不失結業在心行功不滅故不可捨及證初果無漏智力達罪福性漏業方傾習合作集謂集因也今下次明無作體失本體即無作不相續者失未生善也故下引證戒身即受體無作種類即相續善行二皆云滅證上可知戒疏云作法捨中具緣有五初是住自性者二所對人境如多論云若無出家人隨得白衣外道相解者成三有捨心四心境相當如律中邊不領前人不解並不成捨五一説便成行宗釋云初云住自性者即具本受體也戒疏云所以開者凡夫退位知何不為帶戒犯非業則難拔故開捨戒往來無障即是大聖善達機緣任物垂教號法王也行宗釋云初敘機劣內凡以上不羸不捨已前皆容有退故云退位即外凡也故下顯開意往謂開捨來謂再受善惡兩通故云無障即下結歎權巧王者得其自在於法自在故稱法王已上皆見戒疏記卷六上來宗篇中第三門戒行竟第四門戒相事鈔云戒相者威儀行成隨所施造動則稱法美德光顯故名戒相資持釋云初即承前隨下正示問事鈔隨戒釋相篇中以戒本為相與此異者答此約行明彼就法辨然行必循法法必軌行文云動則稱法豈不明乎見事鈔記卷三戒相有二義一約行為相二以法為相事鈔標宗顯德篇中約行為相即此略文也事鈔隨戒釋相篇中以法為相即今編持犯篇所引據也上來宗體篇中第四門戒相竟上來第一宗體篇竟
