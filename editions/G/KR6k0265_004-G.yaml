body:
  text: 別行篇別行篇中分為六門一敬佛儀相二入寺法式三造像塔寺四瞻視病人五離諸非法六出家宗致第一門敬佛儀相敬佛儀相中分為二章一先示敬儀二正明敬相第一章先示敬儀事鈔云若塔廟支提受用之物乃至擬造堂殿牀座材石等已經佛像受用者縱使風吹雨破當奉敬之如形像無異故四分中王以園施佛佛不受當令奉僧何以故若佛園及園物房舍房舍物衣鉢坐具鍼筒便是塔廟一切諸天世人沙門魔梵不能受用應恭敬如塔若施僧者我在僧中資持釋云初受用功勝中初正明準前盜戒佛受用物乃至為佛亦不得賣易支提亦翻為廟故下引證王即瓶沙王施佛則永不通僧施僧則兼通於佛事鈔續云增一云告諸比丘禮佛承事有五功德一者端正以見佛像發歡喜心二者好聲由見形像口自稱號南無如來無所著至真等正覺三多財報由以華香供施故四生長者家由見形已心無染著志心禮故五命終生天此即諸佛常法當如是學資持釋云二承事感報五功德前四別報並列因果後一總報通前為因故但示果南無經音義中翻為歸禮或云歸敬或云度我此即下勸修諸佛所行下凡宜學事鈔續云智論禮法有三一者口禮二屈膝頭不至地三頭至地是為上禮地持當五輪至地作禮阿含云二肘二膝頂名輪也亦云五體投地先正立已合掌右手褰衣屈二膝已次屈兩肘以手承足然後頂禮後起頂頭次肘次膝以為次第不相亂也資持釋云三設禮儀式中初引三禮口即言相審問名下禮屈膝即跪為中禮頭至地即稽首也地下示五輪地持語通故引阿含續釋五處皆圓故名五輪四支及首名為五體輪則別指五處體則通目一身先下正示禮儀正立者攝身儀也合掌者定心想也兩掌相抵指掌齊合今人但合指耳屈則先下後上起則先上後下故註云不相亂也手承足者舒手仰承表敬之極今人有結印者不知法也世衰法喪不識禮儀或覽此文宜須依準事鈔續云智論云若聞諸佛功德心敬尊重恭敬讚歎知一切眾生中德無過上故言尊也敬畏之心過於父母師長君王利益重故故云重也謙遜畏難故云恭推其智德故云敬美其功德為讚讚之不足又稱揚之為歎又云植佛福田者植謂專心堅著也隨以一善禮誦香華等至佛無盡由智勝故資持釋云四對境用心中引論兩段前段初三句總標知下牒釋六義通是敬心別分三業恭敬二字義必兼身又通約能敬尊重二字則兼所敬又云下引次段上舉喻佛如肥田專心如好種堅著如投種於田隨下法合一善等是因至佛是果由下顯意事鈔續云毗尼母不得着革屣入塔繞塔富羅不得入塔者彼土諸人著者皆起慢心故不聽著寒雪多處聽著靴富羅三千云繞塔法一低頭視佛二不得蹈蟲三不左右視四不唾地五不與人語又當念佛恩大難報念佛智慧念佛經戒念佛功德念佛精進乃至泥洹又念僧恩師恩父母恩同學恩又念一切人皆使解脫離苦又念學慧除其三毒求出要道見塔上草念手去之有不淨即分除之若天雨當脫履塔下乃上禮佛資持釋云五入塔法中母論西國以跣足為敬故不得入塔此方以穿著為禮或著襪履亦須潔淨寒雪處聽者謂開邊國三千中初明繞法一現卑下二示慈心三離輕掉四離觸穢五離憒鬧又當下次明用心念佛恩者無量劫來為度我等不惜身命求菩提故念佛智者權巧方便不思議故念經戒者三藏教法開發我故念功德者威神相好無與等故念精進者乃至無一芥子地非捨身處故念泥洹者示現滅度令諸眾生追慕勤修故乃至者略降生成道轉法輪故僧是福田師則攝誘上即三寶父母生育同學琢磨皆思報故念一切人即利他念學慧即自利念除草即營福天雨脫履者即知天晴亦通著上但須淨耳如上所念不出三寶親友慈悲福慧自利利他尋之可見事鈔續云五百問云比丘繞塔女眾隨者不得有優婆塞不犯大論如法供養法必應右繞善見云辭佛法繞佛三帀四方作禮而去合十指爪掌叉手於頂上卻行絕不見如來更復作禮迴前而去資持釋云六旋繞法中五百問息嫌疑智論示繞法善見明禮辭已上皆見事鈔記卷三十七上來敬佛儀相中第一章先示敬儀竟第二章正明敬相正明敬相中分為三節一總斥非法二坐立差異三修供時節第一節總斥非法事鈔云佛像經教住持靈儀並是我等所尊敬則至真齊觀今多不奉佛法並愚教網內無正信見不高遠致虧大節或在形像之前更相戲弄出非法語舉目攘臂偏指聖儀或端坐倨傲情無畏憚雖見經像不起迎奉致令俗人輕笑損滅正法資持釋云初通斥輕慢之相二初斥非致毀中二初敘合敬我等者通指末代敬像同真佛敬經同真法故云齊觀今下次正斥又四初指非並下示所以初句無智次句無信三即無識由無此三不守禮度故云虧大節也或下出非相文敘多事不出三業攘謂揎袖出臂憚難也致下明過狀事鈔續云故僧祇中禮人不得對於佛法乃至懸施旛蓋不得蹈像別施梯隥以此文證明敬處別既知多過彌須大慎至堂殿塔廟如履冰臨深覩形像經教必懾然加敬此則道俗通知奉法賢聖達其信心且如對王臣令長事亦可會凡情難任聖法宜遵資持釋云二引教伸誡中二初引文禮人懸幡俱非惡事猶誡輕侮良由對聖更無所尊故云敬處別也蹈謂足踐既下次申誡初勉慎至下示法履冰臨深喻其悚懼詩云戰戰兢兢如臨深淵如履薄冰今借用之此下彰益上句規他下句感聖且下舉況令長即郡縣官典凡下勸依任信也事鈔續云比世中多有在下牀上禮佛者此全無楷模敬人尚自被責敬佛自心在慢有心存道者必不行之余親問天竺諸僧諸國無有此法來此方見資持釋云二別斥居牀設禮中初指非下牀即低牀今時愚徒多習訛風有識苟聞幸宜悛革此下正斥祖師嘗遊晉魏親覩其事乃於牀上與僧設禮彼反責之故云敬人等楷模即指法律余下引親傳以驗既非西竺之法顯是此土濫行已上皆見事鈔記卷三十七準事鈔釋高大牀戒註於下溼處應開得在搘牀上禮佛見前持犯篇遮罪高大牀節第二節坐立差異事鈔云智論云外道是他法故輕佛來至佛所自坐白衣如客故命坐一切出家五眾身心屬佛故立若得道羅漢如舍利弗等皆坐三道已下並不聽坐以所作未辦結賊未破故資持釋云前二俗眾俱坐命不命別後明道眾或坐不坐學無學分三道即三果凡夫可知未辦謂所證道未破謂所斷惑歸敬儀云今有安坐像前情無敬讓可謂無事受罪枉壞身心如上三果尚立況下凡乎像立而坐彌是不敬比今君父可以例諸此言易矣臨機難哉常志在心努力制抑方可改革不爾雖讀不救常習思之惟之見釋門歸敬儀第一案白衣已受歸戒者似應同道眾立而不坐與論云白衣如客者異也事鈔云十誦得對佛加趺坐資持釋云或為瞻想或復禪誦故已上皆見事鈔記卷三十七第三節修供時節事鈔云僧祇佛生日乃至涅槃日為大眾說法稱揚佛德薩婆多云二月八日成佛亦以此日生八月八日轉法輪亦以此日取涅槃若依瑞應等經多云四月八日生涅槃初云二月十五日臨涅槃復度十仙云過三月已入涅槃月德太子經八月十五日入滅此並由眾生見聞不同故時節不等智論云舍婆提城九億家尚三億見或聞由慢業故佛世猶爾何況末法轉輕心業最重資持釋云前引僧祇通示四時文略成道轉法輪二日故云乃至今時但知降生涅槃二時供養餘二舉世未聞聞者行之薩下次定日月又二初引文示異三初多論總明四日但二日重疊今取下瑞應四月八日降生復準涅槃二月十五日滅度則四日各異修供可行復是此方機緣所樂故一年四日釋門時節二月八日成道二月十五日涅槃四月八日降生八月八日轉法輪適時之義勿事專隅次引瑞應別示降生具云太子瑞應本起經有二卷後引涅槃月德別明入滅涅槃初云者即第一卷序分中文簡後三十故一經前後自別今時即用後文月德中與上多論相近阿含亦云如來八月八日涅槃此並下二約義會通初正明二引證舍婆提即是舍衛文中且舉見聞準論具云舍衛九億家三億家眼見佛三億家耳聞有佛而眼不見三億家不聞不見佛在舍衛二十五年而此眾生不聞不見何況遠者由慢業者出不見及不聞之所以我輩生不值佛豈非慢重撫膺自責深痛沈淪嗚呼佛下舉況滅後正法不及現在像不及正末不及像故云轉輕謂奉佛之心薄也心業即慢習也見事鈔記卷三十七上來敬佛儀相中第二章正明敬相竟上來別行篇中第一門敬佛儀相竟第二門入寺法式事鈔云俗人士女入寺法先出文意息心靜默非喧亂所集軌法施訓豈漏慢所踐且心棲相表形異世儀歸奉憑趣理存規則故應其俯仰識其履行是敬事儀式如法親覲豈可足蹈淨剎心形懈慢非唯善法無染故得翻流苦業可不誡哉資持釋云初敘寺處清嚴僧居有二一者慕靜即自行二者施訓即化他居靜不宜喧稟訓不當慢此四句即約行顯處也且下次敘入須法式二初明所應為上二句標境勝下六句示須法所以應合也俯仰即儀貌履行即所為事豈下次示不應為蹈履也形見也非唯等者謂無益有損流墜也見事鈔記卷三十九入寺法式中分為二章一中國舊法二今師要術第一章中國舊法中國舊法中分為二節一入寺法二出寺法第一節入寺法入寺法中分為二項一清信士法二清信女法第一項清信士法清信士法中分為二支一示正法二斥非法第一支示正法事鈔云今依祇洹舊法出中國士民凡至寺門外整服一拜入門復禮一拜安詳直進不左右顧眄先至佛所禮三拜竟圍繞三帀唄讚三契若未見佛供養設見眾僧不先與語禮佛已方至僧房戶外禮一拜然後入見上座次第至下各禮一拜若見是非之事不得譏訶若發言嫌責者自失善利非入寺之行僧中亦不可識事似俗闕檢意則殊今以俗情檢道意誠非易若以見僧之過則不信心生生便障道終無出期且初入寺背僧取異云何得作出家因緣經云夫入寺者棄捨刀仗雜物然後乃入順佛而行不得逆行設緣礙左繞恆想佛在我右入出之時悉轉面向佛資持釋云初禮敬捨惡等法有五初入寺門二拜總禮三寶先下次禮佛禮佛下三禮僧戶外總禮如今眾堂之處若下四誡守慎初敘誡註中俗闕者謂同俗流闕於道行背僧即不信心生取異謂求見僧過經下引證順佛下五示行法順佛行即右繞西入東出佛在我右偏袒右肩示有執作之務逆行即左繞反上可知緣礙左繞者示權開也入出向佛者假事表心歸依不背也事鈔續云禮拜佛法僧者常念體唯是一何者覺法滿足自覺覺他名佛所覺之道名法學佛道者名僧則一體無別矣始學時名僧終滿足名佛僧時未免諸過佛時一切惡盡一切善滿也今我未出家學道名俗人迴俗即是道器如此深思我亦有道分云何輕侮宜志心歸依自作出家因緣者是名圍繞念佛法僧之大意矣低頭看地不得高視見地有蟲勿誤傷殺不唾僧地當歌唄讚歎若見草土自手除之資持釋云二想念慎護等法有三初念三寶佛僧能覺因果雖分所覺道同故云一體道即諸佛果源眾生心本極證名佛始學名僧僧現學法終至佛果若此待僧豈容輕侮註中初教念僧則三寶備矣今下次令念己與僧不殊尚當尊己豈敢慢人低下次離諸過初二句捨憍慢次二句止殺害後一句離觸穢當下三修淨福事鈔續云若有因緣寺中宿者不得臥僧牀席當以己物藉之亦勿臥沙門被中應自設供供養於僧豈損他供自害善器并調戲言笑說非法事沙門未眠不得先寢為除憍慢故又勿坐僧牀席輕侮僧故俗中貴士之座猶不許賤人升之況出世高僧輒便相擬是以經中共僧同牀半身枯也如是因緣如別廣說若至明晨先沙門起修恭敬之行資持釋云三有緣暫宿等法有五初護毀損註云他供即臥具等皆他所施故善器即自身堪受道故並下除調戲沙門下不先臥又下敬僧坐處舉況引證尋文可了經中即寶印手經又文殊問經云死坐鐵牀上若下不後起已上皆見事鈔記卷三十九第二支斥非法事鈔云凡入寺之行與俗人作入道之緣建立寺者開淨土之因供養僧者為出離之軼也資持釋云初示入寺本意入道緣者善根由發故淨土因者心清淨故出離軼者期解脫故軼即是轍車所從之道也事鈔續云今末法中善根淺薄不感聖人示導僅知有寺而已不體法意都無敬重佛法超生因緣供養福田而來入寺也如此者多非謂全無敬信者多有人情來往非法聚會又在寺止宿坐臥牀褥隨意食噉乞索取借如俗去還逐意則喜違心必瞋繫綴胸抱望當圖剝猶牛羊之牴突恣頑癡之鄙情或用力勢逼掠打撲抄奪具造惡業必死何疑一旦橫骸神何可滅隨業受苦永無救護可共悲哉非三寶不能救由此人不可拔若有智之人終不行此敬重寺法準而行之護惜三寶諮請法訓自招大益故經云眾僧良福田亦是蒺藜園斯言實矣當知衰利由心非前境咎資持釋云二明非法之相二初敘無知僅猶略也不體法意者總迷上三也都無下二句反上因緣也供養福田反上出離軼也多下次出非法三節初敘無智造業又四前斥聚會今世多然又下斥侵毀圖剝謂謀害牴突即觸犯恣頑癡者即不畏因果或下斥規奪具下總示因果二明有智獲益三引經合證經文雙喻下云衰利即合田園蒺藜有刺如菱而小前境謂僧寺已上皆見事鈔記卷三十九第二項清信女法事鈔云清信女人入寺儀式同前唯不得在男子上坐形相語笑脂粉塗面畫眉假飾非法調戲共相排盪持手𢴤人必須攝心整容隨人教令依次持香一心供養懺悔自責生女人中常成礙絕於此妙法修奉無因不得自專由他而辦一何苦哉應深生鄙悼若見沙彌禮如大僧勿以位小而不加敬此於大僧為小於俗為尊出家受具便入僧數不得以小兒意輕而持接設有說法當謹聽受勿復喚名而走使資持釋云初指同唯下次彰異又二初指過排謂推排即牽推等盪謂縱放𢴤觸也必下示法礙絕謂繫屬於人不自在故鄙謂厭惡悼即悔恨敬沙彌者恐謂未具不加敬故見事鈔記卷三十九第二節出寺法事鈔云如此等在寺中竭力而行所為事訖辭出寺門如法作禮佛前三拜至門一拜門外又一拜若僧少時次第各禮一拜多者總禮三拜凡以穢俗之身入寺踐金剛淨剎法地自多乖於儀式若去時須自贖其過隨施多少示有不空若布絹香油澡豆華水下至掃地除糞資持釋云初結前所下二正示初教禮辭凡下令捨施金剛堅利之寶伽藍福業之地故以喻焉見事鈔記卷三十九上來入寺法式中第一章中國舊法竟第二章今師要術事鈔云此入寺法中國傳之矣余更略出護過要術謂一切天人龍鬼是出家人修道之緣一切出家人為天人龍鬼生善境界出家人既為四輩生善之處不得對彼幽顯輕有所失彼四輩既是出家修道之緣又不得輒便見過佛已敕竟假使道人畜妻挾子供養恭敬如舍利弗大目連等莫生見過自作失善境之緣也資持釋云初明道俗相資修道緣者假彼外護故生善境福智由生故四輩即天人龍鬼幽通三趣顯則唯人假使道人等文出賢愚經如下第五門第一章中具引事鈔續云凡出家者長標遠望必有出要之期始爾出家捨俗焉能已免瑕疵也智士應以終照遠度略取其道不應同彼愚小拾僧過失所以天龍鬼神具有他心天眼而護助眾僧者非僧無過以剋終照遠耳今人中無察情鑒失之見情智淺狹意無遠達暫見一過毀辱僧徒自障出要違破三歸失於前導常行生死不受道化可謂惑矣小兒癡矣資持釋云二誡拾僧過失中初敘道眾志遠行薄智下次教俗士取志舍行終照即深識不責目今遠度即大量不見小過略謂揀略所下示幽靈同贊剋猶究也剋照皆龍天之心終遠即出家之志如感通傳韋天告祖師云天竺諸國不及此方此雖犯戒大塗慚愧內雖陵犯外猶慎護故使諸天見其一善忘其百非若見造過咸皆流涕悉加守護不令魔惱今下斥凡俗多譏初敘其愚迷自下彰過失上句障聖道次二句失善利後二句招苦報可謂下結歎已上皆見事鈔記卷三十九上來入寺法式中第二章今師要術竟上來別行篇中第二門入寺法式竟第三門造像塔寺造像塔寺中分為二章一造像塔法二造寺法第一章造像塔法造像塔法中分為二節一造像二造塔第一節造像造像中分為二項一通敘經像意二正明造像第一項通敘經像意事鈔云造經像法意者如來出世有二益一為現在生身說法二未來經像流布令諸眾生於彌勒佛聞法悟解超昇離生此大意也資持釋云現在即化相佛法一期益近未來即住持佛法三時益遠即經云應可度者皆悉已度其未度作得度緣是也見事鈔記卷三十七第二項正明造像正明造像中分為二支一中國造立元緣二此方制度漸失第一支中國造立元緣事鈔云恐後生造像無所表彰故目連躬將匠工上天圖取如是三反方乃近真至於下天此像垂地來迎世尊命曰汝於來世廣作佛事因垂敕云我滅度後造立形像一一似佛使見者得法身儀則乃至幡華供養皆於來世得念佛三昧具諸相好如是造立是佛像體資持釋云先敘目連圖寫以佛生七日摩耶命終生忉利天佛後成道思報母恩昇天說法經於一夏按造像經時優填王思念如來命目連引三十二匠往彼天中以栴檀木各圖一相如是至三方得圓足文云恐者若論圖寫似指目連取後垂誡須推佛意雖緣在優填意存來世後引如來垂誡中二初明授記即優填王聞佛下天將像至寶堦所像即迎佛自行七步佛為摩頂授記辭如鈔引低首曲身故云垂地因下次正誡敕法身儀則者威容相好法身之表故得念佛三昧者由見色像三昧易成故具相好者由生欣慕能感勝報故如是者即指檀像敕後効之見事鈔記卷三十七第二支此方制度漸失事鈔云所以中國傳像在嶺東者並皆風骨勁壯儀肅隆重每發神瑞光世生善逮於漢世髣髴入真流之晉宋頗皆近實並由敬心殷重意存景仰準聖模樣故所造靈異資持釋云初前代近真中二初引西土傳來嶺東即此震旦在蔥嶺之東風骨勁壯言其體貌勁即直也儀肅隆重言其威勢每發神瑞言其靈異光世生善言其動人逮下次引此土創製漢世佛法初來至於晉宋已前也髣髴猶似像也並下總出所由初句心重次即追慕三謂法古故下結成所引事鈔續云今隨世末人務情巧得在福敬失在法式但問尺寸短長不論耳目全具或爭價利鈍計供厚薄酒肉餉遺貪婬俗務身無潔淨心唯涉利致使尊像雖樹無復威靈乃至鈔寫經卷唯務賤得弱筆粗紙惡匠鄙養致使前工無敬自心有慢彼此通賤法儀滅矣資持釋云二後世失法三初明非法中二先敘得失與之且言福敬奪之過在無法但下次列非相又二初斥造像上四句是營勾人非酒下四句即匠者之非致下二句顯其無功乃至下次明造經事鈔續云致令經像訓世為諸信首反自輕侮威靈焉在故致偷盜毀壞私竊冶鑄焚經受用多陷罪咎並由違背世出世法現在未來受無量苦皆由失法之所致也資持釋云二示過患中三初敘無靈經像住持功高故為信首故下顯過偷盜是遭奪失毀壞即風火所損私竊冶鑄謂金銅等像鎔為別物焚經受用即金銀字經燒取餘用多陷罪咎謂累他也並下出意薄賤輕侮乖俗禮教非佛嚴敕故云違背世出世法現未兩報因像而致後之製造可不慎耶事鈔續云若使道俗存法造得真儀鳥獸不敢汙踐何況人乎但能奉聖像儀佛亦垂形示迹資持釋云三明應法中初明合法有靈但下次明至誠感聖已上皆見事鈔記卷三十七第二節造塔造塔中分為六項一示名二顯報三敬護四造處五供養修治六造毀二報第一項示名事鈔云雜心云有舍利名塔無者名支提塔或名塔婆或云偷婆此云塚也亦云方墳支提云廟廟者貌也資持釋云初示名舍利及塔名通凡聖今明造立多是佛塔亦通餘聖無名支提謂安形像故下釋云廟貌也塔或下翻釋見事鈔記卷三十七第二項顯報事鈔云增一阿含云初起偷婆補治故寺並受梵福云何梵福如閻浮一洲人功德不如一轉輪王功德如是西東北天下乃至四天六欲初禪總多比一梵主功德此為梵福量當如是學資持釋云初示因果初起謂新創也梵福謂梵天王福最勝也次校量梵福此下勸修見事鈔記卷三十七第三項敬護事鈔云四分若起塔者應四方若圓若八角以石墼木作已用黑泥乃至石灰白土等應安基四邊作闌楯安香華著上聽安懸幡蓋物不得上塔上闌楯上護塔神瞋若有所取與開彼安幡蓋不得蹈像上作餘方便梯凳安之若塔露地供養具雨漬風飄鳥烏不淨者作種種舍覆之地有塵種種泥泥之須洗足器安道邊外作牆門安置若上美飲食用金寶等器盛之令白衣伎樂供養若飲食當與比丘沙彌優婆塞經營塔作者應食舍利安金寶塔中若繒緜中若持行者若畜生若頭上肩上擔戴若拂應用樹葉孔雀尾拂多有香華羅列基上闌上杙上嚮中繩貫懸屋簷前有香泥作手輪像乃至有餘泥地等資持釋云初明造立安基為堅牢故作闌為外護故懸幡蓋物即梯凳也不得下次制踐汙若塔下明覆蓋地下明泥治須下明器具以西國俗風多跣足故安道邊者登上便故外作牆者恐觸穢故若上下明獻供養飲食得與道俗即守塔人經營即造立者舍下明護舍利若下明拂但可去塵餘物皆得多下明莊嚴手輪者舊云佛手中千輻輪見事鈔記卷三十七第四項造處事鈔云僧祇塔事者起僧伽藍時先規度好地作塔處其塔不得在南在西應在東在北中國伽藍門皆東向故佛塔廟宇皆向東開乃至廚廁亦在西南由彼國東北風多故神州尚南為正陽不必依中土法也不得僧地侵佛地佛地不得侵僧地資持釋云初明擇地規謂看視其下指方所須東北者以寺門向東即在前面左邊二方為之註中前示西土亦合作並東北風多則穢氣不至殿塔此示寺門向東所以下明此方應在南西今此廚廁多在東北亦以南西風多故也不得下制侵犯西土佛法僧地各有分齊不相混濫見事鈔記卷三十七第五項供養修治事鈔云善生經云善男子如來即是一切智藏是故智者應當志心勤修供給生身滅身形像塔廟若於空野無塔像處常當繫念尊重讚歎若自力作若勸人作見作生喜如其自有功德力者要當廣教眾多之人而共作之既供養已於己身中莫生輕想於三寶所亦應如是凡所供養不使人作不為勝他作時不悔心不愁惱合掌讚歎恭敬尊重若以一錢一線一華一香一偈一禮一帀一時乃至無量寶無量時若自獨作若共他作善男子若能如是志心供養佛法僧者若我現在若涅槃後等無差別若見塔廟應以金銀銅鐵繩鎖幡蓋伎樂香油燈明而供養之資持釋云初勸化供養五段初勸修一切智者總收十界世出世智無不圓足含蘊無窮出生無盡故喻如藏生身即現在滅身即舍利若自下明營辦自有功德者謂富於道行人所信重者於己莫輕者以能供養獲大福德故凡下明用心若以下明施物現在滅後無差別者謂所得福存沒正等故若見下明供具事鈔續云若見鳥獸踐蹋毀壞要當塗治掃除令淨暴風水火人所壞處亦當自治自若無力當勸人治或以金銀銅鐵土木若有塵土灑掃除拂若有垢汙以香水洗資持釋云二見塔塗治自作勸人隨力所構事鈔續云若作寶塔及作寶像當以種種幡蓋香華奉上若無真寶力不能辦次以土木而造成之成訖亦當幡蓋香華伎樂種種供養若是塔中草木不淨鳥獸死屍及其糞穢萎華臭爛悉當除去蛇鼠孔穴當塞治之銅像木像石像泥像金銀瑠璃頗梨等像常當洗治任力香塗隨力造作種種瓔珞乃至猶如轉輪聖王塔精舍內當以香塗若白土塗作塔像已當以瑠璃頗梨真珠綾絹錦綵鈴磬繩鎖而供養之畫佛像時綵中不雜膠乳鷄子應以種種華貫散華妙拂明鏡末香散香燒香種種伎樂歌舞供養晝夜不絕不如外道燒酥大麥而供養之終不以酥塗塔像身亦不乳洗資持釋云三造立莊嚴中初明造立若是下明淨治任下嚴飾畫下明雜穢此土多用魚牛等膠雖復腥鱣且圖久固應下明供養不下示非法酥塗乳洗皆外道法故事鈔續云不應造作半身佛像若有形像身不具足當密藏覆勸人令治治具足已然後顯示見毀壞像應當志心供養恭敬如完無別如是供養要身自作自若無力當為他使亦勸他人令作助之資持釋云四接續毀損令密藏者不生善故令恭敬者恐生慢故今時有作涌壁或畫佛首相並宜藏之已上皆見事鈔記卷三十七第六項造毀二報事鈔云無垢清信女問經云未知掃佛塔地有何善報佛告女言掃佛地得五福一自心清淨他人見已亦生淨心二為他愛三天心歡喜四集端正業五命終生善道天中涅槃云不犯僧佛物塗掃佛僧地造像若佛塔常生歡喜心皆生不動國資持釋云初掃治善報二初無垢女經五福一是內感二三即外應四五即來報四是別報五即總報二涅槃偈彼云東方有佛世界名不動佛號滿月光明無畏菩薩白佛此土眾生造何等業得生彼國佛以偈答如鈔引上四句即四種因正取中二下一句示果言不犯者謂不侵損也事鈔又云十輪若破寺殺害比丘其人欲終支節皆疼多日不語墮阿鼻獄具受諸苦資持釋云二毀壞惡報破寺報重反明造立功深已上皆見事鈔記卷三十七上來造像塔寺中第一章造像塔法竟第二章造寺法事鈔云有盛德法師造寺誥十篇具明造寺方法祇桓圖樣隨有所造必準正教并護持匡眾僧網綱要等事繁不具略引宗科造寺一法資持釋云初標人法即靈裕法師稱美道行故云盛德寺誥即彼文通題具下示其所述事下明今所引見事鈔記卷三十七造寺法中分為二節一應法生善二無法致損第一節應法生善事鈔云謂處所須避譏涉當離於尼寺及市傍府側等佛殿經坊極令清素僧院廚倉趣得充事如此則後無所壞祇桓圖中凡立木石土宇並有所表令人天識相知釋門多法故能影覆邪術禽獸畏威形儀隱映為世欽仰資持釋云譏謂譏嫌涉即干涉經坊即今經藏木石等者植樹表其生長立石表其堅貞戒壇居東表發生之義無常院在西表傾沒非久立剎表迷者知歸樓觀表道品階漸池沼表魔外洗心栽蓮表行人心淨餘如彼說須者尋之圖經近日本將至文有兩卷即祖師撰者影覆邪術謂使魔外無其威勢影猶閉也禽獸畏威謂令異類不敢侵犯形儀隱映謂像設可觀為世欽仰即士庶生善見事鈔記卷三十七資持註云圖經等者宋時由日本齎還旋復佚失今再由日本請歸天津刻經處刊本名祇桓寺圖經與戒壇圖經合為一冊第二節無法致損事鈔云但歷代緜積秉教陵遲事存法隱錯舉意旨俗人既不曉法眾僧未解示導但相倣斆虛費財物競心精妙力志勝他房廊臺觀務令高顯過彼便止都不存法資持釋云初造立非法緜積猶言長久秉即執也錯舉謂每事廢立皆任意耳倣斆謂互習訛風競心謂鬬競為懷力志即竭力用意高顯即副競妙之心過彼乃稱勝他之志事鈔續云又還自騰踐如己莊宅眾僧房堂諸俗受用毀壞損辱情無所愧屈道承俗如奴事主是名寺法滅也其甚者打罵眾僧種種非法取要言之從僧強力抑奪貸借乞請乃至停屍僧院舉哀寺內置塚澡浴等並非法也資持釋云二騰踐毀壞明俗人愚暗文敘本主義通餘人毀壞約物損辱約僧承即奉事此科大字並引寺誥故註以助之乞請即求索請觀諸事彼時尚然今何足怪更有殿堂飲醼僧廚宰殺寄著雜物貯積糧儲或射作衙庭或編為場務婚姻生產雜穢難言斯由道眾之非才豈獨俗儒之無識每恨法門之覆滅孰為扶持更嗟獄報之艱辛誰當救療必懷深識豈不再思是知禍福無門唯人所召有力能濟傳而勉之事鈔續云若改往修來追法更新慎敬無犯者是則護持寺法也俗人造寺本為求福作出家之因得道之緣唯應禮拜供養為法諮請時時覲問如法往來彼此利益自他無惱名護持也故增一云阿闍世王得信已後敕國中無令事佛之家貲輸迎送豈非僧傳正法得信於人乎資持釋云三引勸俗流中初正勸改往謂悔上諸過修來謂期後超昇追法即依教更新即起敬次引經證闍王造逆邪見後方歸佛求悔故行此敕貲輸謂科配財物也迎送即祇奉官僚事佛之家俱令免放豈下推得信所以已上皆見事鈔記卷三十七上來造像塔寺中第二章造法竟上來別行篇中第三門造像塔寺竟第四門瞻視病人瞻視病人中分為四章一制意二簡人三安置處所四說法斂念第一章制意事鈔云制意者夫有待之形多諸嬰累四大互反六府成病若不假相提接薄命則無所託然則世情流變始終難一健壯則親昵病弱則捐捨鄙俗恆情未能忘此故如來深鑒人物知善未崇惡必相遵故親看病資持釋云初敘意中初敘病患多嬰累者通目眾苦也四大等者別示病惱也若下次明瞻視然下三示凡情故下彰聖引導按西域記祇桓東北有塔即如來洗病比丘處如來在日有病比丘含苦獨處佛問汝何所苦汝何獨居答曰我性疏懶不耐看病故今嬰疾無人瞻視佛愍而告曰善男子我今看汝事鈔續云故律中佛言汝曹不相看視誰當應為乃至世尊為病人洗除大小便已掃治臥處極令清淨敷衣臥之便立制云自今已去應看病比丘應作瞻病人若有欲供養我者應供養病人佛為極地之人猶勵諸比丘親自下接況同法義重如何相棄資持釋云二引證中初引緣便下立制佛下結勸事鈔續云問供養病者等佛何耶答謂悲心看病拔苦與樂慈行同佛故也又論云隨順我語名供養佛資持釋云三釋疑中徵上律文欲彰功行答中初約心行同佛又下次約隨順法制已上皆見事鈔記卷四十上來瞻視病人中第一章制意竟第二章簡人事鈔云二簡人中四分若有病者聽和尚乃至弟子從親至疎若都無者眾僧應與瞻病人若不肯者應次第差若無比丘沙彌優婆塞者比丘尼式叉摩那沙彌尼優婆夷隨所可作應作不應觸比丘資持釋云初制本眾有三一親屬自看二僧與三僧差準無比丘應令沙彌淨人看若無下次開女眾見事鈔記卷四十上來瞻視病人中第二章簡人竟第三章安置處所事鈔云三安置處所若依中國本傳云祇桓西北角日光沒處為無常院若有病者安置其中堂號無常來者極多還反一二即事而求專心念法其堂中置一立像金薄塗之面向西方其像右手舉左手中繫一五綵幡腳垂曳地當安病者在像之後左手執幡腳作從佛往淨剎之意瞻病者燒香散華莊嚴病者乃至若有屎尿吐唾隨有除之亦無有罪傳云原佛垂忍土為接羣生意在拔除煩惱不唯糞除為惡如諸天見人間臭穢猶人之見屏廁臭氣難言尚不以為惡恆來衛護何況佛德而有愛憎但有歸投者無不拔濟乃至為病者隨機說法命終恆在佛所不得移之資持釋云中國本傳戒壇圖經所謂別傳是也日光沒處者壇經云西方為無常之院由終歿於天傾之位也今寺亦有但方隅不定不知法故其堂中下次明設像立彌陀者歸心有處也然十方淨土而偏指西方者繫心一境想念易成故西方諸佛而獨歸彌陀者誓願弘深結緣成熟故是以古今儒釋靡不留心況濁世凡愚煩惱垢重心猿未鎖欲馬難調捨此他求終無出路請尋大小彌陀經十六觀經往生論十疑論等諸文詳究聖言必生深信矣像面向西病者在後謂將終之時已前常須瞻像令其繫心忍土者梵語娑婆此云堪忍大悲經云此界眾生忍受三毒及諸煩惱故人間臭穢者感通傳天人云人中臭氣上熏於空四十萬里諸天清淨無不厭之但以受佛付囑令護於法佛尚與人同止諸天不敢不來恆在佛所者恐心無繫念世事故見事鈔記卷四十上來瞻視病人中第三章安置處所竟第四章說法斂念說法斂念中分為二節一餘人勸導二瞻病勸導第一節餘人勸導事鈔云四說法勸善者十誦應隨時到病者所為說深法是道非道發其智慧先所習學或阿練若誦經持律法師阿毗曇佐助眾事隨其解行而讚歎之資持釋云深法但是佛教通得云深是道謂出世法非道即世間法事鈔又云傳云中國臨終者不問道俗親緣在邊看守及其根識未壞便為唱讀一生已來所修善行意令病者內心歡喜不憂前途便得正念不亂故生好處資持釋云令唱讀者準此生前所修一切功德並須記錄凡為看病常在左右策其心行恆令念善以捨報趣生唯在臨終心念善惡已上皆見事鈔記卷四十第二節瞻病勸導事鈔云其瞻病者隨其前人病有強弱心有利鈍業有粗細情有去取當依志願隨後述之或緣西方無量壽佛或兜率彌勒佛或靈鷲釋迦本師或身本無人妄自立我或外相似有實自空無如至𦦨處則無水相或為說唯識無境唯情妄見各隨機辯而誘導之資持釋云初明說法中二前明量機病強弱者觀其健困也心利鈍者智明昧也業粗細者粗如營福細如禪講等情取捨者所樂異也如下西方兜率等是此四觀察義無不盡隨宜方便臨事自裁或下次明說法三初令緣佛或教稱名或令觀相或歎功德令生欣樂或身下次示心觀即性空相空唯識三觀至𦦨處者喻相空也謂如渴鹿逐於陽𦦨遙見似水至彼元無各下後示隨緣不必如上故事鈔又云應以經卷手執示其名號又將佛像對眼觀矚恆與善語勿傳世事華嚴偈云又放光明名見佛彼光覺悟命終者念佛三昧必見佛命終之後生佛前見彼命終勸念佛又示尊像令瞻敬又復勸令歸依佛因是得成明淨光資持釋云二示經像中初示經像次引華嚴為證已上皆見事鈔記卷四十上來瞻視病人中第四章說法斂念竟上來別行篇中第四門瞻視病人竟第五門離諸非法離諸非法中分為五章一別請僧眾二受僧食物三謫罰可否四食肉五畜養貓狗第一章別請僧眾事鈔云五分僧次請者凡夫聖人坐禪誦經勸佐眾事並為解脫出家者得入僧次唯除惡戒人若言次第上座者是僧次攝又不知齊幾為上座佛言上無人者皆名上座以法取人或言禪師等是別請若言禪師十人便除法師律師甄簡異故不名僧次十誦善生中以羅漢法請人不稱名字猶名別請為佛所訶資持釋云初簡能受人文列五種並堪預數不可揀擇若下二示僧次法又二初正示以下顯非以法取者雖不定名簡其所學即非僧次此謂雖通而別非平等故十誦下三引文證彼云有人請佛五百羅漢佛言不名請僧福田若能於僧中請一似像極惡比丘猶得無量果報與下增一意同見事鈔記卷二十三事鈔云梵網云別請物者即盜四方僧物仁王經亦呵責別請過既僧次福大有憑請者應說僧次功能開悟俗心勿令別請資持釋云初引文示仁王亦呵責者彼云諸惡比丘受別請者是外道法都非我教等既下二令勸讚僧次見事鈔記卷三十八事鈔云增一云師子長者別請五百羅漢佛言不如僧次一人福不可量因說如飲大海則飲眾流師子言自今已後當不別請佛言我亦不令別施以無有福師子便平等施亦不言此持戒犯戒佛讚善哉平等之施獲福無量平等施者施中第一賢愚經以㲲施佛佛讓與僧義意同此正使將來法垂滅盡比丘畜妻挾子四人已上名字眾僧漫請供養應當敬視如舍利弗等資持釋云前引增一彼云佛在羅閱城長者請舍利弗目連等五百人佛訶如鈔飲大海者由心通僧寶無所簡擇雖得一人則為供養十方凡聖故賢愚中姨母自紡績作一端金色㲲上佛佛言可以施僧得福無量挾抱也名字僧無實德者資持云問前引五分除惡戒者此何相違答疏云五分簡人精也賢愚取人粗也破戒受施且取外生物信令於僧海自感施福非謂行缺能消信施疏中意也私謂五分除惡戒等並謂極誡內眾使自策勤增一賢愚十誦善生皆據導俗恐忽慢僧徒自招枉墜是知受須戒淨不淨則自陷無疑施必普周不周則所施無福用斯往判諒無所違已上皆見事鈔記卷二十三上來離諸非法中第一章別請僧眾竟第二章受僧食物此章諸文多誡道眾不得妄與而俗眾亦可因是了知於僧食物不得妄索妄受也受僧食物中分為三節一明用與二約緣開三示汙家第一節明用與事鈔云佛法中無貴賤親疏唯以有法平等應同護之人來乞索一無與法若隨情輒與即壞法也資持釋云初勸依法一無與者謂不非用也心能依法如下則聽事鈔續云俗人本非應齋食者然須借問能齋與食不能齋者示語因果使信罪福知非為吝懷歡而退此中非生人好處非生人惡處不得一向瞋人一向任人不齋者而食必須去情存道善知處量也是以謹守佛教慎護僧法是第一慈悲人現在未來一切眾生離苦得樂故資持釋云二示損益二初守教之益中初明善用註云非生好者以任情故非生惡者以依法故是下結益上云齋者如宗體篇八戒中委明白衣能受齋者得食出五分律事鈔續云若不守佛教隨情壞法謂聽俗人不齋而食有來乞請隨請輒與令諸眾生不知道俗之分而破壞僧法毀損三歸既無三歸遠離三寶令諸眾生沈沒罪河流入苦海失於利樂皆由壞法是以不守佛教不閑律藏缺示羣生自昏時網名第一無慈悲人也資持釋云二違教之損中初明非用令下二示過初明失利後令諸下明墮苦道俗分者道修智分為俗福田俗修福分當供道眾今則反亂故云不知毀三歸者失彼信心侵陵三寶故是下三結損已上皆見事鈔記卷七第二節約緣開事鈔云五分若白衣入寺僧不與食便起嫌心佛言應與便持惡器盛食與之又生嫌心佛言以好器與之此謂悠悠俗人見僧過者若在家二眾及識達俗士須說福食難消非為慳吝資持釋云初引文此下義決初指前文且據無信悠悠謂遠離三寶無所歸者若下次明有信福食謂檀越求福施眾僧故事鈔續云十誦供給國王大臣薪火燈燭聽輒用十九錢不須白僧若更索者白僧給之惡賊來至隨時將擬不限多少僧祇若惡賊檀越工匠乃至國王大臣有力能損益者應與飲食多論云能損者與之有益者不合即是汙家若彼此知法如律亦得資持釋云初引十誦明用分齊初給王臣十九錢者彼土大銅錢一當十六當今三百也下明賊難不可約數次僧祇中通列五人上三可解下示王臣須論勢力必無力者應非所開多下引決由上律云損益皆與既是有益理不當與在文不了故續決之若下通上律意俗知僧物難消必無虛受僧知汙家非法必無妄與但有緣須給微亦通之十誦通開諒在於此已上皆見事鈔記卷十七第三節示汙家事鈔云比丘凡有所求若以種種信施物為三寶自身乃至一切而與大臣俗人等皆名汙家由以信施物與白衣故即破前人平等好心於得物者歡喜愛樂不得物者縱使賢善無愛敬心失他前人深厚福田又倒亂佛法故凡在家俗人常於三寶求清淨福割損血肉以種善根今出家人反持信物贈遺白衣俗人反於出家人所生希望心又若以少物贈遺白衣因此起七寶塔造立精舍乃至四事滿閻浮提一切聖眾亦不如靜坐清淨持戒即是供養真實法身資持釋云凡所求者總收多事不問公私善惡皆不許之縱賢善者據比丘言之事鈔又云律不犯中若與父母病人小兒妊娠婦女牢獄繫閉及寺中客作者不犯已上皆見事鈔記卷十九與父母者準母論須父母貧苦而先受歸戒者乃可施與上來離諸非法中第二章受僧食物竟第三章謫罰可否謫罰可否中分為二節一別列二會通第一節別列別列中分為二項一勸俗敬護二勸俗治惡第一項勸俗敬護事鈔云十輪經云若諸比丘護持戒者天人供養不應謫罰除其多聞及持戒者若有破戒而出家者能示天龍八部珍寶伏藏應作十種勝想佛想乃至禮足後生豪貴得入涅槃是以依我出家持戒破戒不聽輪王宰相謫罰況餘輕犯破戒比丘雖是死人是戒餘力猶如牛黃麝香眼藥燒香等喻破戒比丘為不信所燒自墮惡道能令眾生增長善根以是因緣一切白衣皆應守護不聽謫罰資持釋云初四句明持戒除下明破戒為二前約報勸上二句揀除如法若下明破者功能此明破戒必約犯重天龍下彼具列夜叉乃至人非人等今文束之應下勸俗恭敬後下示報是下結意破戒下次約喻勸初舉喻牛黃下經云是牛雖死人故取之亦如麝香死後有用又云譬如估客入於大海斷無量眾生命挑其兩眼和合成藥若盲冥無目乃至胞胎生盲者以此藥塗其眼明淨彼人雖死其藥有功又云譬如燒香香體雖壞熏他令香破下合法上三句合牛麝人死及香體壞能下合香藥有用香氣熏他以是下結意見事鈔記卷七第二項勸俗治惡事鈔云涅槃云今以無上正法付囑諸王大臣宰相及於四眾應當勸勵諸學人等令學正法若懈怠破戒毀正法者大臣四部應當苦治資持釋云初令勸學四眾即僧尼士女下云四部亦同正法者經作定慧若下二勸苦治事鈔續云大集云若未來世有信諸王若四姓等為護法故能捨身命寧護一如法比丘不護無量諸惡比丘是王捨身生淨土中若隨惡比丘語者是王過無量劫不復人身資持釋云初明護如法之益四姓者西土姓種統之唯四一剎帝利王種二婆羅門淨行三毗舍商賈四首陀農人若下二明隨惡人之損事鈔云大集云若末世中有我弟子多財多力王等不治則為斷三寶種奪眾生眼雖無量世修戒施惠則為滅失廣如第二十八卷護法品說資持釋云初明國王縱彼造惡則下顯過斷三寶者翳障正法也奪眾生眼者損他正見也戒施滅失者損自功德也已上皆見事鈔記卷七第二節會通事鈔云問前十輪經不許俗治涅槃大集令治惡者資持釋云問中二經相違故須和會事鈔續云答十輪不許治者比丘內惡外有善相識聞廣博生信處多故不令治必愚闇自纏是非不曉開於道俗三惡門者理合治之如後二經又涅槃是窮累教本決了正義縱前不許依後為定兩存亦得廢前又是資持釋云答中初兩存釋又下廢前釋窮即訓極累謂囑累一代所歸故云教本決前不了故是正義兩下雙結已上皆見事鈔記卷七上來離諸非法中第三章謫罰可否竟第四章食肉食肉中分為三節一引大廢小二引小急制三通禁諸物第一節引大廢小事鈔云諸律並明魚肉為時食此是廢前教涅槃云從今日後不聽弟子食肉觀察如子肉想夫食肉者斷大慈種水陸空行有命者怨故不令食廣如彼說經云前令食肉謂非四生之肉但現化耳為度眾生資持釋云初引涅槃制斷中二初示前廢教涅槃下次引後制斷爾前雖斷如楞伽等但通指其過涅槃終窮正為開會故特引之出如來性品初引廢前文三初二句立制次一句教觀厭經云如夫妻二人共攜一子同行曠野險難糧盡殺子而食垂淚而飱不得滋味今若觀一切眾生肉如子之肉作是想時必不貪食夫下顯過患大慈是佛心即於己他斷佛種故水陸空行者舉處攝物沈潛飛走無所不收今食肉者由害彼命即彼怨讎經下次引決前文欲彰前教無諸過故四生胎卵溼化經云為度眾生故示現食肉而實不食事鈔續云楞伽云有無量因緣不應食肉略說十種一者一切眾生無始已來常為六親以親想故不應食肉二狐狗人馬屠者雜賣故三不淨氣分所生長故四眾生聞氣悉生怖故五令修行者慈心不生故六凡愚所習臭穢不淨無善名稱故七令呪術不成就故八以食肉見形起識以染味著故九諸天所棄多惡夢虎狼聞香故十由食種種肉遂噉人肉故如斑足王經說資持釋云二引楞伽示過楞伽中十過最須觀察初恐食噉父母成惡逆故梵網經云一切男女皆是我父母我生生無不從之受生而殺而食者即殺我父母是也二恐食其同類非仁心也三謂禽畜交合精血所成腥臊穢物自內於口深可惡也四者由多噉肉易其血氣眾生聞之知是殺者五即涅槃所謂斷大慈種也六中由是愚癡不淨者所為故有食噉無善名稱七謂或持咒術必須精潔尚誡葷辛何況肉食八謂凡遇畜形即思其味故九中三過天報清淨所以捨棄不習善法故多惡夢身同畜氣故為虎狼所食十謂由此相因遂噉同類斑足王者其父遊獵至山染師子而生人形斑足後紹王位一日掌膳者闕肉求得小兒肉以充之王覺味殊因勅常供殺害既多眾欲殺王王變為飛行羅剎十二年中常食人肉事鈔續云今有凡愚多嗜諸肉罪中之大勿過於此故屠者販賣但為食肉之人必無食者亦不屠殺故知食者同屠造業沾殺生分可不誡乎資持釋云三伸誡中初明過重如向列故故下次明業深同屠殺故已上皆見事鈔記卷三十三第二節引小急制事鈔云僧祇云若為比丘殺者一切七眾不應食乃至為優婆夷殺七眾不食亦爾資持釋云初引僧祇急制為一眾殺而制七眾者以同沾佛戒意所通故彼律得食三種淨肉謂不見不聞不疑為我故殺者是知雖云得食還同禁斷下引四分其意益明事鈔續云今學戒者多不食之與中國大乘僧同例有學大乘語者用酒肉為行解則大小二教不收自入屠兒行內天魔外道尚不食酒肉此乃閻羅之將吏耳資持釋云二斥學罔時初明學戒中國學大乘者皆依梵網楞伽涅槃等制既修大行慈濟為先安有大乘方行殺戮有下指斥行謂為之無恥解謂執之不疑二教不收者以大小俱制反不依行教所不被故教既不被非佛弟子無慈好殺宜入屠行天魔報勝淨因所克外道苦行飱風自餓等故知噉肉未及魔外閻羅將吏信是同倫將吏謂夜叉鬼卒之類事鈔續云四分云若此殺者行十惡業為我故殺乃至大祀處肉不得食之以辦具來者心無定主故今屠者通殺則依教無肉可食正斷食肉也律云若持十善彼終不為我故斷眾生命如此應食準此何由得肉而噉資持釋云三顯四分密斷中初明制斷為我大祀二皆不淨今下顯意次明開食前與肉者須行十善豈有行十善者而有肉耶故云何由得肉等已上皆見事鈔記卷三十三第三節通禁諸物事鈔云楞伽云酒肉葱蒜韮薤之屬悉不嘗之資持釋云酒肉兼五辛文缺興渠或謂阿魏或云自有興渠根如蘿蔔蒜音算韮音久薤胡介反並葷菜也梵網云一切食中不得食楞嚴云熟食發婬生噉增恚如是世界食辛之人縱能宣說十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等因彼食次䑛其唇吻常與鬼住福德日消長無利益等見事鈔記卷三十三又南山律中嚴禁蠶衣乳蜜唯開重病不許輒飲如南山釋門章服儀云囚犢將乳劫蜂賊蜜過之大者無越蠶衣比夫屠獵之量萬計倍之諸文至繁今不委引上來離諸非法中第四章食肉章竟第五章畜養貓狗事鈔云或畜貓狗專擬殺鼠是惡律儀雜心云惡律儀者流注相續成也善生成論若受惡律儀則失善戒資持釋云初顯過雜下引示流注者惡業徧也相續者念念增也所以然者由彼害心非止一境復無時限故善生成論失善戒者惡勢強也惡業順惑勢力猛盛一切善戒並絕相續故有云且望一類鼠上善戒不續非謂餘戒俱無又云此乃誡勒之切耳見事鈔記卷七輕重儀云養畜貓狗專行殺害經論斷在惡律儀同畜便失善戒出賣則是生類業障更深施他還續害心終成纏結宜放之深藪任彼行藏必繫之顯柱更增勞役但依前判彼我夷然便息生殺怨家新樹慈悲聖宅見量處輕重儀卷上上來離諸非法中第五章畜養貓狗竟上來別行篇中第五門離諸非法竟第六門出家宗致問今輯在家備覽何以最後列出家宗致門耶答凡俗士尚未出家而欲出家者須先了知出家之後如何發心如何苦行自量己力以定可否若其力有未能應即知難而退不須率爾出家免致將來憂悔以是之故出家宗致為在家者所應預知因以此門殿於卷末焉出家宗致中分為三章一出俗本意二先說苦事三應知五德第一章出俗本意事鈔云沙彌建位出俗之始創染玄藉標心處遠自可行教正用承修濫迹相濟世涉多有資持釋云初敘本示濫中四上二句示位此中須分形法二同若但剃髮名形同沙彌若受十戒名法同沙彌次二句明本志上句言其始下句示其終玄藉通目佛教處遠直指佛果復次二句示律可依後二句斥世無訓事鈔續云然信為道原功德之母智是出世解脫之因夫出家者必先此二如未曉此徒自剃著內心無道外儀無法縱放愚情還同穢俗所以入法至於皓首觸事面牆者良由自無奉信聖智無因而生但務養身寧知出要勝業資持釋云次明信智二門中二初敘二法之要道由信立故為道原德自信生故云德母治業由智之力破惑在智之照故為解脫因也非信道德無以發非智業惑無以除出家之人為道求脫故云必先此二也如下敘不明之失初明形心混俗所下次顯愚法所以皓首即白頭也面牆無所見也無信則智不發無智則不慕道飽食暖衣悠悠卒世故云但務養身等也已上皆見事鈔記卷四十一出俗本意中分為七節一出家元緣二勸出有益三障出有損四明出家已行凡罪行五明出家已行凡福行六明出家已行聖道行七大小乘相決同異資持云標列七科前三明功次三明行後一決疑見事鈔記卷四十一濟緣云次列七科統明出家始終行相學者至此當須自檢若唯徒說於己何益說食數寶目擊多矣見業疏記卷十一第一節出家元緣出家元緣中分為二項一出家文證二引誡勸修第一項出家文證業疏云如華嚴偈若有不識出家法樂著生死不求脫是故菩薩捨國財為之出家求寂靜五欲所縳不離家欲令眾生解脫故以此文證眾生無始纏著家屬無思解脫故大士引出於世濟緣釋云華嚴二偈前偈為不識故立法示之後偈為著欲故方便引之初偈上二句示不識之過下二句明立法之相云菩薩者即指釋迦因行為言捨國財者菩薩在家為王太子次紹王位國城財寶一切自在欲明難捨猶須捨之況餘凡庶不足戀矣寂靜即涅槃果後偈初句示著欲下三句明方便文略下二句具云示現不樂處五欲是故出家求解脫以下疏家結顯推功歸佛業疏續云廣如郁伽長者涅槃經中家及非家相比顯過方起欣厭得預法門濟緣釋云郁伽長者經穢居品云居家菩薩當知在家穢污之事常念作故名為居家斷諸善根本是名居家乃至居家如羅網如毒蛇如火燒身等涅槃云居家迫窄猶如牢獄一切煩惱由之而生出家寬曠猶如虛空一切善法由之增長若在居家不得盡壽淨修梵行我今應當剃除鬚髮出家學道已上皆見業疏記卷十一資持云淨住子說出家有十八法難行能行父母是孝戀難遣而能辭親妻子是恩染難奪而能割愛勢位是物情所競而能棄榮飢苦是人所難忍而能節食滋味是人所貪嗜而甘噉蔬澀翹勤是人所厭倦而能精苦七珍是人所悋惜而能捨離錢帛是人所畜聚而能棄散奴僮是人所資侍而自給不使五色是人所欣覩而棄之不顧八音人所競聞而絕之不聽飾玩細滑人所保著而能精粗無礙安身養體人所共同而能忘形捨命眠臥是人所不免而晝夜不寢恣口朋遊人所恆習而處靜自檢白衣飲饌不知絕極而近口如毒白衣日夜無所不甘而己限以晷刻虛腹白衣則華屋匹詣切配也偶而己以塚間離著此齊文宣王蕭子良撰要故錄之見事鈔記卷四十一第二項引誡勸修業疏云然世濁惑深厭苦求樂初雖欣出終墜欲海不修行業故徒行也濟緣釋云初斥濁世不修二初示時機謂厭在家營趁之苦求出家供給之樂即涅槃云為衣食而出家者初下次明退墮詩云靡不有初鮮克有終即斯類矣徒行謂出家無益也業疏續云如智論云六情根完具智鑒亦明利而不求道法唐受身智慧禽獸皆亦知欲樂以自恣而不知方便為道修善事既已得人身宜勉自利益不知修道行與彼亦何異龍樹引誡為極言也聞而不行猶是不聞今重引告何得不用濟緣釋云二引聖論極誡二初論文三偈初偈上二句明報勝下二句嗟不學六情根者情即是識謂根識無缺也智能鑒物故云智鑒唐虛也身對初句智慧對次句次一偈舉況畜是癡報但知欲樂即經所謂但念水草餘無所知也後一偈中上半合初偈下半合次偈龍下結告勸依必應此偈出在他經故云引誡以畜況人為誡深切故云極言業疏續云道行何耶一切無染者是也良由眾生無始封著是此是彼是得是失因之起染纏縛有獄故世鈍者多著財色少有利者多貪名見四科束之尠不收盡終歸死去何事迷乎濟緣釋云三示所修行相二初示道行以偈文未顯故特徵示用開心路一切之言通收善惡塵境染惡則增業染善則成障能於日用所行所學觸境無染無染之智即是般若背塵合覺絕縛入道必始於此深可體究慎勿誦文良下反釋所以又三初示染本封著是貪愛此彼得失即分別由斯二種輪迴不息能離此者即名道行非別有道故下云道在虛通達累為本是也故下次舉世情財收八穢色乃荒婬名謂虛聲見即妄執上二常流所著故為鈍下二學者所求故為利此且一往分之然有具四或復互輕不必一定尠猶無也終下重誡凡在同徒用斯自照有一於是未脫輪迴積財荒色諍見沽名跡混世塵不思出要形出心沒何所利乎已上皆見業疏記卷十一形出心沒者業疏云雖形附道而心沈世也第二節勸出有益業疏云如出家功德經若能放人出家受戒功德無邊譬如四天下滿中羅漢百年供養不如有人為涅槃故於一日夜出家受戒謂由前施雖多有竭是欲界繫為法出家非三界業故說過前又云縱起寶塔至忉利天亦劣出家功德者一時欣出雖未可數然其積微是高勝本濟緣釋云初歎德譬下次引喻有二初供聖喻前引經謂下出意有漏有竭無漏無窮優劣可見又下二寶塔喻前引經一下示意見業疏記卷十一第三節障出有損業疏云如出家經為出家者而作留礙抑制此人斷佛種故諸惡集身猶如大海現得癩病死在闇獄無有出期濟緣釋云諸惡集身等謂業深廣故喻如海癩病墮獄即現生兩報見業疏記卷十一資持云出既有功障則損大留礙如親里不聽抑制如王臣禁斷見事鈔記卷四十一第四節明出家已行凡罪行業疏云據論罪本皆由事縛不思厭背師心妄造如大寶積經出家二縛謂諸見利養也如律緣制由名利故便生有漏因制諸戒為防罪業障三塗也濟緣釋云初明罪本中二初正示言事縛者即上四科因之生罪故為罪本如大下引示寶積諸見即人法兩執利養謂所須四事律緣即舍利弗請佛制戒佛言我自知時未得利養過漏未起後須提那等皆由利養豐盈向道心薄遂生過漏故知名利毀戒之緣欲脫死生深須遠離業疏續云今世出家翻種苦本不畏沈溺多起下業故彼文云又有二癰謂求見他過自覆己罪向諸行者知來實苦決定現世不造苦因如知火燒湯爛無有納手足者佛說罪事深宜遠離以不信所燒隨心造罪更增俗人濟緣釋云次明造惡中二初指世垂誡三初傷時眾業能生苦故云苦本出家脫苦今既造業故云翻種下業即三途因故下次引文示即是寶積前已標名故此略之求他覆己於心為患故喻癰瘡向下三正垂誡二初勸知果斷因向謂語告納猶入也佛下次明違教造業不信能喪善根功德故如燒焉資持云寶積二縛喻不自在二癰喻不清淨並喻自心智者幸宜自照慎勿自謾謂是他也見事鈔記卷四十一業疏續云故十誦云未來世中出家人入地獄白衣生天者以俗人無法在身但專信故得生天也出家有法為世福田乃反毀犯妄受信施開諸惡門令多眾生習學放逸故濟緣釋云二引教轉證三初十誦二初引文以下顯意前明白衣生天後明出家入獄一反道法二妄受施三令他習學白衣無此故昇沈異焉業疏續云四分中為說利養難消六十比丘得無學也六十比丘熱血從面孔而出六十比丘畏佛語故便退還俗濟緣釋云二四分六十得果即清淨者六十流血謂毀犯者六十退道即初入者業疏續云餘如涅槃為利出家驅逐淨行等濟緣釋云三涅槃彼云我涅槃後濁惡世時多有為飢餓故發心出家名為禿人見有持戒威儀具足清淨比丘護持正法驅逐令出若殺若害已上皆見業疏記卷十一資持云涅槃為飢餓者以出家人衣食易得故見有持戒驅逐殺害者自無戒德恐相形比失於利養生嫉忌故見事鈔記卷四十一已上明出家已行凡罪行業疏文科表別列於下以備對閱初明罪本初正示二引示二明造惡初指世垂誡初傷時眾二引文示三正垂誡初勸知果斷因二明違教造業二引教轉證初十誦二四分三涅槃第五節明出家已行凡福行業疏云凡出家者出有為家為解脫者謂脫纏縛此為本也濟緣釋云出家求脫經律通言牒以釋之示其行本有為總目三界纏縳且論二惑業疏續云今有行者但知持戒無心在道道在虛通達累為本此而不思但持戒善自餘講解修習觀務悉為非道內多瞋忿久污淨心此戒取結謂為最勝又是見取體是欲界增生下業濟緣釋云明凡福行相中四初持戒二初敘持戒昧道言虛通者道之體也言達累者道之用也餘為非道者是此非彼也內多瞋者怒他不從己欲也此下結示行果凡夫具十使貪瞋癡慢疑五鈍使也身見邊見邪見戒取見取五利使也今此執戒為勝即二種結使煩惱耳既無禪觀未脫欲有故是下業業疏續云若修世禪緣色緣心雖經上界終還生死未有出期濟緣釋云二修禪世禪即四禪四空定也緣色故生色界緣心故生無色界業疏續云若修多聞講誦經典不為解脫並增欲有未成無漏濟緣釋云三多聞多聞講誦多為名聞利養馳騁見解是非相勝皆是下業學者聞之宜乎自省業疏續云若營世事供養三寶塔寺等相心無欣道最是我所或淪下趣由造善時自愛憎他行諂行誑雜惑成樹故受鬼趣相似果報以心非實生在惡道以福事成故受勝處濟緣釋云四營事二初明行果由下次推心因以強勝故自愛憎他以追求故行諂行誑此等不一故云雜惑積集既眾故喻如樹惡道是總報勝處即別報濟緣云愚者見此便謂持戒多聞皆不足為而不知徒行無詣故為世福若真求脫無非聖道但心有通塞事豈替廢耶已上皆見業疏記卷十一資持云準知修道事行難分自非達人何由可識見事鈔記卷四十一第六節明出家已行聖道行業疏云但出世道無始未經皆由著世慣習難斷今既拔俗智鑒明利若不行者禽獸無別濟緣釋云初敘難行所以今下次勸勵力須修即用上文智論偈意業疏續云然聖道行經說乃多並隨機緣故藥無準要而言之不過三種業疏續云一者小乘人行觀事生滅知無我人善惡等性二小菩薩行觀事是空知無我人善惡等相三大菩薩行觀事是心意言分別故攝論云從願樂位至究竟位名觀中緣意言分別為境濟緣釋云三種觀法並云觀事者事即觀境統收諸法文中且舉我人善惡故云等也初則見相如實觀性本空次則見相如幻空華水月當相即空不待觀性後則觀一切法唯心所變心外無法初觀生滅滅已見空次觀幻化生處見空後觀唯心生滅幻化無非心變以心生法生心滅法滅生滅有相相如幻化二乘小聖見之為空而不知生滅去來本如來藏故大菩薩但了唯心圓修三觀不偏性相故名中道意言分別者謂觀一切諸法皆由心思口議分別前事故有差別萬法皆歸思議思議不出自心攝末歸本故云唯心下引攝論即攝大乘論願樂位通收加行三賢也究竟位別指最後妙覺行雖淺深皆觀唯識即是中道故云觀中緣謂能觀意言分別即所觀故云境也已上皆見業疏記卷十一資持云三觀並云觀事者事即是境心依境起隨境立觀謂色心陰入界有情無情善惡無記等若論智解須達諸法若於時中觀心為要隨心所起起即是事若善若惡三理照之乃知顛倒但有妄計本無所有隨心動用一切皆空或推相見性謂之性空即相知幻謂之相空達相是心謂之唯識猶如夢事或推夢想從何生滅或知睡夢當相不實或知唯心所變無別夢事喻上三觀略知淺深然行位有三觀境唯一所謂事也見理有二前二性相雖殊皆以空為理也後一以心為理前二為權後一是實然出家超世通學三乘今依業疏準開會意專指佛乘為出家本矣性空中初句標位次句示行觀即能觀智事即所觀境下二句見理以我人善惡性本自無緣會故生緣散即滅生滅滅處名為空理即是二乘所至之極次小菩薩中位行理三同上分之三大菩薩中初句標位次句明理觀法唯心即事顯理故下句示行以一切諸法本唯一識一識之外更無別法無始妄動橫計心境有彼有此內外差別窮此差別皆是意思妄起取著由取著故妄構名言是故智者欲觀唯識必以意言為所觀境由此意言皆一識故是則不離思議了非思議即於差別達無差別故下引證見事鈔記卷四十一資持云上之三科總論十界之因故並名行凡罪即三途行凡福即修羅人天行聖道即三乘佛果行歷示心行令識因果捨罪修福革凡成聖厭小慕大趣一佛乘是故業疏專指大乘為出家學本即戒本云若有自為身欲求於佛道是也見事鈔記卷四十一第七節大小乘相決同異資持云相決同異同謂進修方便唯是三學無別途故異乃心志廣狹故分二乘用與別故事鈔云三乘道行如上已明今通決正不出三學一切聖人無不行此資持釋云上二句躡前今下正示已上皆見事鈔記卷四十一大小乘相決同異中分為二項一小乘三學二大乘三學第一項小乘三學事鈔云若據二乘戒緣身口犯則問心執則障道是世善法違則障道不免三塗資持釋云初戒中緣身口者謂制法也犯問心者推業本也此據四分空宗為言執下二句明持失也或專慕人天則滯於凡福或計為至道則墮於利使違下二句明犯報也事鈔續云定約名色緣修生滅為理故佛性論云二乘之人約虛妄觀無常等相以為真如慧取觀照與定義別體同資持釋云二定慧二前明定學名色即所觀境一蘊是色四蘊是心心道冥昧止可名通故總云名緣修即能觀心生滅即所見理以色心二法念念生滅生滅故無常無常故無性無性故空寂空寂即滅諦涅槃真如之理故下引證彼明小乘所證非真見佛性故也虛妄即名色無常即生滅真如即空理次慧學中定是澄寂慧取照用動息不同故云義別同一心體故云體同水澄物現鏡淨像生定慧一異喻之可解已上皆見事鈔記卷四十一第二項大乘三學事鈔云若據大乘戒分三品律儀一戒不異聲聞非無二三有異護心之戒更過恆式資持釋云初戒二初標示同異三品即三聚準智論中二乘但有斷惡一聚雖有作持還歸離過不修方便教化眾生故無攝善自調自度故無攝生是以今文但舉律儀比校同異言不異者準業疏圓宗謂同三聚彼云戒分三品約義收緣不異諸律由非明制故云約義如殺一戒具兼三位息諸殺緣即攝律儀常行慧命即攝善法護前生命即饒益有情此一既爾餘戒例然已上疏文性戒並例此說若論遮戒如酒寶等離畜飲過即攝律儀常行對治即攝善法息世譏嫌即攝眾生若取大小戒本以分則小教四夷大乘十重四夷大同餘六並異以至畜寶然身等異相極眾且云二三意顯同多異少故也護心戒者防瞥爾也如梵網制不慳不瞋等又涅槃隔壁聞鐶釧聲分別男女心染淨戒之類濟緣云若準智論聲聞戒但有斷惡一聚今用大意決於小宗約義明同莫不齊具疏中且舉殺戒餘並例作如婬息諸染緣常修梵行不污前生如盜則離侵損緣常行惠施不惱前生如妄則離虛妄緣常行實語不誑前生等見業疏記卷十一三聚之義於宗體篇五戒豫習發戒依境發心支中委釋事鈔續云智論問云菩薩住於實相不得一法得破戒否答曰以住於實相故尚不作福何況作罪雖種種因緣不破戒人資持釋云二廣示異相中三初智論住實相者心冥妙理空無所有故不得一法既無所得則無善惡既無善惡則無持破既無持破則無有戒既無有戒則應任意施為不須守戒世多邪見故問決之答中以福況罪不作福者不取福相故云不作種種因緣謂方便化導隨所動用皆離過故事鈔又云攝論云菩薩得無分別智一切塵不顯現由有勝智方便具行殺生等十惡由前有利益故自無染濁過失縱有利益有過失不應行準此初地已上方得用此無分別智故地前不合資持釋云二攝論中勝智即無分別方便謂誘化眾生準下判位初地已上者故知十聖方許行之地前三賢猶制不合況餘凡愚安可僭濫濟緣云無分別智謂觀諸法如實平等故無分別唯一真體外塵本無故塵不顯現方便即權巧有利益者謂利他也自無染者謂自利也具此二利雖行無犯互有所缺亦不行之故云縱有等今時愚人不量位地不知權行作惡無恥妄引為例自誤誤他難可救也見業疏記卷十一事鈔續云涅槃持息世譏嫌戒與性重戒無別因說菩薩持戒相羅剎乞浮囊喻資持釋云三涅槃中初明持相息世譏嫌即目遮戒遮性等持故云無別次以喻顯渡海人喻菩薩羅剎喻三毒浮囊喻具戒事鈔云若論定慧小觀相空深觀唯識鈍見空時不分別色利知唯識不分別空資持釋云次定慧中由小菩薩涉於大小小據觀智大約志求小大雖異並菩薩乘故且一往通收大中初示觀別如上所明次校淺深鈍即小菩薩在大為鈍望小則利不分別色異上二乘析色故利即大菩薩不分別空超過小菩薩故由觀唯識住於中道了一切法無非心識識非色空非不色空尚不分別識何況分別空若知唯識則住實相無分別故以上皆見事鈔記卷四十一上來出家宗致中第一章出俗本意竟第二章先說苦事羯磨註云僧祇云若初欲出家者為說苦事一食一住一眠多學問答能者度見隨機羯磨第三次科亦爾業疏釋云為說苦事者以世網苦辛多厭求樂初雖慈許終有退敗一食者佛教之中一食為本託緣開二不是長途至今西域統五天竺常行一食希見東華寺別兩頓一住者一坐跏趺周時方起自非味重何以致斯一眠者中夜之時暫爾倚臥分星月次尋起緣念多學者慧心常運不許浮散也濟緣釋疏云世網苦辛謂工商士農經營求趁不容自安人多厭之求安閑樂故反說苦事知其志願初慈許者謂師輒受也終退敗者謂資疲厭也一食中初二句明本制託下示緣開因病開粥故至下引據希下斥非今時見便進噉豈止兩頓律崩法壞一至於此悲夫周時謂盡一日味重謂禪定樂倚臥謂倚身而已分星月次不使長久故慧心常運即遺教云常自省察不令有失是也見業疏記卷十一資持云僧祇先說苦事欲令知難免後悔故四分則有十種謂能耐風雨寒熱飢渴毒蟲惡言一食持戒見事鈔記卷四十一上來出家宗致中第二章先說苦事竟第三章應知五德羯磨註云如請僧福田經沙彌應知五德一者發心出家懷佩道故二者毀其形好應法服故三者永割親愛無適莫故四者委棄身命遵崇道故五者志求大乘為度人故業疏釋云初德發心懷道者創發蒙俗情厭諸有唯欣出要常懷佩也佩謂帶持之者也二德毀形應法者道俗路乖反形易性故割其所重服彼所輕明志絕奢靡與世違也三德割愛懷捨者以無始所親慈戀難斷終歸死別然不早悟今近割俗緣遠成濟度且從道業兩捨親疎也故善見云瓦鉢貫肩以四海為家居知誰可愛憎也四德委命遵道者明崇奉三學死而有已也五德志大度人者奉行極教兼濟於他濟緣釋疏云初德中初釋上句唯下釋下句二中初通示故下別釋上二句釋反形下二句釋易性奢則華侈靡謂美麗三中初敘情愛世俗貪生不知有死故不早悟今下釋永割兩捨親疎謂無適莫適字音嫡故下引證四中奉崇三學釋下遵道死而有已釋上委命五中大乘窮理盡性謂之極教見業疏記卷十一資持云此之五德出家大要五眾齊奉不唯小眾終身行之不唯初受疏云斯德始終通於五眾俱堪物養人天師範故使誦持無輕受體及形服也見事鈔記卷四十一上來出家宗致中第三章應知五德竟上來別行篇中第六門出家宗致竟上來第四別行篇竟弘一大師晚歲輯南山律在家備覽略編費時二載極費苦心稿凡三易方得告成原擬全部寫成現代文言俾淺顯易讀而未果遂據持犯篇註本書應有附錄而手稿中無之妙蓮法師檢大師遺稿有戒體章名相別攷日中攷古今尺略圖受十善戒法等酌取以充附錄猶恐未盡契合大師本意囑為附帶聲明如上案持犯篇末註云周尺體量如附錄中周尺攷委明今檢古今尺略圖後附有周尺別形及南山律尺量因合編為周尺攷又滬泉兩地所藏手稿微有出入滬稿經校勘後再寄晉江由慧容法師就泉州藏稿覆校遇異同處往復函商斟酌取捨原稿偶有筆誤或疑問時則以所引原書為準例如二一三頁六行拾僧過失同頁十行誡拾僧過失兩拾字原稿均作捨檢大正藏續藏及大師親校津刊鈔記會本皆作拾捨字係筆誤又如一七七頁八行豈復有教有字原稿作檢四分律戒相表記及親校津刊會本扶桑古刊本大正藏本續藏本均作有惟心燦法師所錄大師校正鈔記副本批註云有字疑是誤寫足徵備覽作係表闕疑俟考之意蓋大師先編戒相表記次乃校正津刊鈔記會本後始編輯在家備覽編備覽時雖疑有誤而未考定茲仍從原書作有猶慮校對不無疎忽倘續發見訛誤當俟再版修訂期臻完善大藏經會謹識戒體章名相別攷匆促寫錄未及詳攷或有訛誤俟後改正又分類編輯亦多未妥俟後整理重輯第二次草己卯十二月二十二日錄竟敬裝時居蓬峯掩室習律年六十弘一諸法五位一小乘俱舍宗一色法有物質之形者又以物質為因而生者佛家建立諸法立七十五法二心法了識事物者亦名心王有三門二小乘成實宗總以之收三心所法隨附於心法而起者是為心法所有之法故名心所法立八十四法束於五位四不相應法不附隨於心法者三大乘法相宗五無為法常住而不自因緣生者立百法小乘成實宗八十四法無一一記載之明文今略小乘俱舍宗為物心兩實之宗故其次第為色心心所不相應無為於此中攝七十五法色法十一心法一心所法四十六七十五法不相應法十四無為法三大乘法相宗為唯心無物之宗故其次第為心心所色不相應無為於此中收百法心法八心所法五十一色法十一百法不相應法二十四無為法六色法有質礙而無知覺緣慮之用在於諸法謂之色心在於有情謂之身心身即色也心法心王無質礙而有知覺之用或為緣起諸法之根本心王心法為心之主作用總了別所對之境心所為心之伴作用為心王之所有而起貪瞋等之別作用也舊譯曰心數心法心王皆名相應法同時而起之一聚心心所有五平等之義故名相應法心所法一所依平等謂心王依眼根則心所亦依眼根也二所緣平等謂心王緣青境則心所亦緣青境也三行相平等謂心王了解青色則心所亦了解青色也四時平等謂心王此時起則心所亦此時起也五事平等謂心王其體為一箇則心所之體亦各為一箇也三有為法此三聚皆有因緣之作為故名有為法色法小乘俱舍五根五境共十一法無表色大乘法相五根五境共十一法法處所攝色心法小乘俱舍心法心王一共四十七心所法四十六大乘法相心法心王八共五十九心所法五十一非色非心法小乘俱舍不相應法十四大乘法相不相應法二十四七十五法小乘俱舍宗立一切法為七十五攝為五類第一色法十一一五根眼根耳根鼻根此五法能發識舌根取境故名根身根二五境色境五根五境有質礙之用故名色聲境香境此五法能為五根味境所對之境故名境觸境三無表色依身口發動之善惡二業生於身內之一種無形色法感苦樂果之業因也無表色自體無質礙之用以存於質礙之四大為因而生故亦名色第二心法一於根境相對之時依根而生能覺知境界之總作用也是從於所依之根故雖為六識而其心體是一此心法必領有他之心所法猶如國王之於臣民故亦名曰心王第三心所有法四十六此四十六法皆為心王所領有而與心王皆為對於境界之別作用故云心所有法常略稱心所法一徧大地法此十法隨逐善不善無記之一切心王而起故名徧大地法略稱曰大地法受領納苦樂捨三境之作用也想想像事物之作用也思造作身口意三業之作用也觸觸對境界之作用也欲希求之作用也慧簡擇之作用也念記憶之作用也作意警覺他心心所之作用也勝解印決事理之作用也三摩地譯為定使心心所注住於一境之作用也二大善地法此十法與一切善心相應而起故名大善地法信使心心所澄淨之作用也不放逸於諸善法不使放逸之作用也輕安使身心輕妙安穩之作用也行捨使身心捨離執著諸法之念而住於平等之作用也是行蘊所攝之捨故揀別於彼受蘊所攝之捨受而謂之行捨慚於所造之罪自恥之作用也於過自厭愧於所造之罪他恥之作用也於過羞他無貪於順境無貪著之作用也無瞋於逆境不瞋恚之作用也不害不損害他之作用也勤於修善法使心勇悍之作用也三大煩惱地法此六法常與惡心及有覆無記心相應故名大煩惱地法無明愚癡為性反於上之慧之作用也放逸反於上之不放逸於善法放逸之作用也懈怠反於上之勤於善法不勇悍之作用也不信反於上之信使心不澄淨之作用也惛沉使心惛重之作用也掉舉使心輕浮之作用也四大不善地法此二法與一切不善心相應故名大不善地法無慚反於上之慚不自恥之作用也無愧反於上之愧不他恥之作用也五小煩惱地法此十法名小煩惱地法者有三義一雖與惡心及有覆無記心相應而起而唯為修道所斷不通於見道所斷二者但與意識之無明相應不通於他識三者此十法現行各別而必非十法俱起忿使起忿怒相之作用也覆隱藏己罪之作用也慳使於財施法施慳悋之作用也嫉妬忌他人盛事之作用也惱堅執惡事而惱亂身心之作用也害反於上之不害而行打駡他人等之作用也恨於忿境結怨不捨之作用也諂使心心所邪曲不定之作用也誑欺他之作用也憍染著於自法使心貢高之作用也六不定地法此八法不入前之五地為特殊之法故名不定地法尋尋求事理之粗性作用也伺伺察事理之細性作用也睡眠使心心所闇昧之作用也惡作思念惡作之事而使心追悔之作用也貪反於上之無貪而貪愛順境之作用也瞋反於上之無瞋而瞋恚逆境之作用也慢對於他人使心高舉之作用也疑於諦理使猶豫之作用也第四心不相應行法十四此十四法為非色非心之法而非與心相應之法故名心不相應行法所以名行者有為法之總名又此十四法為五蘊中行蘊所攝故名行也得使諸法獲得於身之實法也非得使諸法離身之實法也同分如人趣者使人趣之果報同一等各隨其趣其地而使得同一果報之實法也無想果於無想天中使心心所都滅之實法也此是一種外道所執之湼槃無想定欲得外道之無想果所修得之無心定也滅盡定不還或阿羅漢之聖者為止息暫時所入之無心定也命根維持壽之實法也生使法生之實法也住使法住之實法也異使法衰異之實法也滅使法壞滅之實法也名身色聲等之名也句身諸法無常等之章句也文身名與句所依之文字也第五無為法三此三法無生住異滅四相之作為故名無為法擇滅無為依正智簡擇力而得之寂滅法即湼槃也此法能使煩惱寂滅故名滅非擇滅無為非依擇力但依缺生緣而現之寂滅法也此法能使生法不更生故名滅虛空無為無礙為性得通行於一切之礙法中也七十五法有為法色法十一心法一心所有法四十六無為法三心不相應行法十四三科五蘊色色有一受想心有四行識十二處六根眼根眼處色有十耳根耳處鼻根鼻處舌根舌處身根身處意根意處六境色境色處聲境聲處香境香處味境味處觸境觸處法境法處心有二十八界六根眼根眼界色有十耳根耳界鼻根鼻界舌根舌界身根身界意根意界六境色境色界聲境聲界香境香界味境味界觸境觸界法境法界六識眼識眼識界耳識耳識界鼻識鼻識界舌識舌識界身識身識界意識意識界心有八五識蘊者積集之義舊譯曰陰蔭覆之義為迷於心偏重者合色而為一開心而為四十二處處者根與境為生心心所作用之處舊譯曰入根與境相涉入也為迷於色偏重者合心而為二開色而為十十八界界者差別之義為色心共迷者開色而為十開心而為八根有取境之作用者謂之根境為根所對所緣者謂之境亦名曰塵染污義也眼識以眼根為所依緣色境乃至意識以意根為所依緣法境識能緣者謂之識扶塵根扶又作浮五根之外形眼可見者是為扶助勝義根之五塵故謂之扶塵根根此扶塵根為所依別有淨色之眼根等謂之勝義根有發識取境之實用也勝義根又名正根乃眼等五根之實體也依之而有發識取境之作用為四大種所成之淨色據小乘則以前念之意識為意根意根據大乘法相則以第七末那識為意根大乘法相及小乘俱舍皆謂六識體別六識小乘成實則謂六識體一謂眾生唯有一識以一識依於六根而緣六境五蘊蘊者積集之義謂色心之法大小前後等積集而成自體也舊譯曰陰蔭覆之義一色蘊總該五根五境等有形之物質二受蘊對境而承受事物之心之作用也三想蘊對境而想像事物之心之作用也四行蘊其他對境關於瞋貪等善惡一切之心之作用也五識蘊對境而了別識知事物之心之本體也色色心受此三者心性上各為一種特別之作用想故名之曰心所有法略云心所即心行王所有之法識此一者為心之自性故名之曰心王色蘊俱舍十一色能造以四大為能造作一切色法地大水大實色火大其體為觸境所攝風大所造依四大而造五根五境無表色之十一眼根耳根鼻根舌根身根實色色境聲境香境味境觸境無表色假色成實十四色能造以色等四境為能造作一切色法色境香境實色味境觸境所造色等四境和合方成四大依此四大而成聲境及五根地大水大火大假色風大聲境四大相觸為聲眼根耳根假色鼻根舌根身根法處所攝色總括諸法為十二處攝屬於法處而為意處之所對者有五種一極略色分析色聲香味觸眼耳鼻舌身等有質之實色而令至極微者二極逈色分析虛空青黃等無質之顯色而令至極少者達見為難故名極逈色三受所引色即無表色也是為依受戒而引發於身中之色故名受所引色四遍計所起色遍計一切法之意識前所顯現之五根五境等影像是也如空華水月等皆為此所攝五定所生自在色禪定所變之色聲香味等境也以勝定力之故於一切之色變現自在故名定所生自在色色義變壞義轉變破壞也變者有形之物異其相也壞者對於外物不得抵抗而忽變形體也變礙義變壞質礙也質礙義有形質而互為障礙也是從五根五境等之極微而成色塵有此兩義故諸色法中獨取五境中之色塵而名為色以色之義勝故也示現義內色眼耳鼻舌身之五根也是屬於內身故名內色色有二種外色色聲香味觸之五境也是屬於外境故名外色顯色青黃赤白之四種也此約小乘俱舍論說色有二種形色長短方圓高下正不正之八種也若大乘法相於此外加表色如行住坐臥取捨屈伸等顯然可表示於人者名為表色可見有對色對者對礙之義色法之自性具對礙之自性而眼可見者青黃等之色塵是也色有三種不可見有對色具對礙之自性而不可眼見者聲等之四塵眼等之五根是也不可見無對色無對礙之自性亦不可眼見者無表色是也無對礙之自性而攝於色者以其為有對礙之四大所生之法故也行蘊造作於有為法之因緣遷流於三世謂之行故行蘊有造作遷流二義也若約此義餘四蘊亦應名行但餘蘊雖應名行以攝行少故各別受名行蘊攝行多故偏得行名五蘊中除色受想識四者其他之有為法通名行蘊如下表記七十五法有為法色法十一色心法一識心所有法四十六徧大地法十受受想想思等大善地法十大煩惱地法六大不善地法二行共有五十八法小煩惱地法十不定地法八心不相應行法十四無為法三識蘊俱舍成實以為眼等之六識心王此等心王有種種差別集於一所而為識蘊唯識以為八識心王心意識俱舍宗以之為一體之異名論云集起故名心思量故名意了別故名識中略心意識三名所詮雖有異而體是一如法相宗有通別二門通門許三名互通別門其實體各別第八名心集諸法種起諸法故第七名意緣藏識等恆審思量為我等故餘六名識於六別境粗動間斷了別轉故楞伽三種識真識如來藏也又自性清淨心也離生滅相之真如也起信論名之為心亦名如來藏即是攝論宗所立之第九識唯識不立此識現識又名藏識真心與無明和合而生染淨法之識體也起信論謂為阿梨耶識之業轉現三細唯識論所謂阿賴耶識但彼論不立真妄和合之義分別事識亦名轉識緣現識而生之眼等六識也起信名同業業為造作之義身口意善惡無記之所作也其善性惡性必感苦樂之果故謂之業因過去者謂為宿業現在者謂為現業業體有二種即業之自體也業體又云業性正招苦樂異熟之異熟因也如身之取捨屈伸等造作名為身業一直指身或語之造作為業小乘俱舍以第一種為實業如音聲之屈曲造作名為語業為正感果之異熟因動作身之思為身業大乘法相以第一種為假業二以思心所之造作為業動起語之思為語業以第二種正發動身語之現行思心所即與第六意識相應而起之心所中作動意之思為意業為招當果之實業思之心所也思之心所以造作為性故以之為業體為業業為身語之二業自體是業身語二業之殺等七支小乘俱舍為業之道業之道為思心所遊履之處十業道意業之貪等三支唯為業之道以彼非自體是業唯為思心所遊履之處故也大乘法相十支皆為業又為業之道意業亦自體是業故也小乘俱舍立身語二業為實業體三業假法為取捨屈伸等身形之表色攝於色處之中身此是無記法故不立此為業體實法假法為音聲之屈曲攝於聲處大乘法相三業分假實語此是無記法故不立此為業體實法意實法身語意三業之實法為意識相應之思心所思有三種一審慮思將發身語而先審慮之思也取此為意業之體二決定思起決定之心而將欲作發動之思也三動發勝思正發身語而動作善惡事之思也取此為身語二業之體思心所法名以使心造作之作用而名俱舍云思謂能令心有造作唯識云思謂令心造作為性於善品等役心為業作戒無作戒作戒受戒時如法動作身口意三業可見聞之業體新譯曰表戒受戒時受者造作身口而表示受戒之相於外謂之表戒無作戒依作戒之緣而生於身中不可見聞之業體此業體初發之緣雖由於身口意動作即作戒而一旦生了則不假身口意之造作恆常相續故稱為無作作戒於身口動作息時即滅而無作戒則一生之中恆常相續堪發防非止惡之功能是之謂無作戒體無作戒為能防之體二百五十戒等為所防之境新譯曰無表戒依表戒之緣身內生一種有防非止惡功能之實物以此於外相無表示故名曰無表戒表戒者受戒時竣亦即斷絕無表戒者永於身內相續以護身口之惡也約戒作戒無作戒作者身口造作之義成實論等身口教無教教者教示人身口作業之義薩婆多論表戒無表戒表者身口表示之義俱舍論等約業作業無作業表業無表業約色作色無作色表色無表色戒體義約三業小乘俱舍局於身語二業有表業無表業不立意表業無表業大乘法相三業皆有表業無表業表業身表業他可見之動作取捨伸屈等是也語表業他可聞之言語名句文是也意表業起貪瞋等之念是也意業雖不表示於他人然猶於心內自表示故名為表業無表業身無表業與身表業共於身中生不可表示於他之一種業體也語無表業與語表業共於身中生不可表示於他之一種業體也意無表業與意表業共於身中生不可表示於他之一種業體也約表色無表色義小乘俱舍謂表業無表業皆為四大所生實之色性謂之表色無表色表業以現行之思之心所為體大乘法相無表業以思之心所之種子為體其實業性雖為心法而現行之思發起色法之身表業語表業有防色法之身表語表過非之用故且就所發所防之色而假名為表色無表色於現行之思心所上假立表色之名於思心所之種子上假立無表色之名約色心小乘俱舍業體即色法立思之心所造作之身表業語表業為善性惡性無記性之實法故直以所發之身語二業為業體以其中善惡之業體為感苦樂之果是以業體即色法也大乘法相業體正屬心法身語二業非業體身表業為色處中之表色色處有顯色形色表色之三取捨屈伸等謂之表色語表業屬於聲處之聲屈曲此二共是無記法而不能招當果故不立為業體思心所為業體論其業體定為能發之思心所但就所發所防之色而假付以色之名蓋業體正為心法也戒體通大小乘有三種色法小乘俱舍所立受戒之時身口二業有發顯之表色其表色為依四大而生之一種色法依此而有防非止惡之功能名為無表色又名無作色是為四大所生故為色法而攝於色蘊之中心法大乘法相所立受戒之時有發動於思之心所依此之種子相續而有防非止惡之功能假名為無表色是為依於受戒時之表色作用而起者故附以色之名然實為心法也非色非心法小乘成實所立是為成實宗之無作戒體無形質故非色無緣慮故非心無表色小乘俱舍受戒時以強盛之身口表業為緣滿身四大製造之一種色體也此色體有防非止惡之功能恆防止身口之過非故以之為戒體其物體外相不顯故名無表又為由身內之地水火風四大而生者故名為色是非如他色有物質有障礙然由四大之色法而生故攝於色法之中三宗無表色大乘法相受戒時以第六識之思心所之隆盛勢力於第八識熏其種子此思心所之種子有防非止惡之功能故以之為戒體此戒體於外相無表示故名無表假名為色正攝於心法也小乘成實此宗之義非色非心也無質礙之性用故非色無緣慮之性用故非心三種無表色律儀無表色依受善戒之表業而發或以禪定共發或與無漏智共生有防非止惡之功能者極善不律儀無表色為正作殺生等惡戒之表業有防善止善之勢用者極惡非律儀非不律儀無表色非依善戒或惡戒乃依其他之善惡表業而生者此中攝善與惡二種中善中惡下善下惡唯有善惡之表業而不生無表色表無表色之功能表色一功能表色即表業之善性惡性唯有成業道為感未來異熟果之異熟因之一功能無表色二功能無表色即無表業之功能有二一成業道二別有防非止惡之功能此功能自未捨戒以來其功能念念倍增若捨戒時失其念念倍增之防非止惡功能而不失感異熟業道之功能也成實四假因生假一切有為法由因而生皆為無性如六因四緣生諸法緣成假如攬五蘊成人相待假如長短等相待而立相續假如一念色聲不成身語業相續色聲方成身語業成實論成實者成立修多羅中實義也觀我法俱空故超越於薩婆多宗之我空法有觀但不知空即不空故稱之為偏空觀成實宗為印度小乘中最後所立之宗即小乘中之空宗酷似大乘南山三教三觀三教性空教分析小乘教諸法之性分唯觀其自性之空無尚許因緣生之假相者相空教觀大乘淺教諸法之自性為本末如幻即空不許其假相者唯識圓教見大乘深教萬法唯識之圓理者三觀性空觀阿含經所說小乘之觀法也觀諸法為因緣生性空無我也許因緣生之相為實有而觀性之空無故名性空觀相空觀般若經所說大乘之初門也觀諸法之相為空也若許因緣生之相為實有猶是妄見此更進而空無諸法之相故名相空觀唯識觀華嚴經等所說大乘至極之觀法也觀萬法皆自識所變故萬法惟為心識之影像所歸唯一心識戒之四科戒法如來所制之法戒體由於授受之作法而領納戒法於心胸生防非止惡之功能者戒行隨順其戒體而如法動作三業也戒相其行之差別即十戒乃至二百五十戒等也日中攷持非時食戒者應注意日中之時比丘戒中有非時食戒八關齋戒中亦有之日中以後即不可食又依僧祇律日正中時名曰時非時若食亦得輕罪故知進食必在日中以前也日中之時俗稱曰正午常人每用日晷儀置於日光之下俟日晷儀標影恰至正午即謂是為日中之時因即校正鐘表以此時為十二點鐘也然以此方法常常核對則發見可懷疑者二事一者雖自置極精良正確之鐘表常盡力與日晷儀核對其正午之時每與日晷儀參差少許不能符合二者各都市城邑之標準時鐘如上海江海關大自鳴鐘等其正午之時亦每見其或遲或早茫無一定也今說明其理如下依近代天文學者言普通紀日之法皆用太陽而地球軌道原非平圓故日之視行有盈縮而太陽日之長短亦因是參差不齊泰西曆家以其不便於用爰假設一太陽即用真太陽之平均視行為視行稱之曰平太陽平太陽中天時謂之平午校對鐘表者即以此時為十二點鐘若真太陽中天時則謂之視午就平午與視午相合或相差者大約言之每年之中唯有四天平午與視午大致相合餘均有差相差最多者平午比視午或早十五分或遲十六分其每日相差之詳細分秒皆載在吾國教育部中央觀象臺所頒發之曆書中若能了解以上之義於昔所懷疑者自能祛釋因鐘表每日有固定同一之遲速決不許其參差而真太陽日之長短則參差不齊故不能以真太陽之視午而校正鐘表恆定為十二點鐘也其各都市城邑之標準時鐘皆據平午以教育部曆書核對即可了然吾人持非時食戒者當依真太陽之視午而定日中食時之標準決不可誤據平午而過時也至於如何校正鐘表可各任自意或依平午者宜購求教育部曆書核對即可知每日視午之時若如是者倘自置精良正確之鐘表則可不必常常校正撥動否則仍依舊法以日晷儀之正午而校正鐘表恆定是為十二點鐘此亦無妨但須常常核對日晷儀常常撥動鐘表時針因如前所說真太陽日之長短參差不齊未能如鐘表每日有固定同一之遲速也又近代天文學者以種種之理由而斥日晷儀所測得者未能十分正確此說固是但其差舛甚微無足計也周尺考南山律尺量皆用周尺今考周尺一尺二寸當唐尺一尺事鈔謂唐朝用尺五種不同必以姬周尺秤以定官市衡量無事不平資持記釋云五種者舊云南吳尺短周二寸姬周尺十寸為定唐尺加周二寸尺二為尺山東尺加唐二寸尺四為尺潞州羅柯尺加山東二寸尺六為尺國家不禁致此多別至於公用還準周尺參看資持記第十冊第十九卷二十一頁及下附古今尺略圖並周尺別形古今尺略圖自清吳憲齋大澂所撰權衡度量實驗攷摹寫周鎮圭尺璧羨度尺同以鎮圭等古玉二十四器證之悉合周黃鐘律琯尺以黃鐘律琯等古玉二十九器證之悉合是尺九寸合鎮圭尺一尺周劍尺以古劍四證之悉合是尺一尺合鎮圭尺九寸六分強合黃鐘律琯尺八寸六分漢慮俿銅尺建初六年造阮文達公謂此尺與周尺同近今攷古家多以此為周尺較鎮圭尺長一寸六分較黃鐘律琯尺長六分唐開元尺宋三司布帛尺長於唐開元尺八分清工部營造尺長於宋三司布帛尺一寸二分強是書為榑桑阿井荃廬舊藏清季上虞羅振玉覆刊書中專據實物考驗與摭拾陳言者異也丁丑二月演音並記南阤別院周尺別形一此為清馮雲鵬著金石索中載彼云周尺一尺當宋三司布帛尺七寸五分弱當今營造尺六寸四分強周尺別形二近人馬衡著戈戟之研究云三公分當周尺一寸三分依此例推周尺別形三此圖見正儀編圖扶桑版中引武夷清碧杜氏刻本蔡傳通考此外如日本古代學者所考據有種種異說今不具錄受十善戒法南山三大部中不載唯南山晚年所撰釋門歸敬儀中略明歸敬儀云受十善法者謂身三口四意三善行此之十業戒善之宗今多依相罕有受者今謂不然先須願祈不造眾惡依願起行有可承準若不預作輒然起善內無軌轄後遇罪緣便造不止由先無願故造眾惡大聖知機故令受善又云次明受法有師從受無師自誓如上三歸三自歸已口自發言我某甲盡形壽於一切眾生起慈仁意不起殺心如後九善例此而不復繁文案受十善戒者別有受十善戒經委明今未及檢尋且依歸敬儀文酌定受法如下其示相文依靈峯選佛譜十善文錄寫可暫承用俟後檢尋受十善戒經再為改訂可耳我某甲歸依佛歸依法歸依僧盡形壽受持十善戒法三說我某甲歸依佛竟歸依法竟歸依僧竟盡形壽受持十善戒法竟三結我某甲盡形壽救護生命不殺生我某甲盡形壽給施資財不偷盜我某甲盡形壽遵修梵行不婬欲若在家人改為不邪婬我某甲盡形壽說誠實言不妄言我某甲盡形壽和合彼此不兩舌我某甲盡形壽善言安慰不惡口我某甲盡形壽作利益語不綺語我某甲盡形壽常懷捨心不慳貪我某甲盡形壽恆生慈愍不瞋恚我某甲盡形壽正信因果不邪見已上各一說迴向如常可知南山律謂意三者大乘初念即犯成宗次念乃犯次念者所謂重緣思覺即是後念還追前事也今初心受持者宜先依成宗次念之例行之南山道宣律祖弘傳律教年譜附修學遺事僧傳闕略之事蹟亦補記之惠安瑞集大華嚴寺沙門演音撰隋文帝開皇十六年丙辰一歲是年四月八日律祖生於京兆即都城也有云湖州長城或吳興丹徒者為祖宗所出非生處也曾祖陳朝駙馬都尉祖陳留太守父名士申吏部尚書母姚氏十七年丁巳二歲十八年戊午三歲十九年己未四歲二十年庚申五歲二十一年辛酉六歲二十二年壬戌七歲二十三年癸亥八歲二十四年甲子九歲煬帝大業元年乙丑十歲徧覽羣書二年丙寅十一歲三年丁卯十二歲善閑文藻四年戊辰十三歲五年己巳十四歲六年庚午十五歲昔在童稚即有信心年十有五喟然歎曰世間榮祿難可常保因往事日嚴寺慧頵和尚寺在京師隋煬帝造七年辛未十六歲兩旬之間誦法華經一部八年壬申十七歲是年剃落九年癸酉十八歲十年甲戌十九歲十一年乙亥二十歲奉詔依智首律師受具頂戴寶函繞塔行道感舍利降函乃進受具戒十二年丙子二十一歲於時佛法梗塞寺門常閑致於律教無處師尋但在守文持犯不識恭帝義寧元年丁丑二十二歲唐高祖武德元年戊寅二十三歲大唐御世時遭儉約乍欲投聽志不自由二年己卯二十四歲三年庚辰二十五歲四年辛巳二十六歲是年依首律師聽習律藏纔得一徧便欲歸山坐禪和尚教曰戒淨定明慧方有據始聽未閑持犯焉識又往聽律十徧復欲坐禪和尚曰更聽十徧可遂汝心又往律筵依位伏業時首律師命令覆講始不敢受辭不獲已方乃覆文聽二十徧時經六載五年壬午二十七歲六年癸未二十八歲七年甲申二十九歲是年高祖廢日嚴寺僧徒散亂律祖等七人配住崇義寺寺在左衛長壽坊舊為桂陽公主及駙馬居駙馬亡後公主捨宅為寺以妻為夫造恩深義重勅名崇義是年製釋門集僧軌度圖經一卷宋時猶存今逸八年乙酉三十歲九年丙戌三十一歲因高祖沙汰僧尼遂隱居終南山豐德寺苧蔴蘭若六月創製行事鈔鈔首標崇義寺者因取本係之寺以標名焉太宗貞觀元年丁亥三十二歲思往關表以廣聞見於和尚前跪陳行意和尚流涕逮貞觀十一年七月卒於所住律祖撰續高僧傳中京師崇義寺釋慧頵傳云不謂風樹易喧逝川難靜往還十載遂隱終天悲哉是年周遊講肆所造鈔三卷未及覆治人遂抄寫準諸鈔疏卷尾批文律祖造鈔應是始於武德九年成於貞觀元年有謂九年六月為絕筆時者良恐非是又出拾毗尼義鈔三卷助釋行事鈔草稿纔成即流新羅此方絕本至宣宗大中四年彼國附還元有三卷下卷已逸後以兩卷開為四卷日本古目錄屢云律鈔料簡一卷道宣述此土久逸不詳製作年代附記於此二年戊子三十三歲三年己丑三十四歲四年庚寅三十五歲遠觀化表北遊并晉東達魏土律祖初作事鈔未題製作人名後有一本流到相州法礪律師歎為的當恆披看之疑是首律師作後律祖至相州見礪律師因敘問律宗之事乃云近收得一本行事鈔甚被時機未審何人製作以示律祖祖云余所作也礪律師驚異遂請題名律祖乃於三卷首皆書京兆崇義寺等云云礪律師於法題之下名題之上中間空處皆註八字讚美之詞即是作者非無標名顯別等也礪律師於貞觀九年十月卒戒疏卷尾批文云法礪律師當時峯岫遠依尋讀始得一月遂即物故撫心之痛何可言之律祖往依未審何年附記於此五年辛卯三十六歲六年壬辰三十七歲七年癸巳三十八歲八年甲午三十九歲吳越景霄簡正記云事鈔重修時處者貞觀八年河中府隰州益詞谷因遊靈跡暫道幽巖棲禪寂定觀前述作審定文詞遂乃重修今解據戒疏卷尾批文云貞觀四年遠觀化表北遊并晉東達魏土依礪律師始得一月遂即物故乃返泌部山中為擇律師又出鈔三卷乃以前本更加潤色筋脈相通若據此文重修事鈔乃在礪律師卒後為貞觀九年後也但古德傳說皆云八年重修故記於此是年出隨機羯磨一卷含注戒本一卷戒本疏三卷教誡新學比丘行護律儀一卷九年乙未四十歲九年春因遊方次於泌部綿上縣鸞巢村僧坊出隨機羯磨疏兩卷是年四月智首律師卒律祖撰續高僧傳中京師宏福寺釋智首傳云余嘗處末塵向經十載具觀盛化不覺謂之生常初未之欽遇也乃發憤關表具覿異徒溢目者希將還京輔忽承即世行相自崩返望當時有逾天岸嗚呼可悲之深矣於時母氏尚存乃返隰列出尼注戒本一卷貞觀中出未詳年代附記於此今亦逸矣十年丙申四十一歲十一年丁酉四十二歲是年春末於隰州益詞谷中撰量處輕重儀一卷十二年戊戌四十三歲十三年己亥四十四歲十四年庚子四十五歲十五年辛丑四十六歲十六年壬寅四十七歲是年母卒性不狎喧樂居山野乃往終南十七年癸卯四十八歲十八年甲辰四十九歲十九年乙巳五十歲出比丘尼鈔三卷宋時所傳比丘尼鈔疑為唐西明寺道世又名玄惲所撰彼并出毗尼討要與尼鈔對校甚相符合惟廣略異耳若以尼鈔與事鈔較歧異頗多故日本古德多判為道世所撰今所傳者即此本也二十年丙午五十一歲是年始隱終南山豐德寺擯影不出二十一年丁未五十二歲重修隨機羯磨分為二卷仲冬刪定僧戒本一卷二十二年戊申五十三歲重出隨機羯磨疏二月二十七日讀訖增為四卷二十三年己酉五十四歲高宗永徽元年庚戌五十五歲重修教誡新學比丘行護律儀一卷重修含注戒本并疏至二年九月十九日方訖含注戒本二卷疏四卷二年辛亥五十六歲出刪定尼戒本一卷已逸三年壬子五十七歲四年癸丑五十八歲五年甲寅五十九歲六年乙卯六十歲顯慶元年丙辰六十一歲二年丁巳六十二歲三年戊午六十三歲以貞觀二十年擯影山林終於顯慶二年十有二載三年高宗為皇太子建西明寺詔為上座乃居京師四年己未六十四歲製釋門章服儀一卷此年重修製護僧物制一卷宋時尚存今逸製教俗士設齋儀一卷已逸護三寶物儀一卷不詳撰集年代已逸又淨心誡觀法一卷在隋州興唐伽藍夏安居撰不詳年代并附記於此五年庚申六十五歲龍朔元年辛酉六十六歲於京師西明寺出釋門歸敬儀一卷二年壬戌六十七歲三年癸亥六十八歲麟德元年甲子六十九歲居終南山北灃福二水之陰清官鄉淨業寺二年乙丑七十歲乾封元年丙寅七十一歲二年丁卯七十二歲二月八日創築戒壇於終南山淨業寺四方嶽瀆沙門尋聲遠集者二十餘人至於夏初眾侶更集重受具戒多是遠人為出戒壇圖經一卷二月十四日於淨業寺結大界淨地并出淨廚誥一卷宋時尚存今逸二月末數感人天相尋撰律相感通傳一卷季春感靈出祇洹寺圖經二卷唐季已逸北宋中葉自日本將至重修量處輕重儀一卷十月三日設無遮大會午時道俗咸聞天樂異香律祖斂容遷化初窆於壇谷至三年高宗勅問豐德寺主具事奏聞請依西國法茶毗得舍利立塔三所一在豐德寺一在安豐坊一在靈感寺懿宗咸通四年并安豐坊舍利入靈感寺同起一塔咸通十五年勅諡及塔號僧傳作十年也謹案此譜舊稿題云南山大師撰集時代略譜附修學遺事即再版四分律戒相表記附錄南山律苑叢書出版豫告中之第十三種是也舊稿末有案語及跋記云案南山大師撰集如上列者其中惟有隨機羯磨入藏流傳刪定僧戒本感通傳世有刊本其他悉於南宋之季佚失不傳近乃得自東瀛由天津刻經處刊板彙為一帙名曰南山律要學者讀之當如何歡忻踴躍而生難遭之想耶後二十二年歲次癸酉九月十九日編錄二十日錄訖匆遽握管不無舛訛俟後重修而訂正焉演音書時春秋五十四初度新稿增修之處甚多改題今名但無案語跋記原稿朱標句讀二埋法師錄寄弘化月刊為便排版改新式標點其說明亦自各歲下方移至次行茲依弘化月刊款式並承二埋法師以所錄新稿副本寄示俾得與弘化月刊互校勘正訛字復承圓拙法師見告晚晴書簡中有擬將南山靈芝二譜附於南山律在家備覽之計畫因將兩譜收入附錄靈芝年譜大師僅謄清至三十五歲遂即示寂所幸以後各歲草稿中均已寫明要事並標記所根據書目卷頁二埋法師依草稿逐次檢出賡續編成錄登弘化月刊閱者咸皆讚喜案靈芝著述我國久佚近始得自日本惟雜著芝園集二十卷僅存三卷其餘均由天津刻經處刊出大師將日刊南山三大部及靈芝疏記諸本校訂天津刊本補列科文體例詳明標點精密極便研究倘遇機緣擬隨時編校收入大藏以弘律化癸巳中秋大藏經會謹識靈芝律師年譜宋仁宗慶歷八年戊子一歲師名元照字湛然自號安忍子餘杭唐氏皇祐元年己丑二歲二年庚寅三歲三年辛卯四歲四年壬辰五歲五年癸巳六歲至和元年甲午七歲二年乙未八歲嘉祐元年丙申九歲二年丁酉十歲三年戊戌十一歲四年己亥十二歲五年庚子十三歲六年辛丑十四歲七年壬寅十五歲八年癸卯十六歲英宗治平元年甲辰十七歲二年乙巳十八歲本傳云初依祥符寺慧鑑律師十八通誦妙法蓮華經試中得度遂專學毗尼案考上權府書謂自齠齔出家冠年比試獲中洎落髮稟戒云云應是七八歲出家而未落髮十八比試獲中乃落髮書中所謂冠年者應是十八非二十也三年丙午十九歲四年丁未二十歲神宗熙寧元年戊申二十一歲案依天台神悟法師是此後數年中事淨土禮懺儀自序云自下壇來便知學律但秉性庸薄為行不肖後遇天台神悟法師苦口提誨始知改迹遂乃深求祖教博究佛乘本傳云後見神悟謙公講天台教觀遂攝衣出其門博究羣宗以律為本悟曰近世律學中微汝當明法華以弘四分二年己酉二十二歲三年庚戌二十三歲戒體章云熙寧三年後安居日於南山祖師羯磨疏錄出戒體章顧前賢後進議論遞作得失亙見故直敘大略云四年辛亥二十四歲五年壬子二十五歲六年癸丑二十六歲七年甲寅二十七歲八年乙卯二十八歲九年丙辰二十九歲十年丁巳三十歲案自溫台還祥符是此前數年中事上權府運使論增戒書云熙寧間自溫台遊方還本受業院在祥符寺之東南隅閉戶專業謝去人事乘閒揮麈讚述戒律無何謬為人所知遂有遠方之朋負笈日至而就學焉每患正法下衰人情鄙薄僧綱解紐非一日矣輒不自料頗有意於扶持故夫來者必博之以禪智約之以法律持盂丐食以充其口腹疏布裁衣以蔽其形苦日加溯引夕增勵修出處語默率遵於佛制如是數年間罔敢自怠元豐元年戊午三十一歲本傳云元豐元年春三月從廣慈慧才法師受菩薩戒於雷峯方羯磨觀音像放光明初貫寶燄漸散講堂燈炬月光皆為映奪淨慈法真禪師為作戒光記師乃博究頓漸律儀南山一宗蔚然大振南山律師撰集錄云在昔尊道輔教之士嘗攬諸名題集為別錄但搜括未詳時代差誤布厝紊雜不足披檢今以內典開元等錄及戒疏後序諸文批誌看詳對會重纂一本時皇宋元豐改號之歲後安居日重錄秀州普照院多寶塔記云逮於元豐改元戊午仲秋跨一十六載役工方畢余以經從獲究始末輒復命筆為之記云二年己未三十二歲三年庚申三十三歲受戒方便云元豐三年為諸沙彌出四年辛酉三十四歲上權府運使論增戒書云貧道自齠齔出家冠年比試獲中洎落髮稟戒潛心於佛乘十有六載然將行古道必反常情往往同儔輩以為矯異駭眾而窺伺短失者有矣以致彼徒率因行事有所不同夙懷忿慍乃乘是增戒之勢以致鬥訟其意無他直欲以無辜之人陷於縲絏之中耳自念與時寡合一無勢援獨力不能加眾厥或枉遭刑戮固無惜於一身但恐遏絕律風使無聞於後世耳案增戒者因已受之戒未能優勝再令其重受也律論並明其法古德亦有行之者時人不知謂為詭異因致構訟詳見原文上書之年依落髮稟戒十有六載之言而推計之約在此歲或前歲五年壬戌三十五歲六年癸亥三十六歲七年甲子三十七歲八年乙丑三十八歲為義天僧統開講要義序云高麗王子弘真祐世廣智僧統義天同弟子壽良航海求法首登師門元豐八年十二月二十八日借館伴主客學士楊傑就寺請師陞座發揚綱要義天矍然避席作禮請所著書歸遼東摹板流通哲宗元祐元年丙寅三十九歲二年丁卯四十歲台州慈德院重修大殿記云元祐二年仲冬月予以結界之命因過是院而仲元者具狀本末丐文為記辭不獲已試復敘云三年戊辰四十一歲行宗記序云於是載思載覽隨說隨鈔彌歷歲華遽盈卷帙考名責實搜古評今俾得利鈍以兼資冀說行而兩遂尤慚寡薄莫盡玄微或所未安以俟來裔時元祐三年夏安居竟在東安碧沼蘭若絕筆因題序云四年己巳四十二歲五年庚午四十三歲六年辛未四十四歲七年壬申四十五歲八年癸酉四十六歲紹聖元年甲戌四十七歲臨安無量院彌陀像記云元祐八年上元日集眾瞻禮淵乃述誠說偈發大弘誓寘像腹中是日供五百羅漢設會飯僧以落之越明年四月八日莊嚴圓備儀相妙好輝彩煥發由是一方之人得以歸向百世之下得以流通淵聞予屬意此道累以記文為請遂援亳直書以塞其命二年乙亥四十八歲三年丙子四十九歲上權府朝奉論慈愍三藏集書云貧道少小辭親冠年從道尋師務學負笈橫經於茲三十一臘矣不料寡薄謬為師首在處養徒晨夕講訓上酬佛祖開悟之恩次報王臣存護之德頃以前任太守王公修撰持遣公符邀命至此俾於南寺重建戒壇方欲糾募豪族發首興工無何諸師見忌異論鋒起以謂慈愍集乃貧道自撰假彼名字排我宗門曾不知此文得於古藏編於舊錄不省寡聞輒懷私忿以至訟於公府干我長吏上書之年依少小辭親於茲三十一臘矣之言而推計之約在此歲台州順感院轉輪藏記云台城順感院石晉天福中郡人胡都使捨宅為之始名報國今朝祥符初改賜今額師徒繼世甲乙住持久不得人寥落滋甚熙寧十年郡吏臨華寺僧希湛相與募緣建轉輪經藏洎法堂僧堂三門鐘鼓臺房廊廚庫等於茲僅二十年然猶興葺未已所費無慮一千萬錢故為書其始末以告同道云作記之年依熙寧十年於茲僅二十年之語而推計之約在此歲四年丁丑五十歲元符元年戊寅五十一歲建明州開元寺戒壇誓文云紹聖五年二月十五日沙門元照謹誓案哲宗紹聖五年改為元符元年二年己卯五十二歲三年庚辰五十三歲徽宗建中靖國辛巳五十四歲崇寧元年壬午五十五歲二年癸未五十六歲三年甲申五十七歲四年乙酉五十八歲五年丙戌五十九歲大觀元年丁亥六十歲越州龍泉寺彌陀寶閣記云越州餘姚龍泉寺經始於東晉咸康中逮今大觀丁亥凡八百五十載大觀改元仲秋晦記二年戊子六十一歲三年己丑六十二歲四年庚寅六十三歲政和元年辛卯六十四歲授大乘菩薩戒儀云政和元年歲在辛卯安居中為眾僧錄出二年壬辰六十五歲三年癸巳六十六歲四年甲午六十七歲五年乙未六十八歲六年丙申六十九歲大小乘論云律師臨終口授門弟子守傾執筆本傳云政和六年秋九月一日集眾諷普賢行願品趺坐而化湖上漁人皆聞天樂聲壽六十九歲僧臘五十一夏葬於寺之西北諡曰大智塔曰戒光弘公律師撰大智律祖年譜繕清至三十五歲乃竟生西以下但有草稿寫明要事附記出處展讀興悲歷經三載同學一再慫恿謹依原稿錄出俾成其全噫蠅附驥尾終有未安同道辱教為幸甚焉辛卯前安居日雪峯寺二埋謹識功德題名乘願法師以印弘一法師手書彌陀經普門品合刊餘款助印本書三百三十部大乘信願寺一百部蔡敦福一百部王竹徑一百部張榮旭一百部董徧徹黃徧美合一百部張文彬蔡慈良合六十六部莊慧中三十六部吳心光三十三部王東元三十三部黃則珍三十二部董培基董培璋合三十三部性願善契二師香資合十四部妙門師宿燕寺蔡紅菜吳秀玉吳世椒上五名各十部呂碧蓮五部懺因黃慧誠楊嘉捷上三名各三部以上乘願法師經手楊嘉捷蔡慧流陳麗高吳起迎蘇滿治上五名各二十部施性統王東元董光垤王瑞琴蔡宗圓蘇盛助陳素蓮林意熟盧雲巖上九名各十部寶藏寺柯燕治朱玉杯范淑慧董培基李紅圓王秀蓮王蓮妙蔡悅治上九名各五部許友超劉文雁施慈本董培璋林承慈張榮華張榮國張榮旭洪我氆施四果蔡金鐘葉永成顏受扳上十三名各四部施慈堂王慈音上二名各三部施宗蓮黃安蓮吳慈和蘇西蜀蔡荷圈李開蓮陳秀琴楊慧莊黃秀琴李萌芽陳荷好許書慰施性賞張振昌張振興上十五名各二部施慈和張善九吳荷琴劉梅芳李荷盞蔡慈昭李昭通吳荷聘曹毓瓊李昭鎮林慧雲郭秀端洪寬晉邱于勤洪介蓮蔡荷片施荷格上十七名各一部以上盧雲巖居士經手林張慧誠二十部吳陳慧華十部吳陳寬汝十部吳李寬淑八部吳許寬玉五部吳黃寬省四部吳謝寬瓊三部吳黃巧綢二部吳宗道二部以上宿務埠陳慧華居士經手上來共收乘願法師四千七十七萬三千二百元福林寺二百四十萬元盧雲嚴四十萬元廣空師二十萬元以上傳貫法師經手二埋法師二十一萬三千元蓮池團一百四十六萬元廈門居士林五十六萬七千元廈門佛學會諸居士助印三十六萬元洪子暉蔡吉堂袁慧藏各拾萬元陳朝基二萬元林注姑石來姑汪根慧各一萬元楊根鳳林麗志各五千元又附印十四萬元黃子鎣汪心源林一清羣華工業社陳蜜治陳瑞堅𤆬姑各二萬元覺星法師二萬元以上二埋法師經手謝鏡澄三十萬元吳覺常十七萬六千元陳金良十萬元張宗玉十萬元謝志豪十萬元黃家聲六萬元陳翠蘭五萬元湯昌玉三萬元湯秋榮三萬元王金蓮黃三姑郭金蘭魏任科湯德成各二萬元李連玉傅帶娣各一萬二千元廖金蘭林夏蓮湯品珍湯泮林各一萬元以上吳覺止居士經手林覺朗十五萬元詹覺優三萬元陳覺福俞覺彬黃覺恆黃覺寰黃覺咸各二萬元朱覺隨林覺凝詹覺興吳覺恩詹覺時陳覺昌俞覺周揭起娣林覺曇各一萬元陳覺乘黃覺膺黃覺崇蘇覺家各五千元以上林覺定居士經手上來吳覺止林覺定兩居士經手合共一百五十萬元其中以一百萬元作為助印以五十萬元作為附印豐子愷一百萬元廣洽法師二百三十九萬四千四百元倓虛法師七十七萬六千元妙蓮法師附印十二萬元曾立羣四萬八千元周用五萬元倪寶華附印十五萬元劉靜牕附印十九萬二千元王兆基五萬元二覺二萬四千元盛聖教四萬八千元定妙法師四萬八千元
