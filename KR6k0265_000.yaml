body:
  text: 南山律在家備覽略編例言數年已來欲於南山律中托挈其為在家居士所應學者輯為一部名曰南山律在家備覽老病因循卒未成就今先輯略編別以流通雖文不具足義未詳釋而大途略備即此亦可窺見廣本之概致焉所云南山律者唐道宣律師居終南山後世因稱其撰述曰南山律南山以法華涅槃諸義而釋通四分律貫攝兩乘囊包三藏遺編雜集攢聚成宗其撰述最著者為四分律刪繁補闕行事鈔略云事鈔四分律含注戒本疏釋南山所集含注戒本略云戒疏四分律隨機羯磨疏釋南山所集隨機羯磨略云業疏世稱為南山三大部雖正被僧衆學習而亦兼明三歸五戒八戒等又法體持犯等諸義章亦多通於五八戒也逮及北宋元照律師居錢塘靈芝寺中興南山律宗撰資持記以釋事鈔撰行宗記以釋戒疏撰濟緣記以釋業疏今輯南山律在家備覽即據已上諸書而為宗本併採擷南山拾毗尼義鈔釋門歸敬儀靈芝芝苑遺編等以為輔助是編兼收南山靈芝二家撰述而唯標云南山律者以靈芝撰述皆依南山遺笵發揚光大纘述相承故唯標云南山律也若爾何以榑桑學者謂南山宗唯識靈芝宗法華耶答是蓋唯窺一斑未及全豹也南山三觀雖與唯識近似然如戒體顯立正義中云是故行人常思此行即攝律儀等又云今識前緣終歸大乘等如是諸文實本法華開顯之義蓋無可疑惟冀學者虛懷澄心於南山靈芝諸撰述等精密研尋窮其幽奧未可承襲榑桑舊説輕致誹評南山撰述中引文多以略稱其僅標律云或四分者即四分律十誦者即十誦律僧祇者即僧祇律五分者即五分律善見者即善見律毗婆娑母論者即毗尼母論了論者即二十二明了論或此論疏多論或婆論者即薩婆多毗尼毗婆沙伽論者即薩婆多摩得勒伽五百問者即五百問論以上皆為律部重要之典籍此外如善生即優婆塞戒經智論即大智度論成論即成實論等其所引文每與現今流傳藏本稍有不同或是古藏異本或轉録他師撰述中文或為隨宜刪節或以釋義參入恐後之學者於是致議故預辨明以遮疑難南山靈芝所釋法相名義頗有與常途異者是或別有所據或隨宜會通學者於此未可膠執成見應善分別觀之是編分為四篇一宗體篇二持犯篇三懺悔篇四別行篇於篇中復分為門再分為章節項支類端目以示次第其標分之名目或依鈔疏原文或隨宜酌定是編所録諸文雖或加刪節而不失原文大意於諸文末注明出處所指卷數三大部及記據津刊會本其他亦據津刊者言録寫諸文皆於上下用記號以示起訖記號之中若有雙行小注皆是原文或須別附以説明者則於記號之外以小字另行書寫諸文上端皆冠以記號冠以者示此文別起冠以者示與前義有所關係其記號下有續云又云之別續云者示此文與前段相續又云者示此文與前不相續而義有關係凡記文釋上鈔疏文者又戒疏釋上含注戒本文業疏釋上隨機羯磨文者皆與上文連寫不冠以記號或有旁引他文以釋者亦爾諸文有稍難識別者或數段文相續者則於記中略録科文於大科旁加記號於小科旁加記號大科者總括一段之文小科者於一段文中復加分析若有數段文相續而科文繁雜未易分辨者別録科表以小字列於文後俾備對閲凡記中牒鈔疏文者用記號但易見者不標又戒疏牒含注戒本文或業疏牒隨機羯磨文者用號記凡別編録圖表或附以説明等皆低格小字而示區別南山之文古拙而義賾隱後之學者未可畏難淺嘗輒止宜應習覽自易貫通養疴山中勉輯是篇偶有疑義無書可考益以朽疾相尋昏忘非一舛訛脫略應所未免率為録出且存草稿重治校訂願俟當來謹案例言之末泉州所藏原稿附記云二十九年歲次壽星月日輯録宗體篇竟并識沙門善夢時年六十有一居毗湖山中例言所謂養疴山中勉輯是篇者即指宗體篇而言其後續輯持犯懺悔別行三篇一依宗體篇例故大師寫定原稿寄滬時刪此附記茲仍依泉稿補識俾可考見大師輯成是篇之時地又原稿寄滬後未即印行大師復就泉州藏稿加以補正故編校是書參合滬泉兩稿互相補充例如八一八二兩頁依事鈔所列二表即從泉稿增入者餘詳別行篇末附記惟五頁十六行無妨福善下泉稿空一格於例尤合因已從滬稿製版難以改正并識於此大藏經會謹識南山律在家備覽略編目表宗體篇一第一門戒法二第一章通敘戒法二第一節示相彰名二第一項正示三第二項雜簡三第一支化制三第二支戒善五第三支遮性五第二節略辨教體六第三節顯知由徑八第一項聖道本基八第二項戒有大用九第三項略解名義九第四項優劣有異一一第五項重受通塞一二第二章歸戒儀軌一三第一節翻邪三歸一三第一項歸意一四第二項顯相一四第三項功益一六第四項懺悔一七第五項作法一八第六項料簡一九第二節五戒二第一項戒德高勝一第二項簡人是非二一第三項豫習發戒二一第一支所受法體二二第二支發戒境量二二第三支依境發心二四第四支用心承仰二七第四項歎功問相二七第五項懺悔清淨二八第六項作法差別二八第一支臨時開導二九第二支正納戒體三第三支示相教誡三第七項料簡雜相三一第三節八戒三四第一項釋名三四第二項功益三四第三項簡人三五第四項懺悔三五第五項作法三六第一支正納戒體三六第二支説相發願三六第六項料簡三八第一支對簡多宗三九第二支遲受開成四第三支獨受離過四第四支斷惡攝淨四第二門戒體四一第一章戒體相狀四二第一節能領心相四二第二節所發業體四三第一項辨體多少四三第二項立兩解名四三第一支立兩所以四四第二支并解名義四四第三項依論出