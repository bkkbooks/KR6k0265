body:
  text: 懺悔篇資持云梵云懺摩此翻悔往有言懺悔梵華雙舉準業疏云取其義意謂不造新懺謂止斷未來非悔謂恥心於往犯有將懺字訓首訓鑒義雖通得華梵須分事鈔云夫結成罪種理須懺除則形清心淨故薩婆多云無有一法疾於心者不可以暫惡便永棄之故須懺悔資持釋云初敘懺意上句明造業結業成因必招來果故如種焉次句明須懺以犯從妄起罪假緣生妄體本空緣生無性了知妄本則犯相何依識達緣生則罪根叵得是以忽追所犯深恨前非仰對勝緣盡披肝膽罪從心起還逐心亡既伏現因不牽後果犯而不悔業苦何窮有智識非義無隱覆故也則下彰益故下二引勸初引論不下申勸彼論問曰何法重於地何法高於空何法多於草何法疾於風答曰戒德重於地我慢高於空煩惱多於草心念疾於風今略引後句以明昔心造惡今忽追悔剎那翻善不待終日意令有犯速須求懺事鈔云涅槃云犯四重者生報即受若披法服猶未捨遠常懷慚愧恐怖自責其心改悔生護法心建立正法為人分別我說是人不為破戒若犯四重心無怖畏慚愧發露於彼正法永無護惜建立之心毀呰輕賤言多過咎若復說言無佛法僧並名趣向一闡提道云何是業能得現報不未來受謂懺悔發露供養三寶常自呵責以是善業今世頭目等痛橫罹死殃鞭打飢餓若不修身戒心慧反上諸法增長地獄資持釋云初示罪報若下二明犯心有二初約護法說破為不破善業勝故犯心輕故亦欲進彼護法者故未捨遠者謂於佛法猶戀慕故若犯下次約壞法說為犯言多過咎即說佛法中多過失故一闡提此云無信云下三示悔法初標問謂下答釋初明懺者現報即受所謂轉重為輕也橫謂非橫罹猶墮也若下明不懺者生報方受彼經云若不觀身無常名不修身不觀戒是善梯隥名不修戒不觀心躁動制伏名不修心不觀智慧有力能斷名不修慧已上皆見事鈔記卷二十八懺悔中分為二門一略分化制通局二別明化教二懺第一門略分化制通局略分化制通局中分為二章一明化教二明制教第一章明化教事鈔云今懺悔之法大略有二初則理懺二則事懺此之二懺通道含俗資持釋云化教具兼兩懺通被二衆如文所敘又復二懺通大小乘又所犯罪通悔三世總牒十業見事鈔記卷二十八上來略分化制通局中第一章明化教竟第二章明制教事鈔云若論律懺唯局道衆由犯託受生污本須淨還依初受次第治之資持釋云制中反成五局言律懺者局小宗也如文自述局道衆也託受生者局事行也依初受者局現犯也次第治者局名體也上且分對次釋文相初二句標局言道衆者總收出家五位由下釋局所以文敘犯懺皆依本受受是稟制於制順違遂成持犯則彰律懺與經天別矣初句示犯起之本次句明制懺之意還下示立懺之法見事鈔記卷二十八化制二教通局互對今依記文列表如下化教二懺通大小乘通被二衆具兼兩懺所犯罪通悔三世總牒十業制教局小宗局道衆局事行局現犯局名體上來略分化制通局中第二章明制教竟上來懺悔篇中第一門略分化制通局竟第二門別明化教二懺別明化教二懺中分為二章一對顯二懺二重廣理懺第一章對顯二懺事鈔云若據通懺理事二別資持釋云標云通懺者如上五對通義可知事鈔續云理據智利觀彼罪性由妄覆心便結妄業還須識妄本性無生念念分心業隨迷遣資持釋云理懺者此約觀慧推窮業性明見真理罪得伏滅故云懺也文中初標根性且望修事通明利根若對三觀智用淺深自分利鈍如後可見觀下二示觀行初句示所觀境由下明能觀智上四句明達妄見理下二句明行成罪滅分謂分辨即觀照也此中通示理觀無生之言總下大小三種之理事鈔續云若論事懺屬彼愚鈍由未見理我倒常行妄業翳心隨境纏附動必起行行纏三有為說真觀心昏智迷止得嚴淨道場稱歎虔仰或因禮拜或假誦持旋繞竭誠心緣勝境則業有輕重定不定別或有轉報或有輕受並如佛名方等諸經所明資持釋云次事懺中初標機宜由下二示懺法又二初敘不堪理觀止下二正明事懺二初明事行則下明成益上二句示先業言輕重者就過為言五逆謗法用僧物等為重餘則為輕又凡造罪具足三時俱起猛心為重或二時一時為輕定不定者復簡重業定業極重縱懺不亡不定猶輕或容轉易下二句彰益轉報謂易奪不受對上輕及不定業也輕受謂轉重為輕即上重中定業也並下指廣虛空藏經占察經等並明悔法若準業疏須具五緣一請佛菩薩為證即奉請衆聖也二誦經咒即誦經諷咒三說己罪名即說懺悔四立誓言即今發願五如教明證即今求相簡擇邪正已上皆見事鈔記卷二十八今據上段資持釋業有輕重定不定別或有轉報或有輕受鈔文之義併會通業疏四句列表如下其中依業疏增入者上下用記號業有輕重就過輕重言五逆謗法用僧物等為重重業有定不定別定業極重縱懺不亡或有輕受餘則為輕具足三時俱起猛心謂轉重為輕就初中後具足三時俱起猛心為重不定猶輕或容轉易心輕重言具足三時非俱起猛心亦為重業具足三時非俱起猛心或有轉報謂易奪不受或二時一時俱起猛心為輕二時一時非俱起猛心愈輕初中後心三時者謂方便時根本時成已時猛重心相者謂方便舉尤害心根本起尤快心成已起隨喜心其中輕重有無列示句數如前持犯篇持犯總義辨犯優劣章單心辨犯及有心無心辨犯二節廣明宜檢閲之業疏釋懺六聚法篇引他解中分列四句至為明晰今準其義附列表如下以資參考文見業疏記卷二十二時報俱定三時俱有心并俱重心不可不受則轉重令輕時定三時俱有心報不定雖俱有心容有重輕懺悔可轉則有相除時不定非三時俱有心報定有心者俱重心此造業輕易懺伏也時報俱不定非三時俱有心有心者非俱重心濟緣云問修理懺人須禮誦否答愚智兩分事理無二上智達理不礙修行中下昧空故存漸誘應為四句總攝羣機一得理失事一心禪觀外闕莊嚴如有目無足不能前進二逐事迷理計功分課不了緣生如有足無目不知所從三事理雙運目足相資萬行圓修必至彼岸四理事俱昧盲而無足愚癡惰慢終無出期是知理事各立未免偏邪空有一如是真修習故曰實際理地不受一塵佛事門中不捨一法諸佛菩薩歷劫熏修華竺祖師終身苦行此理深密何可盡言略示大途粗分緇素耳見業疏記卷二十二資持云今時愚者錯解佛乘皆謂理觀寂爾無思空然無境取捨不得能所俱亡頑然寂住便是真如放蕩任情即為妙用由是不禮聖像不讀真經毀戒破齊嗜酒噉肉誇為大道傳化於人惡業相投率多承習此乃虛妄臆度顛倒論回豈知達法皆真何妨泯淨了真即用豈礙修行是知悟理則萬行齊修涉事則一毫不立自非通鑒餘復何言見事鈔記卷二十八上來別明化教二懺中第一章對顯二懺竟第二章重廣理懺重廣理懺中分為三節一標示用心二別列三觀三結示第一節標示用心事鈔云言理懺者既在智人則多方便隨所施為恆觀無性以無性故妄我無託事非我生罪福無主分見分思分除分滅如人醒覺則不眠醉資持釋云初示所修觀相無性即空理以下明罪滅所以諸世間業皆從我生我為業主我既無託故所造善惡不從我倒而生妄業無依故得除滅見謂達理思謂起修除謂能觀智滅即所觀業破妄顯真而非頓證故皆云分若約位判分見分思即內凡人分除分滅即初果已去如下喻顯眠醉喻迷醒覺喻悟眠覺醉醒相似法故見事鈔記卷二十八第二節別列三觀事鈔云然理大要不出三種資持釋云理本是一何有三者若權實往分前二是權後一是實若大小相對前一是小後二屬大若約開權會小終歸一理若對三宗性空局小唯識局大相空通小大如是分之事鈔續云一者諸法性空無我此理照心名為小乘資持釋云性空中分三初示所觀境即諸法二字諸法之言總包一切諸經論中或約依正因果或世出世間或有漏無漏或色心非色心或善惡無記或陰界入等若據通論總觀諸法今就懺悔且指罪業而為觀境性空無我一句即能觀智罪從緣有本無自性緣即心境虛妄心境和合成業業性自空非使之空由存妄計故受輪轉但破妄計覓罪叵得叵得之處強名空理言性空者小機智劣不能即法見空必待推析窮法體性然後方空此下判位小乘通收聲聞緣覺據所乘法諦緣雖殊若論斷證同見空理事鈔續云二者諸法本相是空唯情妄見此理照用屬小菩薩資持釋云相空中亦三示境同前能觀中言相空者了法無相猶如幻化昧者謂真亦如空華眼病謂實故云唯情妄見判位中小菩薩者雖發大心未窮心本故設此觀空諸塵境如諸般若所被初心言照用者二乘住寂故但照心菩薩涉事故云照用若對三宗即當四分同觀空理故云小也志慕佛乘故云菩薩事鈔續云三者諸法外塵本無實唯有識此理深妙唯意緣知是大菩薩佛果證行故攝論云唯識通四位等資持釋云唯識中三科同上觀境可解能觀中外塵謂一切境界也言本無者有二義一者境即心故二者虛妄見故實唯有識者言唯則遮於外境言識則表於內心判位中上二句彰勝對前粗淺故云深妙次二句正判大菩薩者初地已去也故下引證彼以五十二位總為四位論云一切法以識為相真如為境境即是體依此境界隨心信樂入信樂位此收加行十信十住十行十回向四十位如理通達得入見位即初地也能對治一切障得入修位二地至七地出離障垢得入究竟位八地至佛地初位所修名影像唯識後三所修名真唯識有人將前小菩薩對加行者不知觀行不同也問有人云唯識觀南山判位太高又云深位無罪豈須懺悔其意云何答論文自云唯識通四位那責南山判耶此蓋特舉深位以彰理妙當知悔法正為下凡故下勸令任智強弱隨事觀緣豈令果佛而悔罪耶前修率爾不無小疵後進狂簡便生輕謗寄言有識詳而慎之已上皆見事鈔記卷二十八第三節結示事鈔云以此三理任智強弱隨事觀緣無罪不遣資持釋云據理深淺由機強弱當量己分隨力修之然末世情昏鮮逢利器尚未堪於事行況克意於玄門三觀微言於茲殆絶嗚呼見事鈔記卷二十八上來別明化教二懺中第二章重廣理懺竟上來懺悔篇中第二門別明化教二懺竟上來第三懺悔篇竟
