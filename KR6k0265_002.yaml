body:
  text: 持犯篇事鈔云然戒是生死舟航出家宗要受者法界為量持者麟角猶多良由未曉本詮故得隨塵生染此既聖賢同有欽序何得抑忍不論故直筆舒之略分四別一者戒法此即體通出離之道二者戒體即謂出生衆行之本三者戒行謂方便修成順本受體四者戒相即此篇所明通亙篇聚資持釋云初二句標歎戒功依此淨戒得越苦海故如舟航凡入道門無不稟戒故是宗要受下明多犯所以受時遍境俱發故通法界隨中一行猶難故如麟角麟是瑞獸國君有道乃現止有一角舉此喻其少耳受多持少患在迷教故云良由等本詮即目律教塵染即是毀犯此下示意列章上句引聖為況何下顯今須述故下列示章門通出離者貫徹因果故生衆行者基址義故順本受者是隨行故通篇聚者屬教詮故亙即遍也通亙篇聚者是即以戒本為相就法而辨文舉篇聚局具戒言若五八戒如濟緣云罪無篇聚至於大重小輕方便趣果義則不別也事鈔中標示戒法戒體戒行戒相四種前後文凡兩出其中戒法戒體戒行前後文義大同今並編入宗體篇內唯戒相一種前後有異前約行言後就法辨就法中廣示持犯卷帙繁重故今別立持犯篇具明此義前宗體篇中第四門戒相僅明約行一義耳資持云問何者為相答如後釋戒三科束之一所犯境二成犯相三開不犯總為相矣更以義求亦為三別一犯與不犯二犯中有輕重不同三有方便根本差別統論其相不出心境如下更解相所犯境境犯輕成犯相心境合重方便因開不犯心境互缺不犯根本果資持云問何以不但釋相而總論四戒者答戒是一也軌凡從聖名法總攝歸心名體三業造修名行覽而可別名相由法成體因體起行行必據相當知相者即是法相復是體相又是行相無別相也若昧餘三直爾釋相既無由序不知所來徒自尋條終難究本已上皆見事鈔記卷十五資持云前明戒法但述功能次明戒體唯論業性後明戒行略示攝修若非辨相則法體行三一無所曉何以然耶法無別法即相是法體無別體總相為體行無別行履相成行是故學者於此一門深須研考然相所在唯指教詮舉要示相不出列緣緣雖多少不出心境罪無自體必假緣構非境不起非心不成若曉此意類通一切皎如指掌餘更如文見事鈔記卷十七持犯中分為二門一持犯總義二持犯別相資持云以總收別由別顯總前後相照持犯方明見事鈔記卷十五第一門持犯總義持犯總義中分為九章一持犯名字二持犯體狀三成就處所四辨犯優劣五方便趣果六闕緣不成七境想分別八別簡性重九廣斥愚教第一章持犯名字資持云名即是字連綿為語無勞強分持犯兩名並望受體違順為名尋文可見二持止持止持作犯作持作持止犯二犯作犯止犯俗衆所受五戒八戒唯有止持作犯二義事鈔云先解二持言止持者方便正念護本所受禁防身口不造諸惡目之曰止止而無違戒體光潔順本所受稱之曰持持由止成號止持戒資持釋云初牒名方下釋義初釋止義方便者起對治也正念者離邪染也身口者且據七支必通三業止而下釋持義持由下雙結事鈔續云二明作持策勤三業修習戒行有善起護名之為作持如前解資持釋云初句牒名策下釋義初釋作義持下指略三節同前應以前文續之但改止為作事鈔續云次釋二犯言作犯者內具三毒我倒在懷鼓動身口違理造境名之為作作而有違汙本所受名之曰犯犯由作成故曰作犯資持釋云初牒名內下釋義初釋作義初二句起業本也鼓下所造業也作而下釋犯義犯由下結合事鈔續云言止犯者良以癡心怠慢行違本受於諸勝業厭不修學故名為止止而有違反彼受願故名為犯資持釋云初句牒名良下釋義初釋止義止而下釋犯已上皆見事鈔記卷二十六行宗云作犯造惡則通三毒止犯慢法偏對癡心見戒疏記卷四依上事鈔二持二犯之文分配對照列表如下止持方便正念禁防身口記云必通三業不造諸惡護本所受止而無違戒體光潔順本所受作持修習戒行策勤三業有善起護作而無違戒體光潔順本所受作犯三毒我倒鼓動身口疏作三業造境違理作而有違汙本所受止犯癡心怠慢不修勝業行違本受止而有違反彼受願已上分釋持犯四種名義竟戒疏中別明單雙持犯義今撮略疏記諸文附示其概疏中所明單雙持犯義略分二意初約心用後約教行初約心用者此乃持奉用心非正簡判故一切諸戒皆有雙持雙犯俗衆所受五戒八戒悉具此義以凡持一戒必起護心望離惡邊即成止持望起護邊復是作持兩犯亦爾違教作惡即作犯不思對治即止犯此謂二持二犯各自相通非謂持中有犯以善惡行別違順心乖故也後約教行者簡判諸戒正用此義是須有教令行者方具雙持雙犯自餘殺盜等無教開作者並屬單持單犯耳故教行雙持雙犯唯道衆戒中有之比丘戒本二百五十戒中有二十六戒具雙持犯例如某事教制須行者依教而作為作持望無違犯是止持不依教而作為止犯望有違犯是作犯若俗衆所受五戒八戒唯是單持單犯與此教行雙持犯不相涉也上來持犯總義中第一章持犯名字竟第二章持犯體狀事鈔云二明體狀餘義廢之直論正解出體有二一就能持二就所持資持釋云初刪古疏引云有人立十善為止持體十惡為作犯體行檀禮誦頭陀四弘等為作持體違此名止犯體不明化行於理頗疏委如彼破直下標今正解者能所二體並依本宗制教而立文中能所例略犯字義須具之行宗云非謂施慈等行都不修之但非持犯體耳見戒疏記卷四事鈔續云言能持者用心為體身口是具故論云是三種業皆但是心又律云備具三種業當審觀其意等如後更解資持釋云初牒名用下出體上句正示疏云若不思慮不成持犯故以意思為能持犯體下句簡非以身口色但是成業之緣非正業本疏云身口是具不名為業故下引據初即成論推業之本彼又續云離心無思無身口業次引本律意業是主身口由成故偏審之以明成否而言等者如律結犯並問何心諸不犯中例開忘誤下指如後即第三章問論云三業皆但是心此即心王那得上定意思為體答心王意思體用分耳論推三業之本故就體論此定成業之能故從用説若爾何不如論從本明者答體通四陰用局行心捨通從局論業彌顯又復心未必是思思必是心體不兼用用必得體今云意思則體用齊收義無乖異已上皆見事鈔記卷二十六行宗云成論由是當宗故可為證皆是心者此指意識猶通四陰若據成業須至行心行即意思以思從心起身口二業復由思成今從業本故言心耳行宗云問受中作戒色心為體今此能持即是隨作但云思心受隨應等那不同者答受取緣成必須兼色隨取成業但約心論學者深思方見遠致已上皆見戒疏記卷四芝苑云一切事法為所持犯體此正義也言事法者各具善惡二種於善惡事法心起順違故有二持兩犯生焉違順之心即能持犯體善惡事法即所持犯體持犯既因事法而生故今以一切事法為所持犯體豈不然乎見芝苑遺編卷一上來持犯總義中第二章持犯體狀竟第三章成就處所成就處所中分為三節一約三心明止持二約行心明四行三約三業明四行是章分為三節悉依鈔疏原科若詳審是章文義或可分為兩科一就四心以明二就三業以明就四心以明中又分為二初約三心明止持二約行心明四行如是較為明晰也第一節約三心明止持戒疏云前將止持對心以明若無染汙以明止持行前三心得有持義謂識想受此之三心非業非記流入行心方成別業故分四陰以為二分豈非本有戒體外無染汙光潔純淨名之為持三心非記受體是記故得持也行宗釋云上句標舉若下正釋為三初通示據此非持取本受體説名為持故云有義古人目為端拱止持以非造作任運成故謂下別簡四心分二所以統論四行止持有二餘之三種並局行心故也豈下結顯三心下釋疑問三心何分答了別所緣境名識即通指六識取所領之相名想謂取所領六塵之相則為六想領納所緣名受謂六觸因緣生六受一一各有苦樂不苦不樂三受之異皆從違順非違非順而生造作之心能趣於果名為行謂六受之後各起善不善不動業等亦名六思思即是業若大乘經則受想行識列次不同由受生想從想起行由行成識今依小論則識想受行以取最初一念了別之心名識次起想像名想復次領納名受後起業思造作名行問破毀之人有此持否答據事鈔中犯一重戒餘戒常淨儼然是則持毀皆有持義今文且從持説故云無耳見戒疏記卷四資持云謂分四心以明二止三心中止此科所明行心中止則如後述三心非業本不名持但望受體説有持義以持是記業無記非持故此由古謂但不作惡即名止持今約四心分為二別則無前濫見事鈔記卷二十六第二節約行心明四行戒疏云二就治行明止持者必入行心方得成就前之三心不名為持善性便有惡無記無如欲離過作意遮約或對境防或起心護豈彼無記而得成持若據作持例同後止既就境論三心非分行宗釋云初明二持中初明止持以非思慮不成事業故云必入等前下揀三心善下揀二性如下舉事顯相若下二明作持同後止者簡前三心止故戒疏續云若據二犯行心成就前言持者三善為行今言犯者三毒為行前三亦無識想受等通善惡行局不善性善無記無行宗釋云二明兩犯中亦約四心三性以定行體尋文可了注中以行通善惡故須簡異已上皆見戒疏記卷四資持云注分善惡者以行心語通恐相濫故三善同時而不相離三惡相別其性相違作犯多是貪瞋止犯率由癡慢一往大判非不互兼見事鈔記卷二十六第三節約三業明四行事鈔云後三業明成就身二持者離殺等過名身止持受食食等名身作持口二持者離口四過名止知淨語等名作身口各二犯反上應知資持釋云初明身口業中二初明二持次明二犯言反上者行殺盜等名身作犯不受食名身止犯為口四過名口作犯不作淨語名口止犯並略舉事配餘者例説於制教中俗衆唯有止持作犯其作持止犯依原文具録而示四行應知受食淨語等事與俗衆無涉事鈔續云單意業中不成持犯若動身口思亦成持犯資持釋云二明單意業中意至身口名身口業未至身口則名單意初判不成若下次明通成籌度所為事名身口思雖未動相即屬身口不妨上文資持云律制身口思者謂計度身口所作事故此心粗著判屬身口見事鈔記卷二十七戒疏中釋此科義有兩解一約身口思釋二約重緣釋事鈔撰述先成止有初解故事鈔言戒相時每唯舉身口者即依此釋也逮後撰戒疏時乃列兩釋其第二釋如下段記文所引資持云若準戒疏上是初解後復解云獨頭心念忽起緣非不名為犯重緣向念可得思覺而不制約即入犯科又云任情兩取後為正義順今宗故已上皆見事鈔記卷二十六行宗云問意已成犯何以前約身口明成就耶答就意辨成皆遠方便心念果罪少分有之大論趣果須至身口行宗云問世云小乘不制意地今那制耶答此由不辨假實兩宗制限深淺故也小乘實宗定不制意動色成犯假宗制意但約重緣簡非瞥爾是則三宗歷然大小無濫學者至此宜須精究已上皆見戒疏記卷四簡非瞥爾者瞥爾單意制限大乘瞥爾亦名獨頭即前資持引疏所云獨頭心念也第三章成就處所大意撮録列表如下約三心明止持三心無記非業善惡未著止持三心無記本不名持望受體是記業説有持義約行心明四行行心流入行心思心成業善惡乃異止持行心通三性三性中唯局無貪等三善為行作持作犯三性中唯局貪等三惡為行止犯約三業明四行身口意無犯有犯有二釋約身口思釋發心籌度將由身口尚未動相此心粗著判屬身口而非單意約重緣釋謂以後念還追前事自不制約是為重緣向念而非瞥爾單意上來持犯總義中第三章成就處所竟第四章辨犯優劣辨犯優劣中分為四節一約三性辨犯二將心望境辨犯三單心辨犯四有心無心辨犯資持云化制兩教辨業天乖制則從教重輕化則論心濃薄教唯楷定緣具則例入刑科心既不常動發則須分體性因果既異化制斯分必昧宗途未窮業本故先料簡委示來蒙見事鈔記卷十四第四章中有四節初二兼明化制三局化教四局制教若犯性戒具受化制二罪若犯遮戒唯受制罪第一節約三性辨犯約三性辨犯中分為三項一明起業之源二約三性示相三結示傷歎第一項明起業之源事鈔云起業要託三毒而生然毒之所起我心為本此義廣張行人須識如懺法中具明業相資持釋云前示業本業無自性必假緣生緣雖衆多不出心境由境發毒構造成業境是外緣毒從內發故明起業惟推三毒毒從我生我即妄計即斯妄計是業之本故名妄業經云一切業障海皆從妄想生諦求妄本畢竟無依但是一心隨緣不覺以不覺故硜然計我由我起毒因毒生業業成感果果全是苦苦即生死流浪出沒造受更資如是億劫莫知所止從本至末就果推因少識妄源粗知苦本諸賢覽此豈不自思悲夫此下指廣請尋後篇不復煩引事鈔續云今略述起罪必約三性而生受報淺深並由意業為本故明了論解云破戒得罪輕重不定有重心破輕戒得罪重無慚羞心作無畏難或由見起謂無因果或由不信生謂非佛制此戒或不信破此戒得此報或由疑生為定佛制為非佛制為定得報不定得報若由如此心破得罪便重若不由如此心偶爾破戒重翻成輕資持釋云次正敘重輕又二初示犯報分齊上二句明犯從心起示因差也下二句明報約心分示果異也三性者性即心體心雖萬狀論體唯三二是有記一號無記然據善心應受福報由心愚癡損境義一業道制教二俱有犯但業有少輕制還依教意業謂能造之主總上三性但性據始起業取已成故下引文顯相上二句通示有下別釋前明制輕業重為三初標二無下列相為四初二句無慚心無畏難者釋無慚相次二句邪見心或下四句不信心又二一不信聖教二不信果報或疑下五句疑惑心同上二種三若由下結示次若不下明制重業輕反上四心可解已上皆見事鈔記卷十四事鈔引了論解顯重輕相資持釋文至為明晰今依其文列表如下制輕業重以重心破輕戒得罪重無慚心邪見心不信心不信聖教不信果報疑惑心疑聖教疑果報制重業輕以輕心破重戒得罪輕有慚心無邪見心有信心信聖教信果報無疑惑心不疑聖教不疑果報第二項約三性示相約三性示相中分為三支一善心二不善心三無記心第一支善心資持云初善心者雖非粗惡然是無知結業乃輕違制無別事鈔云如僧祇中知事暗於戒相互用三寶物隨所違者並結上罪或見他厭生與其死具看俗殺生教令早與勿使苦惱此並慈心造罪而前境違重不以無知便開不犯由是可學皆結根本資持釋云初明好心犯盜或下次明慈心犯殺不以下示犯所以已上皆見事鈔記卷十四第二支不善心資持云次不善心者謂貪瞋癡三毒所起單復等分鼓發七支故事鈔云識知戒相或復暗學輕慢教網毀訾佛語如明了論述云有四種粗惡意犯罪一者濁重貪瞋癡心二者不信業報三者不惜所受戒四者輕慢佛語故心而造則得重果以此文證由無慚愧初無改悔是不善心資持釋云初通敘上二句別舉犯人學不學故下二句合明心相如下引示四中初是總相攝一切故濁重難顯且約三時無悔名上品心下三別相開癡心故二是邪見心三即放逸心四即憍慢心故下二句總示業報以下鈔家結示無慚無愧即是不善始終二心該前四種一一相兼初無者古記云初猶都也已上皆見事鈔記卷十四第三支無記心資持云三無記多別一無情局無記有情通三性二就情中報色是無記心則通三性三就心中三心局無記行心通三性下明二種初縱放者謂泛爾無記次約睡狂即昏迷無記事鈔云元非攝護隨流任性意非善惡泛爾而造並通攝犯唯除恆懷護持誤忘而造此非心使不感來果事鈔續云非即如上前為方便後眠醉狂遂成業果通前結正並如論中無記感報資持釋云初句指前未盡即猶止也前方便者或教他犯如殺盜等或自業相成犯如自安殺具等若據果成雖在無記由假方便故云通前等如論即下成實自業相成者自起方便後趣正果事鈔續云問無記無業云何有報答解有二初言感報者謂先有方便後入無記業成在無記心中故言感報而實無記非記果也二者不感總報非不別受如經中頭陀比丘不覺殺生彼生命過墮野豬中山上舉石即因崩下還殺比丘如成論中睡眠成業是無記業資持釋云初問中徵上指論答中先約方便釋即上睡狂無記也初明因前故感報而下明正成則非報二約總別兩報釋此義通前兩種無記總報謂地獄總受別報謂餘趣別受如下引證前證上縱放後證上睡狂如經者未詳何經不覺是無記心事鈔續云問如前無記有不犯者其相如何答謂學知戒相善達持犯心常兢厲偶爾忘迷由非意緣故開不犯如扶持木石失手殺人如是等緣並非結限反上所懷並結正犯資持釋云次問中徵前開忘答中初敘學人反下謂非學人翻對可解已上皆見事鈔記卷十四依上鈔文之意唯有學人可開迷忘若不學人雖於境迷忘亦結正罪事鈔記卷二十七中廣明不學無知其敘結本意文與此大同但後例開句法中則不學亦可開迷資持記有問答釋疑文附録於下以資參考問前云隨戒境想唯開學人今不學人何以開耶答前文敘結且據大判不妨不學準例同開若以義求則迷事不別若取文證則戒疏顯然此不繁引第三項結示傷歎事鈔云然則業苦綿積生報莫窮虛縱身口汙染塵境既無三善可附唯加三惡苦輪以此經生可為歎息資持釋云初二句示生死長久業苦通舉因果綿謂出沒久遠積謂造受衆多生報別示苦果窮盡也虛下嗟毀犯陷墜隨妄興業故云虛縱無三善者多惡因也加三惡者無善果也附憑也加增也以下正歎經生猶度世也息即是氣資持云且夫心緣境發果自因成造受更資沈流長劫因緣遇會形影無差至於火爍湯煎痛非可忍霜寒冰凍聲不可聞萬苦衝心如鎔鐵聚翻思往業雖悔何追矧乃戴角披毛飛空潛水氣命繫於屠獵血肉委於庖廚或復炬口針咽飢虛切體臭膿穢屎食啖聊生信乎禍福無門升沈由己嗚呼含靈蠢蠢生死悠悠方便多門其誰一悟辭雖繁費意復何窮已上皆見事鈔記卷十四第二節將心望境辨犯事鈔云如母論云犯必託境關心成業心有增微境有優劣故也或心境俱重人作人想殺或境重心輕人作非人想或境輕心重非人人想論通一切不局一戒資持釋云初引論通示三初準文通示以罪假緣成緣即心境境是外緣故云託也心是內緣故云關也心起不常故有增微境緣非一故有優劣或下歷句別簡初句俱優下二句互有優劣義立俱劣一句如非人作畜杌想之類論下點上語通事鈔續云淫中自有輕重畜生及人人中有在家出家在家中持戒破戒出家五衆持戒破戒乃至聖人重同報異資持釋云二對戒別明四初淫中初句通標畜下別簡有四初句簡異類理加非人次於畜趣二人中簡道俗三道俗中各簡持破在家更簡無戒有戒持中復有士女五八出家先簡五衆大僧最重五中各有持破四持中簡凡聖薄地持戒外凡已去乃至無學陵辱極重末句總示重同謂制罪淫不簡境皆犯重故報異謂業道業有優劣受報不同後三制報俱異可知事鈔續云第二盜重者天及人乃至聖人三寶差別僧物最重資持釋云二盜中三初簡趣亦合加畜為首二人中簡凡聖三簡三寶佛輕法次僧重事鈔續云第三殺戒成論云如六足毗曇中説殺邪見人輕殺蟲蟻此人汙染世間多損減故資持釋云三殺中引論唯簡邪正人輕蟻重且據業論不約制教準義亦合約趣道俗持毀凡聖簡之文略不出事鈔續云第四妄戒向在家人説重向出家人説輕資持釋云四妄中三趣同盜人則反之如文所顯又出家中五衆乃至聖人漸輕可解若如五分僧中妄語重百羅漢前故知誑僧極重對戒別明中依鈔記文義具列表如下淫簡趣人約制罪言同犯重罪非人約業道言各有優劣畜皆前優後劣可知人中簡道俗出家在家道俗中各簡持破出家比丘比丘尼持戒破戒式叉摩那持戒破戒沙彌沙彌尼持戒破戒在家有戒八戒持戒破戒五戒持戒破戒無戒持中簡凡聖無學人三位果人內凡外凡薄地盜簡趣人約制罪言唯簡趣有天非人異簡凡聖同簡三寶畜稍異人中簡凡聖無學人約業道言各有優劣三位果人皆前優後劣可知內凡外凡薄地簡三寶僧法佛殺鈔文唯簡邪正約制罪言唯簡趣有準義亦合約趣道俗持破凡聖簡之如淫中所列異餘皆同約業道言各有優劣皆前優後劣可知妄簡趣人與殺同天非人畜人中簡道俗在家出家道中簡五衆沙彌沙彌尼式叉摩那比丘比丘尼簡凡聖薄地外凡內凡三位果人無學人資持云上四但出境之優劣心隨境故重輕可知若約互論如前作句無不通曉已上皆見事鈔記卷二十六第三節單心辨犯事鈔云單心三時辨犯輕重如善生經且約殺戒輕重八句位分四別資持釋云前科對境此獨論心故云單也三時初方便時二根本時三成已時且約殺者餘可準也心念不常前後具缺不出八句括之斯盡事鈔續云初一句三時俱重謂方便舉尤害心根本起尤快心成已起隨喜心資持釋云初句歷示三心重相尤即訓甚但非極甚即是輕心然極甚難明略須示相但約起心念念不間色心躁悶不愧旁人神思昏迷都忘善事奔趨前境暢悅己情或邪見居懷撥無因果向親姻作穢對塔殿行非凡此用心皆名定業能牽來報縱懺不亡以此自量何容輕動識心之士豈不畏乎事鈔續云第二三句二重一輕初方便根本重成已輕中云方便輕根本成已重後云方便成已重根本輕事鈔續云第三三句一重二輕初根本重初後輕中云方便重中後輕三云成已重初中輕事鈔續云第四一句三時俱輕善生十誦中啼哭殺父母畏苦痛故害父母命等是資持釋云引諸經律舉事顯相雖懷憐愍非無殺意俱輕可知事鈔續云律據人想八業皆重業隨心故牽報不同資持釋云若依律制則無輕重今取心業故分八句資持云文中句數交絡欲令新學易曉為圖示之初有一句三時俱重方便重根本重成已重第二有三句二重一輕初句方便重根本重成已輕中句方便輕根本重成已重後句方便重根本輕成已重第三有三句一重二輕初句方便輕根本重成已輕中句方便重根本輕成已輕後句方便輕根本輕成已重第四有一句三時俱輕方便輕根本輕成已輕若以四位分之上句最優下句至劣中二通優劣若約八句論之則句句相降中間二位各有三句並依重輕次列比之自見已上皆見事鈔記卷二十六第四節有心無心辨犯事鈔云有心無心相對八句四位如前資持釋云有心通含輕重無心與前為異歷句並同已下且約性重四戒顯相餘可準也事鈔續云初一句三時有心事鈔續云次三句一初中有心後則無心犯四重二初則無心中後有心亦犯四重三初後有心中間無心犯初重下三戒中罪下罪事鈔續云後三句一中間有心初後無心犯四重二初便有心中後無心犯初重餘三戒或中罪下罪三後便有心上二無心淫戒犯重以出時樂故若餘三犯下罪事鈔續云次一句三時無心不犯資持云初有一句三時俱有心方便有心根本有心四戒俱重成已有心第二有三句二有一無初句方便有心根本有心四戒俱重成已無心中句方便無心根本有心四戒俱重成已有心後句方便有心初戒重根本無心成已有心餘三戒方便中罪成已下罪第三有三句一有二無初句方便無心根本有心四戒俱重成已無心中句方便有心初戒重根本無心成已無心餘三戒方便中罪或下罪後句方便無心初戒重根本無心成已有心餘三戒成已下罪第四有一句三時俱無心方便無心初戒怨逼禁心無罪根本無心成已無心餘三戒始終迷忘無罪優劣之義亦如上明若八句相望者但以第二位中後句在下第三位中初句在上則次第義便問下句無罪豈名犯劣答但望教開故無有罪非不造事故入犯中事鈔云後之八句由心有無故犯不犯別不同前八莫不有心資持釋云料簡中初簡前單心可解應知前約化業此據制教事鈔續云後明無心者或無心受樂及殺盜等心或狂亂不覺者資持釋云二重示無心二初牒前對上輕重故云後明或可別點第四俱無或下示相初句別簡淫戒此門明淫並據怨逼三時有無若約自造境合即犯不約三時境想不開無心亦重故非所論及下合示三戒通約迷心不了前境又復淫戒於三時中隨有一時無非皆重俱無方開餘之三戒重輕不定初有餘無或中罪或下罪並方便故中有餘無皆重並根本故後有餘無皆下罪並隨喜故已上皆見事鈔記卷二十六上來持犯總義中第四章辨犯優劣竟第五章方便趣果事鈔云然造修前境必有三時是以大聖隨時而制意令智士剋志不為資持釋云初示三時即方便根本成已也是下顯制意剋猶約也見事鈔記卷二十七方便趣果中分為三節一前方便二中根本三後方便第一節前方便資持云通三方便望後根本俱名為前事鈔云今約淫戒以明如內心淫意身口未現名遠方便此犯下罪二動身口未到前境名次方便犯中罪三者臨至境所身分相交未至犯處已來名近方便是重中罪事鈔續云已下雖輕重多少不同大相可準已上皆見事鈔記卷二十七上罪皆有三方便例前可知若獨頭中罪下罪準諸記文止分遠近二方便遠方便同前又合前次近總名曰近方便皆結下罪無有區別戒疏云言方便者乃是趣果之都名業未成前諸緣差脫故令此罪壅住方便行宗釋云前示名業下釋義見戒疏記卷四第二節中根本事鈔云本相如何謂入如毛頭名淫舉離本處名盜斷其命根名殺言章了知名妄若結罪之時並攬前因共成一果不同他部因成果已更有本時方便資持釋云前明根本之相二初句通問謂下別釋若下明攬因成果簡異他宗使無濫用見事鈔記卷二十七第三節後方便事鈔云何者後方便謂所造事暢決稱懷發喜前心未思悔改復結其罪通得下罪資持釋云不論本罪重輕並制一下罪故云通也翻前方便二三不同中罪下罪有異故也見事鈔記卷二十七上來持犯總義中第五章方便趣果竟第六章闕緣不成闕緣不成中分為二節一顯相二校量第一節顯相戒疏云闕緣方便隨相衆多且以事約分為七種所謂闕緣乃至心息見戒疏記卷四顯相中分為七項一闕緣二境強三緣差四境差五想差六疑心七善心息第一項闕緣戒疏云初明闕緣泛解有三一通名闕緣七方便者闕不至果並為緣來豈非通也戒疏續云二別名闕緣如諸戒下各有闕緣不可以盜而開殺戒各不相通故名別也行宗釋云上二泛論總收一切第三兩亦正示初緣戒疏續云三者亦通亦別何者是耶凡是犯戒體是婆塞若造罪未果或自命終捨戒邪見二形生等或病狂癡但有二緣不名犯戒俱為造因未成至果故名闕婆塞緣望下六別對戒並通故兼二號行宗釋云初標徵凡下示相三初標緣若下次明闕相罪未果者方便義也列相有二初列四捨體壞無法後病狂等自不了知初則體相俱壞後謂體具相乖鈔中仍加受戒不得等但下三總結初結闕緣望下次結兩亦問已下六緣可例此否答亦可例也以互望皆別對戒並通但境強一種不必盡通如是思之已上皆見戒疏記卷四第二項境強戒疏云二境強者如欲行殺前境反強倒欲害我差此進趣壅住在因故曰方便然境強非中罪中罪由強而生餘之上下類此可釋行宗釋云初敘緣然下定罪強非罪緣故曰非中罪因強壅住故云由生也餘下指例如云闕緣非中罪中罪由闕緣而生等問境差中亦有境強與此何別答此本境強下異境強故不同也見戒疏記卷四第三項緣差戒疏云三者緣差方便如欲殺盜往逢異人或恐有事或刀杖毀壞或要期未遂總號緣差就義通名七緣皆是隨相取別唯此第三行宗釋云初列相有四一非本所期二慮他所獲三殺具有闕四如不見前境等總下結名以名通七緣相局四位見戒疏記卷四第四項境差戒疏云四境差者隨戒並有且據大殺四境來差謂人非人畜生杌木行宗釋云初示緣通且下次標所出人是同類非畜是異趣杌木即無情見戒疏記卷四境差中分為二支一明人異境二明餘異境第一支明人異境明人異境中分為三類一正明二問答三指廣第一類正明戒疏云如欲殺人剋心在張王人異境而代張處緣王張解望人不殊究竟成重由異境來張人不死殺意又息壅住方便故曰境差行宗釋云初明差相且舉張王兩姓以分本異二境緣下二結犯又二初結異境由下結本境罪是中罪號闕緣方便也見戒疏記卷四第二類問答問答中分為二端一問異境無心二問因果差別第一端問異境無心戒疏云問本殺王時但作張解無殺王心何因得重答張王非罪緣人是殺境雖無王心然有人想殺緣既具何得非重是故律云男想殺女佛言上罪可以類之行宗釋云初問以心境既差理非結重答中初正答望張境差望王心差故云非罪張王是別人趣是通今就通結故成殺重是故下例證見戒疏記卷四準上疏文似殺戒於人異境不開剋心若據下別簡性重章辨錯誤文錯者亦開誤者乃犯第二端問因果差別戒疏云問殺王重罪乃取張因而成極果為望張邊別有方便行宗釋云初敘問意謂果成因沒應無方便古有異解故問以決之戒疏續云解云張王姓別人境不殊重果位同輕因相等故攬張因用成王重如律本中列過五因用成五重行宗釋云二引解二初古解為二初立理謂本異並人因果無別故攬相成如下引例如律盜戒有四句一方便求過五錢得過五錢上罪二若方便求過五錢得五錢上罪三方便求過五錢得減五錢中罪四方便求過五錢不得中罪今引第二過五方便能成五果此亦因果兩別相攬而成可為今例戒疏續云問既攬張因成王果者本立境差方便今因成果無境差矣行宗釋云二今解三初難破以攬因成果果成因滅境差不立故知非矣戒疏續云今正解云人趣乃同形者有異不攬相成與王未交屬前張因對王已去別起方便即攬王因還成正果本境張因壅住方便號此方便名王境差行宗釋云二立義中二初通示因果各異與下二釋成二初明王果本下釋張因言王境差者以張是本境不得名差故從異境以彰差義戒疏續云問不攬張因以成王果何故律文攬過五因成五重果答彼以同損一主元來有心故得相成張王既別何得例也行宗釋云三釋妨中以向古師執此為例須為通之令無後惑答中顯示境有一異不例可知已上皆見戒疏記卷四第三類指廣戒疏云昔來諸師於人異境更立諸相通列六緣中加疑想用分多句事理境心不無其致行宗釋云諸相即下六緣及餘句法一是人二人想三有殺心四興方便五命斷更加第六疑想以殺但五緣故言中加也復於疑想分出句法且依首疏三趣各有五句杌木非情無境強義但有三句總十八句文中但云人異境至於作句則通四境今備列之一人趣五句想心二句一境不強而殺張人境差中罪王人根本上罪二境強殺不得張人境差中罪王人境強中罪疑心三句一境不強而殺同上二境強殺不得同上三疑故善心息張人境差中罪二非人五句想心二句一境不強而殺張人境差中罪三畜生五句非畜無罪二境強殺不得張人境差中罪非畜無罪疑心三句一境不強而殺張人境差中罪非畜疑心下罪二境強殺不得張人境差中罪非畜疑心下罪三疑故善心息張人境差中罪非畜疑心下罪四杌木三句想心一句境不強而殺張人境差中罪杌木無罪疑心二句一境不強而殺張人境差中罪杌木無罪二疑故善心息張人境差中罪杌木無罪事即制罪理謂業道方便究竟皆兼兩業境即四異心謂想疑見戒疏記卷四首疏即隋智首律師所撰之律疏有二十卷為南山所師承者第二支明餘異境明餘異境中分為二類一通示二釋疑第一類通示戒疏云餘有非人畜杌來作異境通望本境不死中罪若望異境無心無罪見戒疏記卷四第二類釋疑釋疑中分為二端一釋人異境難二釋律境想難第一端釋人異境難戒疏云問王人異境亦是無心何為結重答人想而殺境心相應是故成重不起非人想故無罪也行宗釋云初躡前人異境相並為難釋中以餘三境趣類全乖不可相例見戒疏記卷四第二端釋律境想難戒疏云問若無罪者云何律中非人人想中罪者行宗釋云初敘難引律者即殺戒境想第四句此段疏文與上端連續故先牒上文而後徵難已下疏文六段共有三釋初二為古解後一為今義文六段中第一段為初師釋第二三四段先示次師釋後由初師斥辨第五六段為今義先詰破初師後詳申正解文繁義密故先預明大意學者自易貫通戒疏續云答此由境差方便罪也由非人來人想不捨殺張心成而境乖異望張方便望非人邊本無罪也具足五緣殺非人者但中罪如何其因已是中罪義不然也行宗釋云二引釋二初引他師約本境釋二初約想心解又三上二句定罪由下釋所以彼謂律結中罪還從本境不望非人具下引殺非人罪質成上義五緣者一是非人二非人想三有殺心四興方便五命斷如何等者以非人作人想在人為境差望非人為想差故是殺非人因也謂果罪但中罪豈得因罪即結方便中罪耶以非人方便但下罪故此明律結中罪不望非人斥他異解故云不然也戒疏續云有人言上立異境想疑心中想則決徹人差結重餘則無心但屬本境疑則不爾緣兩境生故就兩境雙結二罪行宗釋云二斥疑心解三初示他解彼謂想心同上疑心不同以未決徹本異二境並有心故云二罪者本境方便中罪人異境是上罪餘三異境並疑心中罪戒疏續云今解不然但列本境縱使四異來差本境若強若疑皆列本境何以明之畜是小愆杌非生罪如何來差俱犯中罪豈不望人從本境結行宗釋云次約義斥還即古義對破前解故云今耳下云今明正解始是今義文中初判定云但列者即指律文境想句中何下徵釋且舉畜杌難破前義據此破詞則知前解異境皆中罪戒疏續云問異境有強方便屬何答強想猶懷本境故知此強不望異結如是類例若疑若想皆從本境行宗釋云三引強為例據上已明強從本境更欲別示故問所屬答中強是異境想緣本境故云強想如下例通據此立義不問想疑異境之上永無罪也前門境強乃約本境此明異強須知兩別戒疏續云問異境若強差我不殺強是本境異非罪者異境忽弱而被我害未害之前方便屬誰若見異已去別有方便此則本境方便自立若見異已去無別方便害異果罪因還本境若此立義則無境差行宗釋云二明今釋約兩境難二初躡境強難破又三初牒前義異下反以境弱為問若見下雙難初約有方便難則本異兩境皆有罪故次以無方便難則異境果成本境因沒故云無境差也戒疏續云今明正解本境一品齊是中罪異境來差人境緣人有強有疑莫不殺心皆結中罪若至非畜例有強疑以懷人想強從本境非畜異境一向無罪若兼疑心從兩境生本境疑中罪非畜疑下罪若至杌木並結本境以杌異境非生罪緣行宗釋云二申今正解中二初明本境通結異下明異境別結又復為二初明人異境若至下次明非畜境又二初通標強疑以下別釋初釋境強若兼下釋疑心非畜二異正犯中罪下罪疑故並下罪杌非罪緣故無所犯初師局就本境異則不結次師疑心兩緣異境皆中罪不簡輕重觀今所判文理精詳比前可鑒已上皆見戒疏記卷四上釋律境想難中科文別録於下以便對閲初敘難二引釋初引他師約本境釋初約想心解二斥疑心解初示他解二約義斥三引強為例二明今釋約兩境難初躡境強難破初牒前義二反以境弱為問三雙難初約有方便難二約無方便難二申今正解初明本境通結二明異境別結初明人異境二明非畜異境初通標強疑二別釋初釋境強二釋疑心第五項想差戒疏云第五想差方便義張八位初心差境方便如律人非人想等二境差心方便如律非人人想等三心差境究竟如律淫酒戒若懷非道非酒想疑但是正境皆結究竟四境差心究竟如欲殺誑張人張去王來緣王張解若誑若殺是境俱差齊成究竟五心境俱差成方便六即此互差成究竟以事思取七心境不差成方便如出佛身血境強緣差之類八心境不差成究竟諸戒並是行宗釋云此門八位前四互歷後四具兼一三全是想差五六心境兼差此門唯收四句二四屬前境差七八即境想初句故此四句皆非科意句法相從故為八位耳五六二句令以事思者五中如欲殺張王人替處是境差心復轉想謂為非人即想差成方便第六如欲殺張王人替處心作李想還成究竟言互差者互即是俱承上第五故云即此七中出血一罪永無根本境強緣差事不究竟心境無改疏中四云殺誑張人等如別簡性重章錯誤節委釋戒疏續云就此想中或有從輕向重如殺盜畜生轉想向人者是或從重至輕即反上句是或互轉者如彼淫酒俱是正境想疑或生無非究竟行宗釋云初殺畜盜畜方便但下罪轉作人想殺盜皆中罪二殺人盜人轉為非畜後心並下罪故云反上三互轉俱重如淫前作非道想後作正道想或前正後非無非果本私釋更立互轉俱輕如非人畜生心想互差可以明之已上皆見戒疏記卷四第六項疑心戒疏云第六疑心方便者相對義張八位方盡我疑他方便人非人疑也他疑我方便身現妄語相前疑不了是他疑我究竟我疑他究竟如口造語業但使言章了了不問自他疑也行宗釋云前四互句初即境想中第二句問與前境差中疑心何別答前對異境此就本境餘三俱約妄語配對戒疏續云上四句單疑也今此雙舉何者是耶自他俱疑成方便如身口互造也即成究竟者妄語言了也自他俱不疑成方便如出血在佛也即成究竟者一切戒是也行宗釋云後四俱句前二還約妄戒但具兩疑與前為異言互造者亦即如上身造口業後二亦是相從而出已上皆見戒疏記卷四第七項善心息戒疏云第七善心息方便者如欲造罪身口雖發未鄰究竟忽起善心便止前業壅礙不暢但居方便行宗釋云初正明鄰近也云忽起者或因他勉或遇勝緣或思佛戒或畏因果若非此類善心寧發居方便者前心中罪戒疏續云問此乃善心生今何言息答實如來問向若不生惡必趣果由此善心能息惡想即所息處號為方便又如律文捨者中罪捨時非罪由能捨故前惡不至後果故號前因為方便也行宗釋云二釋難中此即善生惡息於義易知欲生下答故此為問答文為二初正答又下引例能捨則同善生所捨可類惡息已上皆見戒疏記卷四第二節校量行宗云二校量者即總料簡前七位也戒疏云初以自身造境對置殺具明方便多少者身自造境具七方便設置懸擬既非自身故闕想疑但五方便行宗釋云初明多少寬狹二初自造置具多少又二初標示身自下別釋初明自造故多設下次釋置具則少以想差疑心必約到境懸擬相成不可論故戒疏續云剋心辨差其境則寬以元在張王非畜杌後來差故漫心辨差其境則狹以通三趣有境齊害唯有杌境用分輕相行宗釋云二剋漫寬狹言寬狹者謂異境多少也初明剋心寬王非畜杌即四異境次明漫心狹杌境輕者非情無過止有方便上據大漫若約小漫如欲通害人趣望剋為狹對大猶寬戒疏續云二心境分別境差境強緣差據前境論闕婆塞緣想疑心息據自心辨行宗釋云二心境分別三種屬境四種屬心闕婆塞緣或約四捨或是狂癡故屬心也已上皆見戒疏記卷四上來持犯總義中第六章闕緣不成竟第七章境想分別境想分別中分為五節一明制意二明有無三定四五句四互四五句五輕重第一節明制意戒疏云初明制意若無境想不可定罪輕重行宗釋云以心有是非境有錯誤淫酒前三句重後二句輕餘戒初句相應故重後四句乖差故輕見戒疏記卷六第二節明有無戒疏云二明有無者準律約戒不必具有今解無者是略無也無別所以見戒疏記卷六五戒八戒中律出境想句者有殺盜淫妄飲酒非時食六戒今依資持記中引律四重戒句法具録如下餘可準知淫戒五句道作道想上罪道作非道疑上罪道作非道想上罪非道道想中罪非道非道疑中罪盜戒二重過五四句有主有主想上罪有主有主疑中罪無主有主想中罪無主無主疑中罪減五四句有主有主想中罪有主有主疑下罪無主有主想下罪無主無主疑下罪殺戒五句人作人想上罪人作人疑中罪人作非人想中罪非人人想中罪非人非人疑中罪妄戒五句人作人想上罪人作人疑中罪人作非人想中罪非人人想中罪非人非人疑中罪第三節定四五句戒疏云三定四五句者行宗釋云以律中列句四五不定如淫殺妄三戒並五句盜戒四句但由第三一句結罪有無故句法不定如殺戒人非人想轉想中罪本迷下罪以作非人殺故盜戒無第三句者以有主無主想轉想亦中罪本迷無罪以無主物非罪緣故戒疏續云若輕重相望境是可學生不可學迷同是五句行宗釋云初輕重明定五迷重為輕如人作非畜殺有主作非畜盜等皆緣罪境定有第三句故同五句戒疏續云若犯不犯相形則四則五謂前後俱迷非緣罪境即定四句除第三位如無主想等迷雖是定而緣罪境即定五句如非道想非人想減五想等行宗釋云二犯不犯明四五中初標舉謂下別釋初明定四無主想者律無此句迷雖下次明定五此即總收輕重二位減五想者此謂盜戒若作無主則是四句若盜滿五迷為減五亦隨結犯故入五句意顯隨義不定不必依文已上皆見戒疏記卷六第四節互四五句戒疏云四互四五者由是可學生不可學迷即互輕重或從四以至五如實無主體唯四句後轉為主即為五也若本緣人轉想當杌約從後心則唯四句行宗釋云初標二隨釋二初從四至五即約前心本迷後心轉入罪境故二從五至四亦合標云從五至四謂本是心境相當後轉緣非罪境故云轉想當杌即人作杌木想見戒疏記卷六第五節輕重戒疏云五輕重者如文次第前疑重後疑輕以境是異輕本境故前想重結本方便心境相當故後想輕以正犯時有心無境行宗釋云初約疑想分二前釋兩疑後釋兩想制教同罪心業重輕故分兩異前疑重下準鈔應云以本緣人人境不捨臨殺有半緣人心故後疑雙闕故輕後釋兩想中有心無境者闕本境也資持云兩疑中疑心不別境分本異故説重輕後想亦爾前想中云本方便者取前心也望後正對心不當境見事鈔記卷二十七殺戒五句此文前釋兩疑約第二句及第五句後釋兩想約第三句及第四句戒疏續云又就本境中疑重想輕以疑半心不捨本境故重想則捨本從異故輕就後異境想重疑輕以想緣本但是境差故重以疑減半緣於異境故輕行宗釋云二約本異分二初明本境二句次明異境二句疑減半者以疑猶豫半涉是非是於異境復減半心故輕於想戒疏續云此判輕重據本重異輕為言若本輕異重例之即是如殺非畜人為異境可以例諸行宗釋云三明本異重輕中初立義如下顯相已上皆見戒疏記卷六上來持犯總義中第七章境想分別竟第八章別簡性重別簡性重中分為五節一剋漫二錯誤三身口互造四教遣五重犯戒第一節剋漫戒疏云言其剋者本情專注唯在一境若言漫者通涉無準行宗釋云剋唯有一漫通大小剋即訓定漫猶遍也見戒疏記卷五資持云剋謂情專一境漫謂心涉多緣漫復有二一者大漫如本標心遍通三趣俱是所期隨作成犯二者小漫但該人道不兼非畜見事鈔記卷二十七剋漫中分為三項淫盜殺妄第一項淫戒疏云約淫為言犯無剋心同成極重何以明之但有染心將欲成犯初期在此而後會彼或男女境亂張王者別或人畜趣乖境心雙轉但使境交無非大重行宗釋云初判犯何下二釋成初句徵但下釋有二初四句通示染心將欲即起方便期此會彼即至果本或下別顯餘人非畜為境轉想疑名心轉或境心俱轉見戒疏記卷五第二項盜殺戒疏云盜殺剋心相當方成重罪心境俱違但結方便行宗釋云盜殺中略示剋心以剋有重輕漫唯通犯但明剋異漫則可知見戒疏記卷五資持云盜殺二戒大漫則隨境成犯小漫則異趣非犯剋定一人三趣非犯見事鈔記卷二十七剋定一人三趣非犯者盜戒可爾殺戒張去王來緣王張解誤亦成重如下節委明第三項妄戒疏云若三趣齊現內知歷然犯無剋心通境隨犯三趣不現隨剋隨犯行宗釋云妄語論剋不同殺盜但有多境則不成剋單對一境方成剋義如本期人畜現非犯見戒疏記卷五據上剋漫別配四戒文義並參用下節文列表如下大漫標心遍通三趣小漫且約唯期人趣剋心且約唯期張人或張人某物下節列表亦爾淫不論剋漫三趣通犯盜大漫三趣物通犯小漫人物犯非或畜物非犯剋心張人某物犯張人他物非犯王人等物殺大漫三趣通犯小漫人趣犯非或畜趣非犯剋心人趣錯非犯誤犯通人趣結犯不論張王非或畜趣非犯妄大漫三趣通犯小漫三趣俱現通犯與大漫同或二趣現僅一趣現人趣犯非或畜趣非犯剋心同上小漫統觀已上四戒於大漫小漫剋心三義唯有盜戒最為完備淫戒一概不論妄戒剋心與小漫全同又小漫中三趣俱現通境隨犯與大漫同殺戒於剋心中人趣誤者亦通結犯與小漫同下節錯誤二義別配四戒表例此可知第二節錯誤戒疏云夫立錯誤義者並是不當本心之謂也錯就現緣境差為義誤就不現緣境差心謬忘為義所以然者現緣二境相別顯然及至造趣事容舛錯即名衆境交涉為錯若論誤者心通前後不可雙緣如前心謂此後心謂彼心想謬忘故謂之誤行宗釋云初通示錯下二別釋初略分所下委釋初釋錯義若下釋誤義準文顯相不出境心論境有二一現不現別二多與少別心亦有二一忙亂迷謬二臨機前後如是尋之不更繁釋見戒疏記卷五錯誤中分為四項一淫二盜三殺四妄第一項淫戒疏云初之一戒無論錯誤患起內心通皆障道但是正道不問迷誤或此彼男女非畜諸境緣此謂彼誤亦犯重境雖交涉錯亦犯重行宗釋云初示不立但下顯犯二初明誤犯境下明錯犯見戒疏記卷五第二項盜戒疏云語盜而言漫心無寄三趣有物皆欲盜奪及至往趣縱境差舛心有迷忘皆稱欲心錯誤齊重行宗釋云初約三趣二初明大漫不論錯誤三趣隨犯戒疏續云若先剋定要取人物不盜餘趣及往盜時境交想轉雖舉離處不成罪攝不稱本心猶屬本主以於此物元無盜心心境既非何過之有故錯與誤俱不名犯後知錯誤即應還主不還起盜後方成重行宗釋云二明小漫中有二初示起心及下二明造境三初判非犯境交是錯想轉即誤若得人物犯重無疑若非畜物則開無犯不稱下次釋所以初句示心非言不稱者本期在人故猶下三句明境非屬本主者猶是非畜物故心等四句雙結後下三明後犯前開離處後知起盜則非所開非畜中罪下罪望盜云重戒疏續云二對人趣辨錯誤者俱亦非犯如欲盜張忽得王物既非所期即是境差物非本物又是想差據此為異境不稱心後物無心心不當境故錯與誤並同不犯行宗釋云二對人趣中三初標示如下次顯相又二初示心境俱差據下二明開犯所以初二句躡上境差據此為異者本期張人故境不稱者得王物故次二句躡上想差故下三結示戒疏續云三對同主辨錯誤者俱非犯也故善生云盜金得銀還置本處不得盜罪如律男想盜女物者犯據漫心也行宗釋云三對同主中三初通標故下引示得銀許還則知離處不即成犯知銀不還後心自結如下點異律文結重似不開誤故須引決與上無違據漫心者謂小漫也行宗云前之三門初是漫心兼含大小後二剋心別開自他又前對異趣二對異人三約異物已上皆見戒疏記卷五第三項殺戒疏云論殺戒者漫無所寄三趣同害及至行事不稱初期雖有少乖不妨本有害意故使錯誤同成一重若論剋局但是一緣造趣行害相應成重若非本期則非殺境及往加害境則交涉或以迷忘非畜雖死不稱本期又無殺心錯誤不犯行宗釋云初明三趣中二前明大漫同上無開若論下次明小漫而云剋者對大為言文中二初明本趣成犯若非下二明異趣俱開初示乖期及下明開犯交涉是錯迷忘即誤戒疏續云二就人趣以論錯誤如剋心害張不欲害王現境歷然心緣亦別及以殺具害張之時而彼王人忽然與我刀輪相應王命雖斷由非心故錯則不犯若論其誤張去王來緣王張解加害者犯若望後王雖非本期以心不了緣此謂彼既人想不差殺緣具故雖誤犯重如上方便已為分別行宗釋云二就人趣中二初總標如下二別釋又二前釋開錯為三初明標心現下明對境張王並現故云歷然期意在張故云心別及下示錯相若論下次釋誤犯為三初文斷犯若下釋犯所以如下指廣即境差方便中已上皆見戒疏記卷五即境差方便中者見本篇前闕緣不成章顯相中第四境差文第四項妄戒疏云論妄語業異趣通辨錯犯誤非漫心無簡錯誤隨犯行宗釋云初明三趣二初明小漫本欲誑人非畜境交錯亦隨犯前後互差境想開迷故誤非犯下二句明大漫戒疏續云二對人趣錯誤俱犯由詐顯道德謀誑在人表聖招利境損義一但使言竟錯誤同重行宗釋云二對人趣中亦即小漫準知大妄不開剋心戒疏續云三就所稱凡聖二法心欲説聖口錯稱凡既非聖法前無所損故錯非重若就聖法明於錯誤如善見云錯説三四禪皆同一重行宗釋云三約所稱法中二初總標心下二別釋又二初約凡聖互論文唯明錯誤亦應開若下二單就聖法以辨心雖錯誤説聖不殊故無差降已上皆見戒疏記卷五已上錯誤別配四戒大科附録於下以備對閲淫盜初約三趣初明大漫二明小漫二對人趣剋心三對同主殺初明三趣初明大漫二明小漫二就人趣剋心妄初明三趣初明小漫二明大漫二對人趣剋心三約所稱法據上錯誤別配四戒文義並參用前節文列表如下淫不論剋漫不論錯誤三趣通犯盜大漫不論錯誤三趣物通犯小漫錯非或畜物非犯誤非或畜物非犯剋心錯王人等物非犯張人他物誤王人等物非犯張人他物殺大漫不論錯誤三趣通犯小漫錯非或畜趣非犯誤非或畜趣非犯剋心錯王人等非犯誤王人等犯通人趣結犯不論張王妄大漫不論錯誤三趣通犯小漫錯三趣俱現犯若準前剋漫節文通境隨犯與大漫同不待錯故或二趣現誤僅一趣現人趣犯非或畜趣非犯剋心同上小漫若依此節疏文統論錯誤而云在人實則誤唯人趣錯亦通結與小漫同第三節身口互造身口互造中分為三項一淫二殺盜三妄第一項淫戒疏云淫戒成犯事在形交故唯在身口非犯意由無語故行宗釋云由無語者非口能成故律中教他作淫他作犯中罪不作但下罪見戒疏記卷五第二項殺盜戒疏云殺盜二戒身口互造兩得相成然身為根本口為枝條所以然者損財害命身自獨成不待語助故知身本口語教死言了未成待前命斷方得重罪要由彼身助口成業故知枝條行宗釋云初明不互造二初立義上二句明造成通互容相助故下二句明結業不互局本枝故本即正位枝謂旁兼所下二徵釋所以初釋根本口下釋枝條戒疏又云若依多雜等論三業不互所以者何業性異故事不究竟言雖了了未得成業要由身助行宗釋云二明互造二初出前所計為二初示宗多雜等論皆有部所計所下二出不互所以則有二意初約業異釋若約能造色身是可見有對口即不可見有對若據所造過身造淫盜殺口作誑妄若約所發業性不混若取來報感果不同事下次約事不竟釋初句立意言下釋成戒疏續云若依本律成論所通三業互造各自成業故彼文云殺不善業身亦可造隨以自身殺害衆生口亦可造或教人死或以呪殺心亦可造有人發心能令他死故彼論云如和利經説外道神仙起一瞋心殺那羅國如檀特等諸險難處皆諸仙人瞋心所作行宗釋云二正示今宗中為二初示宗各自成者隨約能造結業成罪不同多雜從所作事判定身口故彼下二引示且明殺業餘可準知文中二初通明三業身口意三如文次列而身是正口意為互云教死者論云教敕即是遣使文無歎死義亦同之故下二別示心造論文二節初引經證那羅國者具云那羅千陀羅國如下次舉事證言檀特者即西土山名經音義云或言單多羅迦山此云蔭山此明仙人心業強猛證上起心即能害故已上皆見戒疏記卷五第三項妄戒疏云妄語一戒本希名利非言不成亦有身現無疑成重比前互造可以類之行宗釋云初明正業亦下明互造現相必約前信故須無疑見戒疏記卷五第四節教遣教遣中分為二項一教人二遣人第一項教人戒疏云先明教人言淫戒者自作成重教人為非樂染前人於我無預不得同犯行宗釋云初淫中於我無預言能教人不預其樂也戒疏續云殺盜二戒過通損益自作教人損境暢思期契相同彼我同犯或能教者剋所使意異或時節早晚坐立乖契或互顛狂捨戒緣闕但有少差於此犯法教者不犯漫心無寄隨作相應皆名為犯行宗釋云二殺盜中二初通明犯相損益者謂損他益己以淫唯適己而非惱他殺盜兩兼故通損益或能下二別簡剋漫初科中或時等者且列五異時節坐立緣闕此三並約所教顛狂捨戒則通能所故云互也問如教殺坐人彼立即害云何非重答既云剋心能教應言見坐可害立不應害此則不犯若不指定同下漫心時節早晚亦同此釋此明漫心者即不定早晚等也戒疏續云大妄語者自説成重教人稱聖名利擁彼於我無潤故不同犯行宗釋云三妄語中問文云教他不犯者如教他稱己自得名利豈不犯重答此落後遣非此所明已上皆見戒疏記卷五第二項遣人戒疏云教者利己義疏遣者向己義親何以明之且如戒中遣人就己行淫遣人説己得聖利樂是我犯齊究竟殺盜兩戒無有遣義故非所論行宗釋云初分示何下推釋可解問殺盜何以無遣義耶答遣人殺己罪不至果豈有令他盜取我物是則淫妄二戒遣重教輕殺盜兩戒有教無遣見戒疏記卷五第五節重犯戒此節文中重字有平呼去呼二別宜細分之平呼者如重犯是去呼者如四重戒是事鈔云若論重犯律自明斷隨犯多少一一上罪淫衆多重犯餘盜殺妄重犯亦爾資持釋云重犯有二一同名之罪謂四重互望二同種之罪謂四戒各論上通十誦下局本宗文約四戒各別論重即明今宗同種之義事鈔續云此説別解脫戒由境緣別得戒不同故後犯時還隨別犯如薩婆多云寧可一時發一切戒不可一時犯一切戒且如淫戒女人身上發得二十一戒男子身上得十四戒餘法界中男女亦爾今或貪心犯一女一道但名汙一淫戒自餘諸淫戒體光潔無行可違稱本受體資持釋云初敘宗意律儀從境故名別脫道定從心即是總脫如下引論委釋二初舉文受是懸擬故可總發犯是臨境故唯別犯且下二歷示初明總發文中別舉淫支以明餘可例顯淫境約道女三男二淫心三毒三單三復一具隨緣間起以心歷境故發多戒如文所列今下明別犯事鈔又云世中有人犯一淫戒初乃惶懾後復思審謂言失戒遂即雷同隨過皆犯豈不由愚於教網自陷流俗焉知但犯一淫諸淫並皆不犯餘殺盜等常淨儼然資持釋云初敘非豈下正斥焉下重示事鈔續云故同法之儔理須明察若先嚴淨識託對五塵欲染不生由前方便若先非攝慮對境不能不犯既犯業成必須無覆早懺還成本淨資持釋云初二句囑其所告受隨一等故名同法若下二正勸又二初示持行嚴謂謹攝淨識即心五塵皆境所謂方便正念常擬對治也嗚呼末世凡流沈溺滋久攝念離染未見其人自非宿善資熏明師訓匠勤求聖教精擇良明志慕孤高行希清卓時時不懈日日如新或體達前塵反求欲本或冥心所受專意通持故得對境蕭然遇緣確爾翔而後集默而識之其猶揮手於空了無滯矣著鎧入陳何所畏乎然惑業未銷生死可懼豈唯言説即是清升在欲遠塵良恐非爾所及居凡學聖故且抑而為之勿事悠悠宜應切切因茲言及一為深思若下次勸犯悔上二句明成犯既下示懺益大慈博愛於物無遺雖惡行下愚亦苦加提引祖恩所及無得而知已上皆見事鈔記卷十四上來持犯總義中第八章別簡性重竟第九章廣斥愚教事鈔云今時不知教者多自毀傷云此戒律所禁止是聲聞之法於我大乘棄同糞土猶如黃葉木牛木馬誑止小兒此戒法亦復如是誑汝聲聞子也資持釋云初敘倚濫毀傷自毀者身為佛子反毀佛教故又自身稟戒反毀戒律故如黃葉等此明倚濫即佛經中有此言故涅槃云嬰兒啼哭之時喻小機也父母即以楊樹黃葉而語之言莫啼我與汝金喻如來施權也嬰兒見已生真金想便止不啼謂得涅槃然此楊葉實非金也非大涅槃木牛木馬木男木女嬰兒見已亦復生於男女等想喻亦同上此明如來追述爾前施小之意至涅槃時決了權疑同歸常住寧復有小耶此所謂不知教也事鈔續云原夫大小二乘理無分隔對機設藥除病為先故鹿野初唱本為聲聞八萬諸天便發大道雙林告滅終顯佛性而有聽衆果成羅漢以此推之悟解在心不唯教旨也資持釋云二約理正破三初教逐機分又四初二句敘教本融若據大小理教實異今約從本施出或約開會有歸故云無分隔耳對下明因機故異故下引證初證説小悟大即無量義經雙下證説大悟小即涅槃經以下準經顯意此謂如來一音演法衆生隨類得解然此但望言教是一至於佛意不無密赴故使隨類得益也此明不以所學即判大小但達其大者一切歸大何妨學律志之小者所為皆小徒自窮經故曰在心不唯教也事鈔續云故世尊處世深達物機凡所施為必以威儀為主但以身口所發事在戒防三毒勃興要由心使今先以戒捉次以定縛後以慧殺理次然乎今有不肖之人不知己身位地妄自安託云是大乘輕弄真經自重我教即勝鬘經説毗尼者即大乘學智論云八十部者即尸波羅蜜如此經論不入其耳豈不為悲資持釋云二三學次第為二初推戒功二先敘佛偏弘施為者通語一期化物軌度威儀即目戒學主猶尊也但下次出所以初明對病身口即業心使是惑勃卒也今下明次治顯戒學居初釋成為主耳今有下二斥誑妄三初敘所計位地謂薄地凡夫安託謂無疑畏輕真經者毀律教也重我教者黨所習也即下據教反質二文並約開會之義由本小教歸一佛乘故兩皆云即八十即目段數部即指根本一部聲聞但云尸羅菩薩則加波羅蜜即六度之一如下傷其愚暗教雖顯了聞而不信故云不入耳事鈔又云故百喻經云昔有一師畜二弟子各當一腳隨時按摩其大弟子嫌彼小者便打折其所當之腳彼又嫌之又折大者所當之腳譬今方等學者非於小乘小乘學者又非方等故使大聖法典二途兼亡以此證知今自目覩資持釋云三相非滅法初引經師喻如來弟子喻學者腳喻兩乘按摩喻尋究其下喻學大毀小彼下喻學小毀大譬下法合可解方等即大乘之通名以下顯驗事鈔又云恐後無知初學為彼塵蒙故曲引張猶恐同染悲夫資持釋云三示意結勸中初示廣斥之意彼即濫大不肖之者塵蒙謂邪言惡見壞信喪道猶如塵垢穢於淨物故也猶下囑纍所謂素絲易染朱紫難分雖委曲指陳猶未能知返豈非禁情節欲舉世之所難縱意為非是人之所欲且祖師之世其風尚然況及於今無足怪矣已上皆見事鈔記卷十四此章大科別録如下初敘倚濫毀傷二約理正破初教逐機分三示意結勸二三學次第三相非滅法上來持犯總義中第九章廣斥愚教竟上來持犯篇中第一門持犯總義竟第二門持犯別相持犯別相中分為二章一性罪二遮罪第一章性罪已下所列性罪重輕不同今列略表預示其概餘如文中委明殺殺人上罪殺非人中罪殺畜生下罪盜五錢上罪減五錢中罪一錢下罪淫正道上罪非道中罪妄大妄上罪小妄下罪兩舌惡口綺語併同性罪中分為四節一殺二盜三淫四妄第一節殺戒疏云經明性重多以此戒為初豈非身為業先故殺業因首故也言性重者以性含輕重也重則人道輕則非畜約境分心故罪階三位見戒疏記卷七殺戒所攝人及非畜已下諸文多約殺人而言非人畜生可以例知殺中分為三項一犯境二犯相三不犯第一項犯境事鈔云人者律云從初識至後識而斷其命也初識者謂初識在胎猶自凝滑是識所依乃至命終最後一念未捨執持隨暖壞者是也資持釋云注中初至所依釋上初識大集經云歌羅邏時此云雜穢入胎七日狀如凝酥即凝滑也即有三事一命二暖三識出入息為命不臭不爛為暖業持火大色不臭爛此中心意識為識若壞凝滑即壞識之所依命暖隨謝便名犯殺乃至下釋上後識謂四大將解識神未去害亦成重疏云隨有暖處識在其中即識住處為命根攝見事鈔記卷十八第二項犯相犯相中分為二支一列緣二隨釋第一支列緣列緣中分為二類一正明犯緣二別示闕緣第一類正明犯緣事鈔云犯緣具五一是人二人想三起殺心四興方便五命斷見事鈔記卷十八戒疏云上明人趣非人畜生加害等同但罪輕為別耳行宗釋云非畜二殺並五緣犯具闕同之第二類別示闕緣別示闕緣中分為五端一闕初緣二闕第二緣三闕第三緣四闕第四緣五闕第五緣第一端闕初緣戒疏云若闕初緣小漫心起但得三中罪以非人畜杌三境替故大漫心起但得一中罪三趣隨犯俱無差故若對剋心加王異境來替張處則有四句可準上思行宗釋云初闕三別即大小二漫及剋心也大漫一中罪者以三趣齊害杌境來差心期雖漫望人從重故得中罪必對杌木起非畜想應得下罪非此所明在文蓋闕此中結句大漫一句杌作人想小漫三句一非人人想二畜生人想三杌木人想剋心中但加一句王作張想殺則同重餘三同前故云四句通前二漫總有八句見戒疏記卷七此中結句列表如下大漫一句杌作人想中罪殺人方便罪杌作非畜想下罪殺非畜方便罪今文闕略不明小漫三句非人作人想中罪殺人方便罪畜生非人想同杌作人想同總有八句剋心四句王作張想上罪行宗云張王是別人趣是通今就通結故成殺重此約誤言若錯不犯重唯結殺張方便中罪非人作張想中罪殺張方便罪畜生作張想同杌作張想同錯誤之義見前持犯總義別簡性重第二節錯誤中委明第二端闕第二緣戒疏云二闕想緣亦有大小兩漫及一剋心行宗釋云初通舉三位一一位中各有想疑單雙之別如指略中戒疏續云且對剋心生想有四句一上罪三中罪也剋心生疑有十句一上罪九中罪也謂直疑有四互疑有六亦可準知也剋心雙闕二緣四十句如王境差心對有十乃至杌木例可解也行宗釋云二別釋剋心中句法交亂須作圖相三位不同初闕想四句張作王想上罪張作非想中罪張作畜想中罪張作杌想中罪二疑心十句直疑四句張作王疑上罪張作非疑中罪張作畜疑中罪張作杌疑中罪互疑六句為張為非中罪為張為畜中罪為張為杌中罪為非為畜中罪為非為杌中罪為畜為杌中罪三雙闕四十句初王人來差十句直疑四句張疑上罪非疑中罪畜疑中罪杌疑中罪互疑六句為張為非中罪為張為畜中罪為張為杌中罪為非為畜中罪為非為杌中罪為畜為杌中罪二非人來差十句直疑四句張疑中罪非疑中罪畜疑中罪杌疑中罪互疑六句為張為非中罪為張為畜中罪為張為杌中罪為非為畜中罪三畜生來差十句為非為杌中罪併同上非人為畜為杌中罪四杌木來差十句通前三心總五十四句三上罪五十一中罪圖中可見但知前二心差境定後一復加境差故號雙闕耳戒疏續云餘大小漫心境闕相可以準知行宗釋云三指略二漫小漫但除王人則想有三句疑但九句雙闕除王境差但存三境亦各九句總前三位共有三十九句大略同上圖相唯直疑中各除第一句為異又通改張字為人字讀之準前易見不復重出大漫三境通害但有杌為異境止有一十三句復恐難曉故須列示初闕想三句人作杌想中罪非作杌想下罪畜作杌想下罪二疑心六句直疑三句人作杌疑中罪非作杌疑下罪畜作杌疑下罪互疑三句為人為杌中罪為非為杌下罪為畜為杌下罪三雙闕四句杌木來差直疑一句杌疑一中罪二下罪互疑三句為人為杌中罪為非為杌下罪為畜為杌下罪見戒疏記卷七小漫句法圖表記中闕略不出今依其文義為之補出附列如下以資學者參考初闕想三句人作非想中罪人作畜想中罪人作杌想中罪二疑心九句直疑三句人作非疑中罪人作畜疑中罪人作杌疑中罪互疑六句為人為非中罪為人為畜中罪為人為杌中罪為非為畜中罪為非為杌中罪為畜為杌中罪三雙闕二十七句初非人來差九句直疑三句非疑中罪畜疑中罪杌疑中罪互疑六句為人為非中罪為人為畜中罪為人為杌中罪為非為畜中罪二畜生來差九句為非為杌中罪併同上非人為畜為杌中罪三杌木來差九句第三端闕第三緣戒疏云三闕殺心或無罪如開緣中或得中罪謂苦治人過與病藥近死方便但無殺心行宗釋云苦治即有過因罰而死與病藥即不好心看反令增病見戒疏記卷七事鈔云伽論病人不欲起不欲舒若起者當死看病人強與食藥死者中罪癰未熟強破命終亦爾不與食不治療因而死者亦中罪資持釋云明不善看病因而致死但無害意故並中罪初與食破癰兩犯並謂不合與而與次不下謂合與而不與資持云上引伽論皆結中罪者若無害心不合有犯若有害心結犯復輕進退難定今以義求但看病者心有強弱若懷慈濟因而致死如律所開泛爾為之不顧得失失治死者由本無心故不結重近於殺業緣闕故有中罪思之見事鈔記卷十八第四端闕第四緣戒疏云四闕方便由未起故不制單心或得下罪雖心緣殺以未動身尋悔故也或得中罪如十誦中厭患懈怠不好看病致死但結中罪以無方便故行宗釋云初約無犯明闕言未起者未至重緣也次犯下罪明闕即約重緣遠方便罪三犯中罪明闕無方便者反有方便即攝上罪見戒疏記卷七第五端闕第五緣戒疏云闕第五緣未斷命如上七方便則具七中罪如十誦云殺人未死則狂發戒捨但結中罪行宗釋云闕命斷中指上七緣下引十誦略證初緣見戒疏記卷七指上七緣者見前持犯總義闕緣不成章第二支隨釋隨釋中分為二類一廣辨殺相二別明非畜第一類廣辨殺相廣辨殺相中分為四端一自作教人二用語破國三讚死四自殺第一端自作教人事鈔云四分云殺有二種一者自殺謂身現相口讚死相坑陷倚撥若安殺具及以與藥等資持釋云先明自殺初句標謂下列相準含注戒本有八今闕二種下引足之身現相或令怖畏墜墮或示死相等口讚死相含注戒本作口現相謂以言説勸教或以大聲恐喝今鈔語局初解坑陷知人行從此道故設坑陷令墮死也倚撥審彼倚撥其處便施刀杖彼依而死安殺具安置繩索刀杖令其取死與藥可解文云等者謂自殺謂自行殺若身若杖隨死者是身口俱現相身兼口歎上段記文中所含小注皆撮略戒疏文義分釋殺相宜與大字連合讀之次段記文中小注亦爾事鈔續云二教他而殺隨其前使若教歎教遣使往來使重使展轉使求男子教求男子遣書教遣書等並任方便但令命終稱本期者三性之中能教犯重資持釋云教人中初標示若教下二列相含注戒本具列十一今鈔亦闕二種教歎含注戒本作遣使歎謂遣人語彼也教遣使指示所教令遣人往害往來使受語往害還來重往重使隨續使人乃至百千令害一人展轉使彼使不去轉使他往乃至百千最後人殺隨前所使皆同一重求男子選擇有勇令往害之教求男子使他求也遣書表於紙墨令用死者教遣書使他代作等取餘二謂求持刀人謂能殺者教求持刀人也並下總示欲顯上文列相未盡又遮惡人避此造彼故用此語通而攝之能教犯者且據本犯之人若論所教則通道俗若是道人能所皆犯已上皆見事鈔記卷十八所教若是俗人已受五八戒者亦犯第二端用語破國事鈔云薩婆多比丘知星曆陰陽吉凶由比丘語征破異國殺害得財皆犯盜殺二上罪優婆塞例同資持釋云由比丘語者即教他業兼犯盜者以攻擊劫掠損彼物故優婆塞同者五八並制故見事鈔記卷十八第三端讚死事鈔云薩婆多若為一人讚死此人不解邊人解用此法死者無犯資持釋云謂剋心專緣一境無意於他若心通漫隨死皆犯事鈔續云今多有人自焚多有愚叢七衆讚美其人令生欣樂並如律本結重資持釋云如律重者同歎死故已上皆見事鈔記卷十八第四端自殺事鈔云五分四分自殺者中罪謂結其方便資持釋云以命斷戒失無可犯故見事鈔記卷十八行宗云今亦有人不知所以自投焚溺欲冀超升苦因未除寧亡三有之報死而無悔實唯一勇之夫將謂永滅不生焉知此沒彼出固當勤修三學廣運四弘誦持方等大乘繫念諸佛嘉號冀龍華而得度指安養為所歸深厭死生善識因果欲除苦本其要在茲見戒疏記卷七事鈔云十誦不得自傷毀形乃至斷指犯罪資持釋云斷指犯罪者相傳並云下罪見事鈔記卷十八第二類別明非畜戒本注云若殺非人若畜生有智解於人語若能變形方便殺者並中罪不死者下罪畜生不能變形若殺者下罪見含注戒本卷上戒疏釋云智變有勝加害犯中罪者以相同人心非重者何能害也若知而害義依法科不知而害亦從律結行宗釋疏云初明犯意若下斷犯還約知論依法科者即結中罪不知從律如常犯下罪見戒疏記卷七若知水中有蟲或用或飲者亦應準此而結下罪隨所用所飲一一犯也第三項不犯事鈔云不犯中律云若擲刀杖瓦石材木誤著彼身而死及扶抱病人而死或以藥食及以來往出入而死者一切無害心不犯資持釋云前開誤失及下次開看病以藥食者因與而死也往來出入者含注戒本云扶將病人入房往反此釋濫上扶抱但上約臥起下據往還耳或可約看病者出入闕事釋之一切無害者上文略舉此句通收但約無心不唯此二見事鈔記卷十八行宗云然此誤者由於他事全無害心不同前明錯誤之誤學者知之見戒疏記卷七前明錯誤者見前持犯總義別簡性重章第二節盜資持云疏云非理損者為盜公白取者曰劫畏主覺知為偷盜名通攝故特標之事鈔云性戒含輕重也性重之中盜是難護故諸部明述餘戒約略總述而已及論此戒各並三卷五卷述之必善加披括方能免患有人別標此盜用入私鈔抑亦勸誡之意也資持釋云初示相難護上句總示性戒次句局就四重下句獨顯今盜故下二據諸文顯難前示律論僧祇釋盜涉五卷十誦四卷善見三卷有下次指別鈔未詳何人已上皆見事鈔記卷十七盜中分為三項一犯境二犯相三不犯第一項犯境事鈔云初犯境之中謂六塵六大有主之物他所吝護非理致損斯成犯法若無主物及以己物或為緣差境奪心想疑轉雖有盜取之心而前非盜境並不結犯唯有本心方便資持釋云初示境六塵六大攝盡一切如下自釋若下二明闕緣又二初別示闕相上二句及下境奪並名闕境非畜物替故云奪也言緣差者互闕不定或心息物移前事阻礙等言想疑者即闕心也於人物上異想有三謂非人畜生及無主也疑亦同之雖下通結非犯一往觀文似結闕境然據闕心前境雖定若望正作非畜物疑想時心不相當亦非盜境故下總云唯有本心方便驗非偏判也見事鈔記卷十七如下自釋者見下犯相隨釋有主物別人物明盜相文明闕緣中參閲前持犯總義闕緣不成列名顯相文及下犯相列緣別示闕緣文第二項犯相犯相中分為三支一列緣二隨釋三結示第一支列緣列緣中分為二類一正明犯緣二別示闕緣第一類正明犯緣事鈔云二成犯相中總緣具六種一有主物二有主想三有盜心四重物五興方便六舉離本處必具成犯資持釋云準疏但有五緣無今第五今鈔不釋意亦可見總括犯緣不出心境一四即境二三及五是心六中兼二心境合故見事鈔記卷十七第二類別示闕緣別示闕緣中分為二端一引疏犯緣二依示闕緣第一端引疏犯緣戒疏盜戒犯緣與事鈔稍異故須別録戒疏犯緣俾與闕緣互對戒疏云此戒五緣初是人物以盜餘趣不成重故行宗釋云雖通三寶至於結重多從主掌是以初緣通云人物對簡非畜如後自分戒疏續云物雖人主及至盜損還須人想若生餘想疑謂別境則是輕犯是以第二作人物想行宗釋云文明疑想即境想中二三兩句戒疏續云問想知二心有差別否答有同異也了境無疑曰知當境意謂為想俱能了境想與知同然知唯了境想通迷悟故與知異若以此心知是人物於下闕緣轉想不便謂實達境非迷忘故若謂人物想即順闕緣不乖律文境想互義行宗釋云問中或有立云知是人物故問決之答中初答知想差別上句通標了下分示俱下顯同異若下次明立緣是非前敘立知有濫意謂若具緣中標云知者則人謂後闕緣中轉想皆是明了之心故不可立若下次明立想順教以律但有想差不言知故互即差也戒疏續云想雖當境若盜輕物不成重罪故次第三明是重物戒疏續云財雖滿五若無盜心本自無咎故次第四明有盜心戒疏續云心雖起盜財未離處損主未就屬己不顯亦未成重故次第五明舉離處戒疏續云問前後諸戒緣具方便今此盜緣無方便者答損財明盜便成重罪有盜成重不假方便恐涉濫故縱有方便亦俱不明但知未離已前並方便攝行宗釋云初問可見若準事鈔須具六緣五興方便今此除之故發此問答中初示成犯齊限有下次明避濫不出如互用三寶燒薶壞色寄借抵拒之類但使虧損即成盜業不必方便然非一向都無故云縱有不明等已上皆見戒疏記卷六第二端依示闕緣依示闕緣中分為五目一闕初緣二闕第二緣三闕第三緣四闕第四緣五闕第五緣第一目闕初緣戒疏云若闕初境得三中罪初非人物替人物處作人想取二畜生物三無主物俱作人想望本人物不得境差方便中罪後之三物本自無心則非罪也如前義門可以通之此據小漫人物並取為言若據剋心王物替張亦同前判闕境還立如此識相舉一千從可謂達持犯者行宗釋云前約小漫以大漫隨犯故非所論上二句總標初下別示三種異境替人物處而非本境故名闕境俱下示犯如下指廣即境差方便中此下次明剋心初躡前以示同前判者張物不得境差方便中罪王物無心則無所犯對上小漫人趣無闕故云還立如下結歎見戒疏記卷六即境差方便中者見前持犯總義闕緣不成列名顯相境差文大漫隨犯故非所論小漫非人物作人想中罪盜人物方便罪畜生物作人想同無主物作人想同剋心王物作張想中罪盜張物方便罪上列之表且據疏記文而録寫稍有闕略宜檢前殺戒闕初緣中結句列表對閲可知第二目闕第二緣戒疏云闕第二緣據小漫者九句中罪謂轉想疑心雙闕各三故有九也行宗釋云闕第二中即闕人想想疑境定心差雙闕心境俱差用此三種各歷三句故成九句戒疏續云言轉想者初須人想可得同境臨欲取時乃作非人物想據後心時俱得下罪然律但結前心之罪盜人方便故云人物非人物想取中罪此句既爾諸句諸戒例同此解二人物畜生物想三人物無主物想罪或有無若先知人物後作無主想則有前心罪若本作無主無心故無罪也行宗釋云轉想三中初非人物想又三初明心轉須人想者示本想也心境相當故云同也臨欲等者明後心也據下次辨罪相此下三例通諸句即下八句諸戒指殺妄等若據殺戒亦列句數但不敘前後心想結罪之義耳二畜生物想三無主物想罪有無者即約轉想本迷為言今此正明轉想旁示本迷戒疏續云二明疑心者初是人物對境生疑為人非人物為人畜生物為人無主物戒疏續云三明雙闕者初盜人物非人物替闕境緣也就非人物復生疑心為人物為非人物闕心緣也二畜物來替為人為畜耶三無主物替為主無主耶並例準知行宗釋云疑及雙闕同是疑心但前疑據境定雙闕約境轉耳行宗云作圖示之初轉想三句一人物非人物想前心中罪後心下罪二人物畜生物想前心中罪後心下罪三人物無主物想前心中罪後心無罪二疑心三句一人物疑為人物為非人物前心中罪後心下罪二人物疑為人物為畜生物同上三人物疑為人物為無主物同上三雙闕三句一非人物替疑為人物為非人物前心中罪後心下罪二畜生物替疑為人物為畜生物同上三無主物替疑為有主物為無主物同上已上皆見戒疏記卷六上録行宗圖表依戒疏盜戒文出故僅有九句若準前殺戒句數應不止此宜檢前殺戒闕第二緣中附補之小漫句法表對閲可知第三目闕第三緣戒疏云闕第三緣重物作輕想結前方便中罪行宗釋云如取滿五意謂不滿見戒疏記卷六第四目闕第四緣戒疏云闕第四緣有盜無盜心前心下罪本無非罪行宗釋云初約先有後無前心下罪者遠方便也下句次約始終無心如開緣中糞掃親厚等取也由前具緣不列方便故此闕中須分二種當知先有後無即闕方便始終無者正是闕心問前心犯下罪那云闕心答望未動身猶非盜等故名闕心若爾至次方便轉入無心名闕心否答身色才動盜業已彰但物未離未成根本是以擁住次近並名闕第五耳問前心後轉與闕想何異答闕想有心此據無心又前約動身後轉此約初心即轉如是思之見戒疏記卷六第五目闕第五緣戒疏云闕第五緣未離處二中罪隨相分別行宗釋云二中罪未與物交次方便也相交未離近方便也或次或近有阻不成擁住方便次近不定故令隨分見戒疏記卷六第二支隨釋隨釋中分為五類一有主物二有主想三有盜心四重物五舉離處隨釋中悉依事鈔所列犯緣次第解釋唯初有主物中鈔記之文至為繁廣亙於一卷今別依戒疏總明物主之文寫録二有主想已下悉録事鈔第一類有主物有主物中分為三端一三寶物二別人物三非畜物第一端三寶物戒疏云初明三寶謂知事者掌用此物罪福大深如大集中非聖非淨何能監護無有瘡疣行宗釋云上敘罪福二皆深者由境勝故如下準教簡人彼經云僧物難掌佛法無主我聽二種人掌三寶物一者阿羅漢二者須陀洹此二聖人復有二種一能淨持戒識知業報二畏後世業有諸慚愧及以悔心如是二人自無瘡疣此二清淨人瘡疣喻破戒惡業戒疏續云初盜三寶總而為言有守護者隨盜滿五皆是極重佛物無護如鼻奈耶斷施主故行宗釋云初望護主佛下二斷施福並犯上罪鼻奈耶云若盜佛塔聲聞塔等幡蓋皆望斷施主福邊得棄損不受即上罪已上皆見戒疏記卷六三寶物中分為三目一佛物二法物三僧物第一目佛物戒疏云言佛物中有四差別戒疏續云初佛受用物者如堂宇衣服及以金石泥土曾為佛像之所受用者不得差互常擬供養生世大福故律云若是佛園坐具等者一切天人供養同塔事故所以不許者莫不即體法身之相表處是深不得輕故行宗釋云初示物相故下引律證所下徵所以法身無相隨物以彰故此諸物即法身體疏言不得差互者雖此等物朽爛破壞不許賣此轉製他物而供養佛惟應別製新物供佛受用於其爛壞之物仍舊存奉不可棄毀或取販賣故事鈔引寶梁經云乃至風吹雨爛不得貿寶供養戒疏續云二屬佛物所以得轉者由本施主通擬佛用故得貨易不同前者曾為勝相故唯一定也行宗釋云屬佛物者即錢寶人畜等物疏言得轉得貨易者於此屬佛之錢寶田園人畜等物可以隨宜販賣買取供養具等而供養佛此云屬佛物與前段所云佛受用物有異因錢寶田園人畜等物不堪受用但可係屬故云屬佛物耳西竺布施者或通施三寶或別指施佛施法施僧別指施者各有所屬不得互用今云屬佛物即是別施佛者雖許轉貿而所易得者仍屬於佛不容有濫戒疏續云三供養物以幡華等得貨易者事同屬佛可以義求供養物者即是香燈華幡供具之物疏言以幡華等得貨易者此亦有別華等可以轉貿他物供佛與前屬佛物同若幡等唯可轉變不可轉貿故資持云若佛幡多得作餘佛事者謂改作繒蓋幢幔等物然曾供佛體不可變不同前華可持轉貿戒疏續云四獻佛物者開侍衛者用之義同佛家之所攝故行宗釋云物即飲食果實等今時掌佛廟人義通道俗善見云佛前獻飯侍佛比丘食之白衣侍佛亦得食之古記問云若用常住僧食供佛通彼用否答法苑云後還入常住已上皆見戒疏記卷六第二目法物戒疏云言盜法物亦有其四戒疏續云一法所受用者謂紙素竹木上書經像或箱函器襆曾經盛貯剋定永施不許改轉此則一定敬同聖教皆是滅理之所依持故有損益並望涅槃而生罪福行宗釋云前出物體皆下示所以紙素函器止是世物但望所詮至真無價故戒疏續云有人無識燒毀破經我今火淨謂言得福此妄思度半偈捨身著在明典兩字除惑亦列正經何得焚除失事在福也行宗釋云前出謬見世中妄傳説偈得燒故經不見此疏焉知誤他此下次據文斥上引半偈捨身者一彰如來求法之勤二示如來重法三顯正法難聞下引經證兩字除惑顯佛法功深舉少況多其過彌甚倘畏來苦勿逐魔徒二緣並出涅槃經資持云準此明誡足驗前非必有損像蠹經淨處藏之可矣見事鈔記卷十七事在福者即事在無作見前宗體篇戒體戒體相狀所發業體無作多少六者事在無作中委釋戒疏續云餘之三相可以準前行宗釋云前二轉易後與侍人並同前判已上皆見戒疏記卷六第三目僧物僧物有四一常住常住物亦名四方僧物二十方常住物亦名現前常住物三現前現前物亦名當分現前物四十方現前物戒疏云就僧物中則有四別行宗釋云僧物中前二屬處永定通名常住但前無分義後是可分故加常住十方以簡之後二俱是即施通名現前但前局當處後通內外故加現前十方以別之戒疏續云一常住常住物如堂宇田園人畜米麵屬處已定不可分割必欲惠給餘寺羯磨和與若直送者是名盜損或有主掌自盜不望十方不滿隨取計五便與極重行宗釋云初出物體屬下示名義或下明結犯餘盜望主此義易知故文但出主自盜耳資持云主自盜者即知事輒用互用等或無主掌餘人亦同見事鈔記卷十七戒疏續云二十方常住物如飯餅等現熟之食本擬十方聞聲同飯有盜此食望護結重望僧結輕以僧分業無滿五故行宗釋云初列物體本下示別名通名同上故不重出有下明犯相有二望主重者謂餘人盜望僧輕者即犯中罪或主客同盜或主自盜資持云有疑醬豉為熟物判在十方者今以意分不問生熟但使未入當日供僧限者並歸前攝如貯畜鹽醬是常住常住取入日用即十方常住資持云問常住常住亦無滿五何以重耶答分不分異重輕致別已上皆見事鈔記卷十七戒疏續云問聲鐘告集是僧皆飯未知他寺奴畜得否答不合也僧具六和隨處皆是人畜別屬義非通使使既是局食亦如之行宗釋云問中意謂他寺奴畜彼此通僧應得食故答中初句判定僧下釋所以初示僧通之義人下明奴畜不通鈔云行至外寺私有人畜用僧物犯重以施主擬供當處僧不供別類非福田故僧家人畜犯下罪今多私務將帶人僕食彼僧食明文犯重誡之資持云僧家人畜結輕者又須所營同是僧事雖云僧僕私幹亦重見事鈔記卷十七戒疏續云三現前現前物如今諸俗以供養僧無問衣藥房具並同現前僧也戒疏續云四十方現前物如僧得施及五衆亡物已上皆見戒疏記卷六事鈔云然盜通三寶僧物最重隨損一毫則望十方凡聖一一結罪故諸部五分中多有人施佛物者佛並答言可以施僧我在僧數施僧得大果報資持釋云上二句推過重隨下示重相十方凡聖總收五衆三乘因果也一一結者非謂多罪但一上罪總望多境故云一一耳故下引文示四分瓶沙施佛園末利夫人施佛衣佛答同此事鈔續云又方等經云五逆四重我亦能救盜僧物者我所不救餘如日藏分僧護傳等經廣陳資持釋云初引經文特舉逆重以彰極惡我不救者以佛威神不可加故非捨棄也餘下指略已上皆見事鈔記卷十七第二端別人物別人物中分為三目一掌主損失二明被賊三明盜相第一目掌主損失戒疏云初中妙同鈔引善見論中若守護財物謹慎不懈而有盜者私竊而取或強逼取皆望本主結者以非護主能禁之限故也若反此者守物須償以本盜人欺守護故是須還他若不還犯行宗釋云上句指廣彼約二主分為七種一掌護損失主二寄附損失主三被盜物主四賊施比丘物主五收囚縛賊主六狂人施物主七守視人作主並廣如彼須者尋之下引善見即彼初位論中初明守護謹慎望本主者有二義故一非能禁二無填償本主索償反成盜故若下次明慢藏反上二義故從守護見戒疏記卷六第二目明被賊戒疏云二被賊奪者如鈔所引義張二位謂現不現結罪時當隨二主心絶已否若財主已絶賊主得定此不可奪如律賊復奪賊二財主雖定賊主不定此則可奪以緣不具故三財主遲疑賊主已定此不得奪以緣成故何問本主四俱不定此則收得由心不定業非通暢故也今以四句可約判之行宗釋云初總舉現不現者即對面現前盜及不現前盜二主謂財主賊主若下別列初後二俱可解次句以賊心猶豫盜業未成故云緣不具也第三反之故不得奪見戒疏記卷六第三目明盜相戒疏云三就所盜略舉通收情非情道並攝盡矣戒疏續云如明了論解云盜義極多且約六根起非法行若偷六大亦犯重罪行宗釋云六根即約能盜以攝所盜六大即括所盜以顯能盜故知盜境該通無窮戒疏續云如諸仙人是胸行師有人蛇螫作仙人書見者皆愈然須價直比丘被害偷看不問損與不損看時即犯以此例諸祕方要術不許人傳偷見違惱何啻在五所謂眼盜下根例之如誦咒治病欲學須直比丘密聽計直犯重偷嗅嘗觸亦例此知若要方術病緣即差得直方與得直聽寫比丘受學心緣得差不與價直故犯重也行宗釋云六根中初委釋眼根胸行師準論合云胸行蛇毒藥師謂蛇以胸而行螫施亦反謂蟲行毒也下下例餘五根資持云初眼盜色也如誦下耳盜聲也偷下略指三塵若要下意盜法也見事鈔記卷十八戒疏續云次約六界前地水火可知如律中有呪扇藥塗比丘偷搖不與價直是謂盜風若起閣斜臨妨他起造是名盜空智者識界也人有伎倆不空度他得直方與比丘方便就他學得不與價直即盜識也識不可盜以無形故但可從緣盜其智用耳行宗釋云次六大中大謂六皆廣遍界謂六相差別體同名異前後各標就文初略指前三如律下引釋後三初明盜風若下次明盜空智下後明盜識伎倆謂藝能也識不可盜者謂不可盜去但其機巧為人所學故云盜耳已上皆見戒疏記卷六第三端非畜物戒疏云三明非畜物者如上立義已明可尋鈔中罪輕重也行宗釋云指上立義者近指當戒具緣闕緣遠指篇前境差方便下指鈔者彼明盜非人物有主望主結上罪無主望非人結中罪盜畜生物古謂犯上罪今師準十誦多論但結下罪見戒疏記卷六遠指境差方便者見持犯總義闕緣不成列名顯相第四境差中第二類有主想事鈔云二明有主想若作無主想始終不轉無罪前後互轉互得輕重資持釋云律有四句有主想犯上罪初句若疑中罪次句無主物有主想疑中罪三四兩句略無第三無主想句義必具之文中初標成犯緣即第一句若下簡闕緣即第三句初約本迷無犯前下據轉想前作有主想後轉無主犯中罪前作無主想後轉有主結上罪故云互得輕重也見事鈔記卷十八第三類有盜心事鈔云三明有盜心然此一門實德之人未免但世盜由心結不望境之是非故僧祇寺主好心互用三寶物是盜上罪謂愚癡犯也資持釋云初明難護以貪染積深觸物起念粗心不覺豈識邪緣不體妄情終罹罪網實德尚當未免庸流沒在其中凡在同心彌須勵志但下示結業不望境是非者境即前物三寶互用物無私涉為是入己惡用為非二皆結重故知不簡也故下引證望為三寶故言好心若論愚教還是賊心事鈔又云四分十種賊心一黑暗心謂癡心愚教生可學迷隨作結重僧祇寺主即是其事二邪心者謂貪心規利邪命説法以財自壅三曲戾心者即瞋心也與少嫌恨假瞋得財或虛示威怒意存財利得物犯重四恐怯心或以迫喝或説法怖取或自懷疑怖而取財也五常有盜他物心恆懷規奪也六者決定取內心籌慮方便已成因必克果動物成犯七寄物取或全抵突或以少還他八恐怯取謂示身口相畏敬故與物也九見便取伺求他慢因利求利也十倚託取或倚名聞威德或以名字方便也或依親友強力者謂假他威勢而取也或以言辭辨説者託於論端浮華引接令前異望而取財利言誑惑而取者非法言法法言非法但規前利幻惑羣情資持釋云疏云律中具出二五盜心前是五心後名五取取是其業對境行事也一中可學迷者教是可學不學故迷二中規求也壅猶積也三中兩釋虛實分之四中準疏又云或説王官勢力此與第八名同相別但約心取兩以分之言心未必取言取必兼心十中五相釋之前三身業後二口業又前三中一是倚自二倚他名三倚他力後二中前但巧言後是虛誑行宗云邪命謂邪求養命曲謂非理戾即忿怒嫌恨約內心威怒約色相迫謂以事逼切喝謂説時作其大聲或可作遏謂抑遏也行宗云前五約心不出三毒若就通説莫非希物五並貪心若約別論如文乃異初二及四並是癡心三即瞋心五是貪心又前五種外相非盜故約心論後之五種內外俱盜故從外事已上皆見戒疏記卷六事鈔續云以此諸文證知心業其相略顯足得垣墻防擬妄境資持釋云妄情逐境計校萬端豈唯上列而能括盡然舉一例諸觸類而長則前雖略示亦足防心既知教相少識妄心能遮不起故如垣墻心逐境生心妄則境妄故云妄境已上皆見事鈔記卷十八第四類是重物是重物中分為二端一明物體二列義門第一端明物體事鈔云四重物謂五錢若直五錢即餘雜物資持釋云初通示錢物五錢即錢體也直五錢物準錢法也所以限五者以彼王法滿五至死佛隨王法盜滿制重事鈔續云薩婆多問曰盜五錢成重是何等之錢答有三解初云依彼王舍國法用何等錢準彼錢為限二云隨有佛法處用何等錢即以為限三又云佛依王舍國盜五錢得死罪依而結戒今隨有佛法處依國盜幾物斷死即以為限雖有三釋論師以後義應是資持釋云二別定錢體二初引諸論解答中初二兩解並限五錢後解隨死不局物數初同十誦二符本宗三即論家所取戒疏云如多論中盜相通濫初釋本錢何由可曉此破初解後解隨國現斷入死言亦泛濫難可依承此破第三解行宗云以錢體多別故問定之初解依王舍者以佛在彼國制此戒故彼是大銅錢一當十六則盜小錢須滿八十次解隨國用者無論物體但滿五數後解不約多少但隨國死刑為準論取後義今依次解耳見戒疏記卷六事鈔續云然五錢之義律論互釋不同判罪宜通攝護須急故律云下至草葉不盜資持釋云二約義定奪三初示意律論不同者律如後引論即前文判罪謂犯已處斷攝護謂專精持奉今從攝護以定錢體事鈔續云今諸師盛行多依十誦彼云盜五錢者古大銅錢得重若盜小錢八十文資持釋云二出濫用捨急從緩未體教意古錢一當十六五錢則成八十事鈔續云隨其盜處所用五錢入重僧祇王無定法斷盜不定當取瓶沙古法四錢三角結重四分但云五錢準此廢上律論以後為勝縱四錢三角善見解之亦同五錢資持釋云三明正判中初二句依論次解以定今義僧下引據王無定法者通指諸國也瓶沙古法者佛依結戒可以為準也此取盜五之法不定古錢四錢三角即入五錢之限兩角半錢猶屬盜四錢論角者恐彼錢模畟方此間往古亦鑄方錢今時圓者但約四字論之四下準本宗以決廢律論者律即十誦論即多論初後二解以後勝者即第二解望初為後疏云可如多論中間一解隨國用錢準五為限則諍論自息也縱下會同然善見僧祇並約古大銅錢乃是取本王舍古法以釋五錢之義至於斷盜還隨國用即彼論云乃至草葉不得取故知急護頗合今宗矣已上皆見事鈔記卷十八第二端列義門事鈔云義門六句不同一十誦伽論云錢有貴賤時不妨錢貴盜一入重遇值賤時百千犯輕資持釋云錢貴賤者謂物有重輕時有豐約故貴者一當多用賤者多當少用如文可解事鈔續云二四分五分善見云貴處盜物賤處賣還依本盜處估價資持釋云三文皆爾故盡標之此謂就本盜處損主以論不約後賣不滿也事鈔續云三善見云貴時盜得賤時賣若定罪者還依本時上三句互反皆同得輕降也資持釋云意亦如上如春時直十夏但直一之類上下總點三句初句文中已具次句應云賤處盜物貴處賣三賤時盜物貴時賣並依本斷事鈔續云四摩得伽中取五千不犯重數數取四錢數數作斷心或不得物而入重如四分燒薶壞色教他等資持釋云盜多犯輕不至果故不得物犯重但損他故事鈔續云五不滿五犯重如四分衆多人遣一人盜五錢多人共分或多人共盜通作一分但使滿五一切同盜結重或盜過五結輕如十誦盜衆多人未分物者是資持釋云減五得重過五犯輕前引四分兩釋並約人多物少故不滿五通望彼物齊入重刑後引十誦通望彼衆無滿五義十方常住類此説事鈔續云六盜五人各一錢結重如僧祇五人各以一錢遣一人守掌若盜望守護人結善見云欲知盜相如師徒四人互相教共盜一人六錢各得一上罪一中罪自業不合教他業但得一中罪此義應知資持釋云六中謂盜少成重初引僧祇次善見中互相教者如師教三弟子云彼有六錢大者取三小各取一教人滿五我自取一自業不滿乃至小弟子云和尚取三同學各一我自取一罪亦同上一上罪者教他犯也一中罪者自作犯也自下釋結中罪義恐疑共盜應須犯重故已上皆見事鈔記卷十八行宗云僧祇且從本主以立句義然望護主成重自是盜五耳善見四人互教乃約異時為言若一時中止可一人為能教三為所教能教取一即是盜一成重之義見戒疏記卷六第五類離本處事鈔云離處義十句分之行宗云盜戒成犯雖約離處然其離相不必物離故以十門括示差別見戒疏記卷六事鈔續云一文書成辨離處如律師非法判用僧物之類善見云書地作字一頭時輕書兩頭時重資持釋云初句約判斷明犯非法判用者妄書簿曆之類善見下如作契書分判地界一頭輕者如書所從處時方便中罪也兩頭重者復書所至處時究竟上罪也事鈔續云二言教立者善見若盜心唱云定是我地地主生疑中罪決定失心者重若共爭園田違理判與違理判得乃至口斷多端皆重即如四分若以言辭辨説誑惑而取皆重資持釋云次句但約口斷即犯善見二節初約盜地若下二約斷諍違理判與者能判犯也違理判得者所判犯也下引四分即約辨説文如前引行宗云口斷多端謂強詞巧辨非理而斷律中誑惑即邪心勸誘並望發言決得無疑皆成上罪見戒疏記卷六事鈔續云三移標相者善見標一舉時中罪舉二標時重謂量地度乃至得一髮一麥皆重地深無價繩彈亦爾資持釋云標者下注顯相如今丈尺之類文中且引盜二標犯準論若盜三標一舉下罪二舉中罪三舉重乃至盜十標前八並下罪九中罪十重事鈔續云四墮籌者四分盜隱記數籌分物籌致令欠少也資持釋云墮籌者謂下籌多而令物少或不下籌而取多物雖非文意世有其事事鈔續云五異色者十誦薩婆多云氈褥氍毹上有樹枝葉華今從樹葉上盜牽至樹華上犯重謂異本色故或如借他衣鉢非理用損減他五錢亦結重罪律云若壞色故資持釋云初引十誦律論約異色犯如毛綿杼織以成華朵鳥獸之物而牽挽移易損彼物故或如下次準本律約損色犯事鈔續云六轉齒者如十誦摴蒲移棋子等資持釋云轉齒如世賭博多用齒骨擲采博物盜心移轉隨物成犯事鈔續云七離處明不離處如僧祇盜他牛馬未作得想雖舉四足不成重罪資持釋云彼明盜四足者驅向所期足遍犯重不隨所向者輕雖離但得中罪本期不定舉遍即重本主來逐心未得者輕即文中所謂未作得想也事鈔續云八不離處明離處如善見空靜處盜決得無疑如擲杖空中必無不下故動即成重資持釋云善見得心已決微動即犯不待離處如下舉喻可解事鈔續云九無離處辨離處如四分盜他田宅攻擊破村燒薶壞色皆犯重等資持釋云田宅等物永不可離不同上句可離不離事鈔續云十雜明離處如空中吹物盜鳥曲弋斷流水注等並不具述廣如本疏資持釋云第十且出空弋水注三相律中明處則有十三疏中次解今略引示初地中即是伏藏有主望主結佛僧地屬佛僧二地上如今道地得物三乘謂象馬等乘若盜乘上物離乘方犯若兼乘盜乘離即犯四擔同乘兩分五空謂衣物鳥等從風所吹而欲盜取即此空處以辨離處善見盜空中鳥左翅過右翅尾處至頭上下亦爾俱得重罪六架即曲弋也若盜物者物離方犯若連架者架離即犯七村或盜村物或盜村體擊破壞等八阿練若村外空地同村可知九田十誦若為田故相言得勝者重不勝者輕若作異相過分勝者重十處所如店肆作處盜物盜體同上村中十一船處盜物即以船為處盜船體者斷繩離處方犯十二盜水即斷水注也僧祇溉灌水或一宿直一文或至四五若壞彼渠得下罪水入田中罪滿五者上罪十三私度關如律比丘無稅白衣應稅為彼過物重十誦比丘應稅不稅亦重餘廣如疏已上皆見事鈔記卷十八行宗云五空中左翅過右約橫飛説尾至頭處約直飛論上下可解以空無分齊還約鳥之飛動以明離處之相九田中相言謂詣官詞訟得勝重者謂非理而得若作異相者彼云若不勝已更作相若所得地乃至滿五得上罪謂作標相取也十處所中處所語通律云若家若市肆果園菜園庭前舍後若復有餘處等見戒疏記卷六第三支結示事鈔云然盜戒相隱極難分了若廣張體貌徒盈卷軸至於披檢取悟必繁故略列犯緣粗知梗概意存省事知足憂心念道者緣境既局少應清潔若多衆務而欲高升者必羅盜網終無有出何者由心懷勝劣倒想未傾初果無學方可營事有心懷道者細讀附事深思乃知猶恐不肖者謂繁余心實未言盡約略如前故且削也資持釋云初示前略意憂下二明人有順違初明知足之人懼犯退藏言憂心者心之可畏難可禁制微縱成業殃及纍世是可憂故念道者慕出離也緣境局者為教所禁也若下明多事求進為盜所陷多衆務者或好為人師或樂營世福也欲高升者名位過人也羅盜網者結業成也無有出者苦報無窮也何下徵示其意如前大集所揀人也有下三勸修初句召後人也細讀者勸尋教也附事者以教照境也深思者以境觀心也乃知者自省心行也猶下遮後妄謂以彰略意見事鈔記卷十八戒疏云此戒人多潛犯不謂重罪但是粗心鈔疏雖繁猶恐未悟可例此斟酌犯罪相也故善見云戒中宜從急護此第二戒事相難解不得不曲碎解釋其義理分別汝當善思論文如此臨事可不勉耶行宗釋云初敘數犯所以鈔下指撰述勸修故下引論文勉學前引論文後二句指文以勸見戒疏記卷六資持云引論中初句通示教意此下別指今戒必須繁文曲碎解釋者論涉三卷故也其義理等者勸詳審也見事鈔記卷十八第三項不犯事鈔云三明不犯中四分云與想取己有想糞掃想暫取想親厚意者皆無犯律中具七法名親厚一難作能作二難與能與三難忍能忍四密事相告五互相覆藏六遭苦不捨七貧賤不輕如是七法人能行者是善親友準此量之資持釋云初引五想皆謂無盜心也與想者意謂他與也已有者謂非他物也糞掃者謂無主也暫取者即持還也親厚者無彼此也律下別釋第五七法中一竭力代勞為之不厭二己所重物與之不吝三極相違惱了無所恨四吐露私心而無所隱五掩惡揚善恐傷外望六囚繫患難多方拯濟七貴賤貧富終始一如如是下結顯故知誠實方入開位自餘濫託皆陷刑名見事鈔記卷十八行宗云不犯中五前三約心明開後二就事明開見戒疏記卷六第三節淫五戒唯制邪淫八戒正邪俱制全同道衆今文唯於犯相料簡中略示邪淫之義餘皆泛明淫相不簡邪正學者宜善分別觀之淫中分為三項一犯境二犯相三不犯第一項犯境事鈔云初明犯境者僧祇云可畏之甚無過女人敗正毀德莫不由之染心看者下罪聞聲起染亦爾資持釋云初示過相上二句示來報次二句彰現損言可畏者訶欲經云女色者世間之枷鎖凡夫戀著不能自拔女色者世間之重患凡夫因之至死不免女色者世間之衰禍凡夫遭之無厄不至行者既得離之若復顧念是為從地獄出還復思入又云女人之相其言如蜜其心如毒譬如清淵澄鏡而蛟龍居之金山寶窟而師子處之當知此害不可近也敗正者立事公正苟荒女色則無所成即彼經云室家不和婦人之由毀宗敗族婦人之罪毀德者修身立行或著女色則皆喪失即經云凡夫重色甘為之僕終身馳驟為之辛苦淨心觀云貪色者憍貪財者吝既憍且吝雖有餘德亦不足觀染下明制急然心行微細粗情不覺縱知違戒制御猶難豈況悠悠終無清脫請臨現境自審狂心或宛轉回頭或殷勤舉眼或聞聲對語或吸氣緣根雖未交身已成穢業大聖深制信不徒然諒是衆苦之源障道之本是以托腥臊而為體全欲染以為心漂流於生死海中焉能知返交結於根塵網裏實謂難逃當自悲嗟深須勉強或觀身不淨即是屎囊或諦彼淫根實唯便道或緣聖像或念佛名或誦真經或持神咒或專憶受體或攝念在心或見起滅無常或知唯識所變隨心所到著力治之任性隨流難可救也事鈔續云四分中犯境謂人非人天子鬼神等畜生三趣據報則男女二形據處則女人三道謂大小便道及口男子二道此等淫處若覺睡眠若死未壞少壞但使入淫處如毛頭皆上罪律云牛馬豬狗雁雞之屬莫問心懷想疑但是正道皆重資持釋云二列諸境中三初列境相又三一以趣攝注云等者即修羅地獄四合為一二約報有三該上六趣三約處亦三須通三報此下二定犯分齊文列四相二生二死相別可見如毛頭者斷犯處也律下三明不開疑想律云若道作道想若疑若非道想並上罪文舉畜趣餘趣同然事鈔續云然淫過粗現人並知非及論問犯犯皆結正約相示過耳不欲聞或致輕笑生疑生怪資持釋云三誡輕笑中二初敘情見上二句縱其所知及下示其制重問犯謂究問教法也約下述其愚暗此有四過一生厭惡不欲聞故二無尊重生輕笑故三無深信疑非佛説故四不正見怪作是説故事鈔續云故善見云法師曰此不淨法語諸聞説者勿驚怪生慚愧心志心於佛何以故如來慈愍我等佛是世間王離於愛染得清淨處為愍我等説此惡言為結戒故又觀如來功德便無嫌心若佛不説此事我等云何得知上罪有笑者驅出資持釋云二引誡法師即論主將集此戒故先約勒文中三初遮衆情生下教觀察生慚愧者克己自責也世間愚人誰能反照身行鄙穢殊不省非及聞教説反生驚怪汝必惡聞何如不作汝既自作何得惡聞此由不知於大慈門説毗尼藏全是指出衆生惡業若能知業豈復有教嗚呼凡愚迷倒至此志下令觀勝境初觀佛慈又下次觀佛德若下後觀佛教有笑下明立制已上皆見事鈔記卷十七第二項犯相犯相中分為二支一列示犯緣二料簡雜相第一支列示犯緣列示犯緣中分為二類一正明犯緣二別示闕緣第一類正明犯緣事鈔云次成犯相有二緣一自有淫心向前境縱有裹隔互障但入如毛頭結成大重具四緣成一是正境男則二道女則三處二興染心謂非餘睡眠等三起方便四與境合便犯資持釋云以自造他逼犯相有異故列兩緣前約趣境論緣由本有心故就身明犯後約境合辨緣既開身交故就心明犯初自造第二注云等者即不犯中一切無淫意癡狂心亂等行宗云自造緣四種不出心境前二離明後二合辨三即心為境發四謂境與心會見戒疏記卷五事鈔續云二者若為怨逼或將至前境或就其身佛開身會制令不染亦具四緣一是正境不問自他二為怨逼三與境合四受樂便犯善見云淫不受樂者如以男根內毒蛇口中及以火中是不染之之相資持釋云二怨逼中初示相有二一逼己淫他二為他淫己開身免難制心護體遭淫尚易持往尤難自非久習淨心直恐未逃刑網善下示護心法本謂女根故生染著今為蛇火乃生厭懼以心隨境轉其必然乎已上皆見事鈔記卷十七第二類別示闕緣戒疏云一闕初緣非道道想及疑得二中罪闕第二緣無染心者則無有犯謂入無記及明觀故闕第三緣未起方便威儀不破但犯下罪若動身相則有次近二方便耳闕第四緣未與境合有二中罪從破容儀去至對境犯輕中罪從境交對毛分未侵便止心者得重中罪行宗釋云初即境差境想後二句非道如餘身分二中無記開前自造如睡眠是明觀開後怨逼如蛇口火中等三四兩闕即三方便隨止之處闕不成犯三中初明犯遠未起方便謂未動身不妨心犯若下次明次近以顯所闕四中但犯次近闕不至果破容即動身止心語通境強疑心及善心息並如前説見戒疏記卷五第二支料簡雜相料簡雜相中分為二類一通簡犯相二別示邪淫第一類通簡犯相事鈔云問此淫戒結犯通戲笑否如以小兒根內口中弄故無淫心答淫心難識準律云愛染汙心是淫欲意並犯重罪五分若刺者是戲中罪非戲者重受刺者亦爾資持釋云問中上申疑問如下示戲笑之相答中初示淫心並下斷犯五分下引證則通兩判刺者即毛頭相同今宗非戲者即有欲心同上所判受刺亦爾約比丘言之約比丘言之者若在家人已受五八戒亦例此結犯事鈔續云四分云若為怨家強持男根令入三犯境於三時心無有樂皆不成犯隨始入入已出時一一時中有淫意皆重若為怨家強捉二處行不淨初入覺樂犯重脫有其事內指口中齧之唯覺指痛則免重罪如前論説蛇口火中可也資持釋云初示犯相又二前明逼己造他律中但據初入覺樂今約三時受始終故若下二約為他造己文依律引不云三時準前類解脫下後教對治方法事鈔又云若相教作者能教犯中罪不作犯下罪資持釋云中下二罪皆結能教所教可知通論四重能教不同淫則樂在前人妄則名利擁彼二犯並輕殺盜二戒損通自他能所皆重已上皆見事鈔記卷十七第二類別示邪淫業疏云云邪淫者此五戒相由制他開自故八戒云邪者誤也濟緣釋云五戒斷他妻八戒二俱斷見業疏記卷十資持云邪淫者俱舍有四一他妻二自妻非道大道口道三非處非房室中四非時懷胎乳子受八齋時見事鈔記卷三十九第三項不犯事鈔云三明不犯中若睡眠無所覺知謂開怨來逼己身分不受樂謂開怨家將造他境一切無有淫意無愛染污心故並不犯資持釋云初開無記二開對治覺知造遭亦此所攝三開非意如上戲笑非重之類文云一切通收衆緣見事鈔記卷十七第四節妄五八戒中妄語戒括有大妄小妄惡口兩舌綺語如下分列可見戒名唯標妄語而兼攝惡口兩舌綺語者如前宗體篇戒法歸戒儀軌五戒料簡雜相中委明妄中分為二項一明大妄二示四過第一項明大妄資持云妄語名通加大簡小唯局稱聖見事鈔記卷十八明大妄中分為二支一犯相二不犯第一支犯相犯相中分為二類一列緣二隨釋第一類列緣列緣中分為二端一正明犯緣二別示闕緣第一端正明犯緣事鈔云具九緣一對境是人二人想三境虛四自知境虛五有誑他心六説過人法七自言已證八言章了九前人解資持釋云緣中初後屬所對中七屬能犯七中前四是心後三屬口言境虛者實無所知也過人法者無漏聖道出過凡法故見事鈔記卷十八行宗云初後是境二五並心餘皆妄法見戒疏記卷七第二端別示闕緣戒疏云若闕初緣小漫三句正剋四句異境來替相同前戒行宗釋云初緣不明大漫若對杌木合有三句即杌作人想杌作非人想杌作畜想相同前戒者即同殺戒今據疏記之文列表如下大漫三句杌作人想中罪向人説方便罪杌作非人想下罪向非畜説方便罪杌作畜想小漫三句非人作人想中罪向人説方便罪此約誤言若錯者異趣非畜亦結上罪畜生作人想同杌作人想同剋心四句王作張想上罪行宗云大妄不開剋心非人作張想中罪向人説方便罪此約誤言若錯者異趣非畜亦結上罪畜生作張想同杌作張想同錯誤之義見前持犯總義別簡性重第二節錯誤中委明戒疏續云闕第二緣漫心想轉有三剋心轉想有四加王人想故漫心辨疑有六剋心辨疑有十雙闕二緣有四十作句並如上可解也行宗釋云二中前明轉想漫心三句即約小漫一人作非人想二作畜生想三作杌木想剋心四句加張作王想次明疑心漫心有六者亦約小漫直疑有三一非人疑二畜生疑三杌木疑互疑亦三一為非為畜二為非為杌三為畜為杌剋心十句及下雙闕並同前戒闕第二緣中若列圖表準前殺戒可知今不復出戒疏續云闕第三緣境虛今謂實者全無罪戒疏續云闕第四緣知己虛即增慢者無罪增慢於下不犯中委釋戒疏續云闕第五緣有誑心今不作究竟意戲故下罪戒疏續云闕第六緣説過人法今説人法如多論云自言持戒清淨淫欲不起不誦四含不坐禪而言我誦我是並中罪行宗釋云説人法者據是小妄但虛稱功行即大妄闕緣故結中罪戒疏續云闕第七緣自言已證今不言自證或有功德歎三寶故或得下罪我師是故或得中罪虛説他得以謀名利邪命活故行宗釋云初示闕義或下明闕相歎三寶者即説僧寶通聖賢故稱師下罪者但虛稱美不為利故必謀名利同下犯中罪戒疏續云闕第八緣言不辨了輕中罪戒疏續云闕第九緣前人不聞或不了但中罪耳已上皆見戒疏記卷七第二類隨釋事鈔云四分十誦多論云從得不淨觀已上至四果來若云我得皆犯重若現身相前人不疑同重疑則中罪資持釋云前引犯相然律論所明聖法多種文中舉要總而收之自外凡已去徹至極果所修觀行皆名聖法即五停心總別相念四禪四空等例是凡法並通聖門故同一犯三十七品四向四果即是聖法若現下簡互造上是正業出口成犯不約他疑此由身造業相不顯故約前人疑信兩判事鈔續云又四分云天龍鬼神來供養我等亦同犯重資持釋云戒疏問天龍來供凡尚感發有何罪故乃入聖中答相與聖通故齊一重又過常人之所有故事鈔續云又云欲向此説乃向彼説一切皆重資持釋云錯互此戒不開若就所稱之法誤錯則開如下欲説此而錯説彼是也事鈔續云摩得伽云自稱是佛天人師等中罪資持釋云如彼論解稱佛犯中罪有二義一世間一佛更無第二故二具足相好異於世人無人信受故今時即佛便謂已是不復進求準同此犯經云一切衆生皆有佛性此指理同須知事異如冰即水冰豈成流似礦即金礦無金用豈得僭同上聖惑彼下愚恣懶慢以謂無修作鄙穢而言妙用若此即佛何止汝徒經説遮那遍一切處則山河大地全法王身軟動翾飛皆如來藏此蓋都迷階漸一混聖凡滅法壞人莫甚於此自非達者誰復鑒哉已上皆見事鈔記卷十八第二支不犯事鈔云不犯中律云若戲笑若疾疾説屏處獨説欲説此而錯説彼等皆不犯重而犯下罪以非言説之儀軌故也見事鈔記卷十八戒本云除增上慢見含注戒本卷上戒疏釋云除增上慢者無漏正道出過相有名為增上然於增上之法未得謂得名之為慢十誦云久在山林不覩妙色暫伏煩惱自謂永無故生慢告後近城傍見色起染知己是凡更加精進果成羅漢佛言犯下罪行宗釋疏云初正釋中初釋增上即目聖道然下釋慢謂不進求二引緣妙即好也境虛心實但乖言議故得下罪若據本律則不結罪見戒疏記卷七第二項示四過示四過中分為四支一小妄語二惡口三兩舌四綺語已下所列四過皆結下罪第一支小妄語資持云小者對大為言但離聖法已外一切皆歸此攝大局小通尋之可解事鈔云此戒人多喜犯者良由妄業熏積識種尤多故隨塵境動便虛構不思反流之始但願畢世之終以此安生為要當死定非排業良可悲夫加以犯無定境起必依心但使違內想心不論外緣虛實一切皆犯資持釋云初敘數犯以興歎有二上句牒示良下釋所以上二句明惑重六識構造為能熏藏識含受即所熏識中之種故名識種故下二句明起業塵境即見聞等虛構事無稽實即是妄語不下二句明迷苦上句謂不念生死下句明悠悠度世以下三句傷歎上句躡上虛度下句示後苦報安生猶言居世也縱妄守愚自以為要臨終神昧任業牽生故云當死等當將也排遣也對治智勝業則可排對治有二一者事行抑制則能伏業二者理觀明照則能滅業以人之將死善惡相現惡強善弱神隨業往況無少善豈能排之二明心境以勸修上二句標定下二句配釋但使等者釋上次句不論等者釋上初句律云若不見不聞不觸不知是中見想聞想觸想知想彼便言我不見不聞不觸不知知而妄語者犯若論妄語境虛成犯於義易知今此境實違想亦犯教唯約心制急可見虛實俱犯故言一切事鈔云四分不犯中但稱想説故不犯文如注戒本中資持釋云指注戒者彼云不見言不見乃至知言知等今云稱想在言雖略無不攝矣已上皆見事鈔記卷二十二第二支惡口事鈔云智論一人生國中皆共作因緣謂內法與外法為因緣如惡口業故地生荊棘等不作上諸惡者地則平正如彌勒佛時人行十善地多珍寶資持釋云內法是業即善不善外法是報即所依器界報由業感故云與也引此文者意彰惡口過重感報不淨令自勉也事鈔續云律云佛言凡有所説當説善語不應惡語便自熱惱乃至畜生聞毀慚愧況於人也資持釋云束彼廣文故云乃至彼具云剎尸羅國婆羅門有牛與一長者牛鬬力共駕百車賭金千兩婆羅門於衆前作毀呰云一角可牽時牛慚愧不肯出力遂即輸金乃至牛語婆羅門言汝於衆前毀呰故爾又令主倍賭二千兩當於衆前讚言端正好角主依牛語乃得勝彼多論云劫初未有三惡道衆生盡從人天中墮以宿習近是以能語事鈔云不犯中相利故説為法故説為律故説為教授故説為親友故説上皆內無嫌恨慈濟故示惡語或因語次失口或誤説等皆不犯資持釋云前五皆據師友匠成語雖粗惡內無瞋怒故在開位如注顯之疏云片涉譏嫌即是正犯然瞋心難狀非智莫曉彌須審悉不可自欺初言相利即泛爾同學異下親友四云教授謂直示時事異上説法説律也餘約掉散遺失失口謂心知語失異下忘誤已上皆見事鈔記卷二十二第三支兩舌資持云兩即所説之境舌乃成言之具疏云此本翻譯頗是質陋現翻為離間語斯為得矣事鈔云律云兩舌者彼此鬬亂令他破也事鈔云律不犯者破惡知識惡伴黨等資持釋云世有濫濁之人反為衆首俗愚無識妄相親厚護法利他故破無犯惡伴同之已上皆見事鈔記卷二十二第四支綺語資持云言綺語者古德釋云如世錦綺交錯成文或云綺側語言乖道理故名綺側亦名無義語事鈔云成論語雖是實語以非時故即名綺語或雖是時以隨衰惱無利益故雖復利益以言無本義理不次皆名綺語資持釋云成論實語次第三相俱有過故非時者語不合宜即名不義衰惱謂令他不樂無本謂師心也事鈔云不犯者若小語錯誤等一切不犯資持釋云失口非意如常所開已上皆見事鈔記卷二十二上來持犯別相中第一章性罪竟第二章遮罪已下所列遮罪有五皆結下罪遮罪中分為五節一飲酒二過中食三高大牀四嚴身五歌舞第一節飲酒飲酒中分為三項一制意二犯相三不犯第一項制意事鈔云律云若以我為師者乃至不得以草木內酒中滴口因説酒有十過資持釋云初示嚴敕以為資者必稟師教不可違故乃下明急制也今時學法率多嗜酒臨此慈訓那不自慚因下顯過一顏色惡二少力三眼視不明此三及六損色四現瞋恚相此一與九亂神五壞業資生破家六增疾病七益鬬訟長業八無名稱喪德九智慧少十命終墮三惡道上九現惡十即來苦觀斯十過現事灼然世愚反云益力治病者不亦謬哉見事鈔記卷二十四第二項犯相犯相中分為二支一列緣二隨釋第一支列緣戒疏云三緣一是酒二無重病緣三飲咽便犯行宗釋云第二重病緣開如後自判三飲咽犯須論咽咽見戒疏記卷十五飲咽犯須論咽咽者隨一咽結一罪多咽結多罪第二支隨釋事鈔云四分中但使是酒乃至草木作者無酒色香味若非酒而有酒色香味並不合飲若酒煮和合食飲一切犯若甜醋酒食麴酒糟亦犯資持釋云初示物體甜醋酒者律作甜味酒醋味酒今文合之資持云此方多有糟藏之物氣味全在猶能醉人世多貪噉最難節約想西竺本無故教所不制準前糟麴足為明例有道高士幸宜從急事鈔又云四分若酒作酒想若疑若無酒想皆犯莫非取境犯謂前有方便資持釋云二明疑想引律境想事同淫戒注中初句示律文次句明今釋謂先有方便欲飲至後飲時乃生非酒想疑後心無犯成前方便故須結犯必先無意迷忘須開疏云諸師約心從境制余意不同聖制有以文少不了豈有智人由來不嗅須漿誤飲可結提耶已上皆見事鈔記卷二十四第三項不犯事鈔云律不犯者若病餘藥治不差以酒為藥若用身外塗創一切無犯見事鈔記卷二十四戒疏云餘藥不治酒為藥者非謂有病即得飲也故須遍以餘藥治之不差方始服之行宗釋云恐謂病開而輒爾妄飲故示文意不容倚濫見戒疏記卷十五第二節過中食過中食中分為三項一制意二犯相三不犯第一項制意事鈔云智論問曰若法無時云何聽時食遮非時食為戒答曰我已説世界名字法有非實汝不應難亦是毗尼中結戒法是世界中實有為衆人訶責故亦欲護佛法使久存定佛弟子禮法故佛世尊結諸戒不應求有何名字相應不相應等事鈔續云若爾云何但説假名時答實時毗尼中説以白衣外道不得聞聞生邪見故説假名時以通多分故資持釋云智論釋六成就中時成就文彼明天竺説時有二一名迦羅此云實時謂年月日時四時節氣等世俗皆計為實故二名三摩耶此云假時謂隨事緣長短不定無有實故佛隨世諦説三摩耶不説迦羅為除外道俗人邪見故俗人著有外道計常若説實時更增彼計此亦大分為言非俱不説論中先破彼計實時皆無有實然毗尼制法多依實時則顯如來亦説實時豈是無時故以為問如鈔所引答中為二初約義釋通二佛下遮其來難初中三義初從假釋論中難破時已乃云見陰界入生滅假名為時無別時謂時經及餘經等亦説實時乃是隨世名字故云假名此與俗説假名言同義別又準佛説則彼二皆是假名隨彼而言故云實耳文云我已説者即指上文世界法有故不妨説時非時非實故不妨無時立論已明不審重問故反責之云不應難亦是下次隨世釋世界實者俗所計也衆人訶者即指緣起由彼計實而致譏訶律附世相遮譏故制亦欲下三護法釋謂受戒時分定上中下互相敬事令法不滅故云使久存等初義約假從道以釋後二約實從俗而釋遮來難中以毗尼制教隨順世諦從權建立不可橫以真理而難俗事以化就蕩相制是建立故云不應求等資持釋云次難中論文前云如來為除邪見不言迦羅説三摩耶謂餘經中多説假時如上引律乃説實時義有相違故以為難答中為二初明毗尼説實意上句正示以下顯意謂毗尼不許白衣外道聞故可説實時以道衆自知非實不生邪執故説下次明餘經説假意通多分者道俗俱可聞故事鈔續云今有妄學大乘者多貪著非時食故具引誡之資持釋云以學語者恥己貪嗜濫謂大乘無時非時故今還引大論以誡邪執已上皆見事鈔記卷二十三第二項犯相犯相中分為二支一列緣二隨釋第一支列緣事鈔云四緣一是非時二非時想三時食四咽咽犯見事鈔記卷二十三第二支隨釋事鈔云律云時者明相出乃至日中非時者從日中乃至明相未出僧祇日正中時名時非時若食亦犯時過如一瞬一髮食者正犯資持釋云云至中者此明極限食必中前正中亦犯故知受食必在中前經中食時乃當辰巳古德卯齋護之彌急有聞諸佛日中食便謂中前非法蓋不知教也日中之義如附録中日中考委明前列緣中云時食者如疏鈔所謂豆穀乳酪餅果飯菜及米汁粉汁等從明相出至於日中聖教所許故名時食非時不許妄服若清澄之果汁及蜜等併一切鹹苦辛甘不任為食之藥如胡椒黃芪等以上三類不名時食若有病者以水和合非時開服事鈔云五百問云食已用楊枝若灰嗽口已上皆見事鈔記卷二十三第三項不犯事鈔云律不犯者若作黑石蜜和米作有病者煮麥令皮不破漉汁飲若喉中哯出還咽不犯善見出喉還咽犯資持釋云黑石蜜者古記云用蔗糖和糯米煎成其堅如石雖兼時食過中開服有病開麥汁者以清澄故哯音演嘔吐也開文不顯故引論決之見事鈔記卷二十三事鈔云僧祇一切豆穀麥煮之頭不卓破者之汁資持釋云豆等頭不破者若破非時不得飲見事鈔記卷三十三準此非時開飲不唯麥汁兼及豆穀煮之須皮不破漉汁清澄病者開飲若皮微破汁稍濃濁即屬時食慎之第三節高大牀事鈔云律云高如來八指多論高大悉犯俗人八戒亦同八指者一指二寸姬周尺一尺六寸唐尺一尺三寸強資持釋云初引律示量多論明高廣俱制大即是廣高量如下廣者準業疏方三肘者不合坐五尺四寸疏文又引阿含八種勝牀俱不合升金銀牙角嚴飾故勝佛師父母從人故勝八指下定尺數周一尺二寸為唐一尺其餘四寸以三寸六分為三寸餘四分在故云強也見事鈔記卷二十五牀者凡坐臥諸牀皆屬之牀足用佛指量佛指者每一指計周尺二寸後段鈔文開搘腳木用人指量人指者每一指計周尺一寸周尺體量如附録中周尺考委明行宗云律云除入梐孔上謂入孔栒頭不在數也見戒疏記卷十五事鈔云僧祇若下溼處用八指木搘腳得上開搘腳木用人八指量準此下溼處搘牀者應開得在上禮佛若搘高者不合也資持釋云搘謂承藉之物注明禮佛世多處牀可開溼處餘處不得又止八寸不得更高見事鈔記卷二十五禮佛世多處牀者今稱為拜凳也第四節嚴身資持云西土以華結鬘貫首及用香油塗身以為美飾此方須除帶佩華瓔脂粉塗面等見事鈔記卷三十九第五節歌舞業疏云作倡伎樂者倡謂俳優以人為戲弄也樂謂金石八音之所奏也伎通男女即奏樂者濟緣釋云金石絲竹匏土革木謂之八音奏進也見業疏記卷十上來持犯別相中第二章遮罪竟上來持犯篇中第二門持犯別相竟上來第二持犯篇竟
